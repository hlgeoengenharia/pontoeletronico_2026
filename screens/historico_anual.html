<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/theme.js?v=1.0"></script>
  <script src="../js/manager-context.js?v=2.7"></script>
  <style>
    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col font-display pb-24">
  <header
    class="p-6 flex items-center justify-between border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div id="btn-voltar"
      class="text-primary flex size-10 mt-2 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
      <span class="material-symbols-outlined">arrow_back</span>
    </div>
    <h2 class="text-lg font-bold tracking-widest text-white uppercase flex-1 text-center">ARQUIVO ANUAL</h2>
    <div class="w-10"></div>
  </header>

  <main class="flex-1 p-6 max-w-2xl mx-auto w-full">
    <section class="mb-8 flex flex-col items-center gap-4 text-center">
      <div class="w-24 h-24 rounded-full border-2 border-primary p-1 bg-slate-800">
        <img id="user-photo" src="https://ui-avatars.com/api/?name=User&background=0D59F2&color=fff"
          class="w-full h-full rounded-full object-cover">
      </div>
      <div>
        <h3 id="user-nome" class="text-xl font-bold uppercase">CARREGANDO...</h3>
        <div id="user-info-container" class="space-y-1">
          <p id="user-cargo" class="text-primary text-[10px] font-bold uppercase tracking-widest">CARGO/FUNÇÃO: ...</p>
          <p id="user-setor-info" class="text-primary text-[10px] font-bold uppercase tracking-widest">SETOR: ...</p>
        </div>
      </div>
    </section>

    <div class="flex items-center justify-between mb-6 bg-primary/5 p-4 rounded-2xl border border-primary/20">
      <button id="prev-year" class="p-2 hover:text-primary transition-colors flex items-center justify-center">
        <span class="material-symbols-outlined !text-4xl text-primary font-bold">chevron_left</span>
      </button>
      <h3 id="current-year-display" class="text-2xl font-black text-white">----</h3>
      <button id="next-year" class="p-2 hover:text-primary transition-colors flex items-center justify-center">
        <span class="material-symbols-outlined !text-4xl text-primary font-bold">chevron_right</span>
      </button>
    </div>

    <div id="months-grid" class="grid grid-cols-1 gap-3">
      <!-- Meses Dinâmicos -->
      <div class="text-center py-12 text-slate-500">
        <span class="material-symbols-outlined animate-spin mb-2">refresh</span>
        <p class="text-xs uppercase font-bold tracking-widest">Sincronizando registros...</p>
      </div>
    </div>
  </main>

  </main>

  <script type="module">
        import { supabase } from '../js/supabase-config.js?v=5';
        import { Auth } from '../js/auth.js';
        import { UI } from '../js/ui-utils.js';
        import { ScalesEngine } from '../js/scales-engine.js';

        let curYear = new Date().getFullYear();
        let targetUserId = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            targetUserId = urlParams.get('id') || localStorage.getItem('userId');
            if (!targetUserId) return;

            const userObj = Auth.getUser();
            UI.updateFooterNavigation(userObj.role);

            try {
                const { data: user } = await supabase
                    .from('funcionarios')
                    .select('*, identidades_globais!inner(*), setores!funcionarios_setor_id_fkey(nome), cargos!cargo_id(nome)')
                    .eq('id', targetUserId)
                    .single();
                    
                if (user) {
                    const ident = user.identidades_globais;
                    document.getElementById('user-nome').innerText = (ident?.nome_completo || 'TRIPULANTE').toUpperCase();
                    document.getElementById('user-cargo').innerText = `CARGO/FUNÇÃO: ${(user.cargos?.nome || 'TRIPULANTE').toUpperCase()}`;
                    document.getElementById('user-setor-info').innerText = `SETOR: ${(user.setores?.nome || 'NÃO DEFINIDO').toUpperCase()}`;
                    const photo = ident?.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(ident?.nome_completo || 'User')}&background=0D59F2&color=fff`;
                    document.getElementById('user-photo').src = photo;
                }

                const { data: allPoints } = await supabase.from('pontos').select('data_hora').eq('funcionario_id', targetUserId).order('data_hora', { ascending: false });

                if (allPoints && allPoints.length > 0) {
                    curYear = new Date(allPoints[0].data_hora).getFullYear();
                }

                await loadAnnualData();
            } catch (err) { console.error(err); }
        }

        document.getElementById('prev-year').onclick = () => { curYear--; loadAnnualData(); };
        document.getElementById('next-year').onclick = () => { curYear++; loadAnnualData(); };

        async function loadAnnualData() {
            document.getElementById('current-year-display').innerText = curYear;
            const grid = document.getElementById('months-grid');
            grid.innerHTML = '<div class="text-center py-12 text-slate-500"><span class="material-symbols-outlined animate-spin">refresh</span></div>';

            try {
                const start = `${curYear}-01-01T00:00:00`;
                const end = `${curYear}-12-31T23:59:59`;
                const { data: pontos } = await supabase.from('pontos').select('*').eq('funcionario_id', targetUserId).gte('data_hora', start).lte('data_hora', end).order('data_hora', { ascending: true });

                const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                const stats = Array(12).fill(0).map((_, i) => ({ month: i, ms: 0, days: 0 }));

                if (pontos) {
                    const daily = {};
                    pontos.forEach(p => {
                        const d = p.data_hora.split('T')[0];
                        if (!daily[d]) daily[d] = [];
                        daily[d].push(p);
                    });
                    Object.keys(daily).forEach(day => {
                        const dt = new Date(day + 'T12:00:00');
                        const m = dt.getMonth();
                        const pts = daily[day].sort((a, b) => new Date(a.data_hora) - new Date(b.data_hora));
                        let dayMs = 0;
                        for (let i = 0; i < pts.length - 1; i += 2) {
                            dayMs += (new Date(pts[i + 1].data_hora) - new Date(pts[i].data_hora));
                        }
                        stats[m].ms += dayMs;
                        stats[m].days++;
                    });
                }

                const now = new Date();
                const currentMonth = now.getMonth();
                const isCurrentYear = curYear === now.getFullYear();

                grid.innerHTML = '';
                months.forEach((name, i) => {
                    const s = stats[i];
                    const isCurrent = isCurrentYear && i === currentMonth;
                    
                    const totalMins = Math.floor(s.ms / 60000);
                    const h = Math.floor(totalMins / 60);
                    const m = totalMins % 60;
                    const timeLabel = h > 0 ? `${h}h ${m}m` : `${m}m`;

                    const hasData = s.days > 0;

                    const div = document.createElement('div');
                    
                    // Lógica de Estilo Premium para o Mês Atual
                    let styleClasses = `p-4 rounded-xl border transition-all cursor-pointer flex items-center justify-between `;
                    if (isCurrent) {
                        styleClasses += `bg-primary/20 border-primary shadow-[0_0_20px_rgba(13,89,242,0.2)] ring-1 ring-primary/50`;
                    } else if (hasData) {
                        styleClasses += `bg-white/5 border-white/10 hover:bg-white/10`;
                    } else {
                        styleClasses += `bg-slate-900/50 border-white/5 opacity-50`;
                    }

                    div.className = styleClasses;
                    div.onclick = () => {
                        window.location.href = `historico_mensal.html?id=${targetUserId}&month=${i}&year=${curYear}`;
                    };

                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            ${isCurrent ? '<div class="size-2 rounded-full bg-primary animate-pulse"></div>' : ''}
                            <div>
                                <p class="font-bold text-sm uppercase ${isCurrent ? 'text-primary' : ''}">${name}</p>
                                <p class="text-[10px] text-slate-500 uppercase font-black">${s.days} Missões Registradas</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black ${hasData || isCurrent ? 'text-slate-100' : 'text-slate-700'}">${hasData ? timeLabel : '--'}</p>
                            ${isCurrent && !hasData ? '<p class="text-[8px] text-primary font-bold uppercase">Mês Vigente</p>' : ''}
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { 
                console.error(e); 
                grid.innerHTML = '<p class="text-center py-12 text-rose-500 text-xs font-bold">Erro ao carregar dados.</p>';
            }
        }

        window.addEventListener('load', init);
  </script>

  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="dashboard.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
      </a>
      <a href="historico_anual.html" class="flex flex-col items-center gap-1.5 text-primary">
        <span class="material-symbols-outlined text-2xl font-variation-settings-fill">history</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Histórico</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    window.addEventListener('load', () => {
      const user = Auth.getUser();
      if (user) {
        UI.updateFooterNavigation(user.role);
        document.getElementById('btn-voltar').onclick = () => UI.voltarInicio();
      }
    });
  </script>
  <script type="module" src="../js/manager-context.js?v=4.5"></script>
</body>

</html>
