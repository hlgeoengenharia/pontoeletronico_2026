<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Gestão de Setores - Admin Console</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .sci-fi-gradient {
      background: linear-gradient(135deg, rgba(13, 89, 242, 0.15) 0%, rgba(16, 22, 34, 0) 100%);
    }

    .glass-panel {
      background: rgba(26, 34, 52, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(13, 89, 242, 0.2);
    }

    #map {
      height: 300px;
      width: 100%;
      border-radius: 0.75rem;
      z-index: 1;
      border: 1px solid rgba(13, 89, 242, 0.3);
    }

    .leaflet-container {
      background: #101622 !important;
    }

    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
      <div id="btn-voltar" onclick="window.location.href='painel_admin.html'"
        class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">GESTÃO DE SETORES</h2>
      <div
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary opacity-20">
        <span class="material-symbols-outlined">account_tree</span>
      </div>
    </div>
  </header>
  <main class="flex-1 p-4 pb-24 space-y-8 max-w-2xl mx-auto w-full">
    <!-- New Sector Form -->
    <section class="space-y-4">
      <div class="flex items-center gap-2 mb-4">
        <span class="material-symbols-outlined text-primary">add_circle</span>
        <h2 class="text-xl font-bold tracking-tight">Novo Setor</h2>
      </div>
      <div class="glass-panel p-6 rounded-xl space-y-6">
        <form id="form-setor" class="space-y-6">
          <div class="space-y-2">
            <label class="text-sm font-medium text-slate-400 uppercase tracking-wider">Nome do Setor</label>
            <input id="nome-setor"
              class="w-full bg-background-dark/50 border border-primary/30 rounded-lg h-12 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-600"
              placeholder="Ex: Engenharia Estelar" type="text" required />
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-slate-400 uppercase tracking-wider">Gestor Responsável</label>
            <div class="relative group">
              <input id="gestor-search"
                class="w-full bg-background-dark/50 border border-primary/30 rounded-lg h-12 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-600"
                placeholder="Pesquisar funcionário..." type="text" autocomplete="off" />
              <input type="hidden" id="gestor-id" required />
              <div id="gestor-results"
                class="absolute z-[100] w-full mt-1 bg-background-dark border border-primary/20 rounded-lg shadow-2xl max-h-60 overflow-y-auto hidden">
              </div>
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary opacity-40">search</span>
            </div>
          </div>
          <!-- Geofence Parameters -->
          <div class="grid grid-cols-1">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-400 uppercase tracking-wider text-[10px]">Raio de Ativação
                (Metros)</label>
              <input id="radius-input"
                class="w-full bg-background-dark/50 border border-primary/30 rounded-lg h-12 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                type="number" value="100" />
            </div>
          </div>
          <!-- Location Map -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label class="text-sm font-medium text-slate-400 uppercase tracking-wider">Localização do Setor</label>
              <span class="text-[10px] text-primary animate-pulse uppercase">Clique no mapa para marcar</span>
            </div>
            <div id="map"></div>
            <div class="grid grid-cols-2 gap-3 text-[10px] uppercase font-bold text-slate-500 font-mono">
              <div class="bg-background-dark/50 p-2 rounded border border-white/5">LAT: <span id="lat-display"
                  class="text-slate-100">-23.5505</span></div>
              <div class="bg-background-dark/50 p-2 rounded border border-white/5">LONG: <span id="lng-display"
                  class="text-slate-100">-46.6333</span></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button type="submit" id="btn-salvar"
              class="flex-1 bg-primary hover:bg-primary/80 text-white font-bold py-4 rounded-lg transition-all shadow-[0_0_15px_rgba(13,89,242,0.4)] flex items-center justify-center gap-2 uppercase tracking-widest text-sm text-[10px]">
              <span class="material-symbols-outlined">rocket_launch</span>
              <span id="label-btn-setor">Inicializar Setor</span>
            </button>
            <button id="btn-cancelar-setor"
              class="hidden px-6 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-4 rounded-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
              type="button">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </form>
      </div>
    </section>
    <!-- Sector List -->
    <section class="space-y-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">account_tree</span>
          <h2 class="text-xl font-bold tracking-tight">Setores Ativos</h2>
        </div>
        <span id="total-setores"
          class="bg-primary/20 text-primary text-xs font-bold px-2 py-1 rounded-full border border-primary/30">0
          ATIVOS</span>
      </div>
      <div id="lista-setores" class="space-y-3 pb-8">
        <!-- Lista Dinâmica -->
      </div>
    </section>
  </main>
  <!-- Bottom Navigation -->
  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="painel_admin.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
      </a>
      <a href="historico_anual.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">history</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Histórico</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
      </a>
    </div>
  </nav>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { UI } from '../js/ui-utils.js';

    // Mapa Leaflet
    // Mapa Leaflet - Padrão Satélite Híbrido
    const map = L.map('map', {
      maxZoom: 20
    }).setView([-23.5505, -46.6333], 15);

    // Camada Híbrida (Satélite + Ruas)
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
      attribution: '© Google Maps'
    }).addTo(map);

    let marker, circle;
    let selectedLat = -23.5505;
    let selectedLng = -46.6333;

    function updateMap(lat, lng, radius) {
      if (marker) map.removeLayer(marker);
      if (circle) map.removeLayer(circle);

      selectedLat = lat;
      selectedLng = lng;

      marker = L.marker([lat, lng]).addTo(map);
      circle = L.circle([lat, lng], {
        color: '#0d59f2',
        fillColor: '#0d59f2',
        fillOpacity: 0.2,
        radius: radius
      }).addTo(map);

      document.getElementById('lat-display').innerText = lat.toFixed(6);
      document.getElementById('lng-display').innerText = lng.toFixed(6);
    }

    map.on('click', function (e) {
      const radius = parseInt(document.getElementById('radius-input').value) || 100;
      updateMap(e.latlng.lat, e.latlng.lng, radius);
    });

    document.getElementById('radius-input').oninput = function () {
      if (marker) {
        const latlng = marker.getLatLng();
        updateMap(latlng.lat, latlng.lng, parseInt(this.value) || 0);
      }
    };

    updateMap(-23.5505, -46.6333, 100);

    // Geolocalização Inicial
    function initUserLocation() {
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition((position) => {
          const { latitude, longitude } = position.coords;
          map.setView([latitude, longitude], 17);
          updateMap(latitude, longitude, parseInt(document.getElementById('radius-input').value) || 100);
        }, (error) => {
          console.warn("Geolocalização negada ou falhou:", error.message);
          UI.showToast("Localização não detectada. Use o mapa.", "info");
        });
      }
    }

    // Lógica do Supabase - Busca de Gestores
    let allFuncionarios = [];

    async function preloadFuncionarios() {
      try {
        const { data, error } = await supabase
          .from('funcionarios')
          .select('id, nome_completo, nickname')
          .order('nome_completo');
        if (error) throw error;
        allFuncionarios = data;
      } catch (err) {
        console.error('Erro ao pré-carregar funcionários:', err);
      }
    }

    const searchInput = document.getElementById('gestor-search');
    const resultsDiv = document.getElementById('gestor-results');
    const gestorIdInput = document.getElementById('gestor-id');

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      if (!term) {
        resultsDiv.classList.add('hidden');
        return;
      }

      const filtered = allFuncionarios.filter(f =>
        f.nome_completo.toLowerCase().includes(term) ||
        (f.nickname && f.nickname.toLowerCase().includes(term))
      ).slice(0, 10);

      if (filtered.length > 0) {
        resultsDiv.innerHTML = filtered.map(f => `
          <div class="px-4 py-3 hover:bg-primary/20 cursor-pointer border-b border-white/5 last:border-0 transition-colors"
            onclick="selectGestor('${f.id}', '${f.nome_completo}')">
            <p class="text-[11px] font-bold text-slate-100">${f.nome_completo}</p>
            <p class="text-[9px] text-primary uppercase opacity-60">${f.nickname || 'N/A'}</p>
          </div>
        `).join('');
        resultsDiv.classList.remove('hidden');
      } else {
        resultsDiv.classList.add('hidden');
      }
    });

    window.selectGestor = (id, nome) => {
      gestorIdInput.value = id;
      searchInput.value = nome;
      resultsDiv.classList.add('hidden');
    };

    // Fechar resultados ao clicar fora
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.group')) resultsDiv.classList.add('hidden');
    });

    async function loadSetores() {
      const container = document.getElementById('lista-setores');
      const countSpan = document.getElementById('total-setores');
      try {
        const { data, error } = await supabase
          .from('setores')
          .select('*, gestor:funcionarios!gestor_id(nome_completo)')
          .order('nome');

        if (error) throw error;

        countSpan.innerText = `${data.length} ATIVOS`;
        container.innerHTML = data.map(s => `
                <div class="glass-panel p-4 rounded-xl flex items-center justify-between border-l-4 border-l-primary group hover:bg-primary/5 transition-colors">
                  <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center border border-primary/20">
                      <span class="material-symbols-outlined text-primary">engineering</span>
                    </div>
                    <div>
                      <h3 class="font-bold text-slate-100 uppercase tracking-wide text-xs">${s.nome}</h3>
                      <p class="text-xs text-slate-500 text-[10px]">Gestor: ${s.gestor?.nome_completo || 'N/A'}</p>
                      <p class="text-[9px] text-primary font-mono mt-1 uppercase tracking-tight">Raio: ${s.raio}m</p>
                    </div>
                  </div>
                  <div class="flex gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                    <button onclick="zoomToSetor(${s.latitude}, ${s.longitude}, ${s.raio})" class="p-2 hover:bg-slate-700/50 rounded-lg transition-colors text-slate-400 hover:text-white">
                      <span class="material-symbols-outlined text-[18px]">location_searching</span>
                    </button>
                    <button onclick="prepararEdicaoSetor('${s.id}', '${s.nome}', '${s.gestor_id}', '${s.gestor?.nome_completo || ''}', ${s.raio}, ${s.latitude}, ${s.longitude})" class="p-2 hover:bg-primary/10 rounded-lg transition-colors text-slate-400 hover:text-primary">
                      <span class="material-symbols-outlined text-[18px]">edit</span>
                    </button>
                    <button onclick="deletarSetor('${s.id}')" class="p-2 hover:bg-red-500/20 rounded-lg transition-colors text-slate-400 hover:text-red-500">
                      <span class="material-symbols-outlined text-[18px]">delete</span>
                    </button>
                  </div>
                </div>
            `).join('');
      } catch (err) {
        console.error('Erro ao carregar setores:', err);
        container.innerHTML = '<p class="text-red-500 text-center py-4 text-xs font-bold uppercase">Erro ao carregar setores</p>';
      }
    }

    let editingSetorId = null;

    window.prepararEdicaoSetor = (id, nome, gestorId, gestorNome, raio, lat, lng) => {
      editingSetorId = id;
      document.getElementById('nome-setor').value = nome;
      document.getElementById('gestor-id').value = gestorId;
      document.getElementById('gestor-search').value = gestorNome;
      document.getElementById('radius-input').value = raio;

      updateMap(lat, lng, raio);
      map.setView([lat, lng], 17);

      document.getElementById('label-btn-setor').innerText = 'Atualizar Setor';
      document.getElementById('btn-cancelar-setor').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('btn-cancelar-setor').onclick = () => {
      editingSetorId = null;
      document.getElementById('form-setor').reset();
      document.getElementById('gestor-id').value = '';
      document.getElementById('label-btn-setor').innerText = 'Inicializar Setor';
      document.getElementById('btn-cancelar-setor').classList.add('hidden');
      initUserLocation();
    };

    window.zoomToSetor = (lat, lng, radius) => {
      map.setView([lat, lng], 17);
      updateMap(lat, lng, radius);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deletarSetor = async (id) => {
      if (!confirm('Deseja realmente deletar este setor?')) return;
      UI.showLoader();
      try {
        const { error } = await supabase.from('setores').delete().eq('id', id);
        if (error) throw error;
        UI.showToast('Setor deletado!', 'success');
        loadSetores();
      } catch (err) {
        console.error('Erro ao deletar:', err);
        UI.showToast('Erro ao deletar setor', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    document.getElementById('form-setor').addEventListener('submit', async (e) => {
      e.preventDefault();

      const gestorId = gestorIdInput.value;
      if (!gestorId) {
        UI.showToast('Selecione um gestor válido na lista', 'error');
        return;
      }

      UI.showLoader();

      const dados = {
        nome: document.getElementById('nome-setor').value,
        gestor_id: gestorId,
        raio: parseInt(document.getElementById('radius-input').value),
        latitude: selectedLat,
        longitude: selectedLng
      };

      try {
        if (editingSetorId) {
          const { error } = await supabase.from('setores').update(dados).eq('id', editingSetorId);
          if (error) throw error;
          UI.showToast('Setor atualizado!', 'success');
        } else {
          const { error } = await supabase.from('setores').insert([dados]);
          if (error) throw error;
          UI.showToast('Setor inicializado!', 'success');
        }

        document.getElementById('btn-cancelar-setor').click();
        loadSetores();
      } catch (err) {
        console.error('Erro ao salvar:', err);
        UI.showToast('Erro ao processar setor', 'error');
      } finally {
        UI.hideLoader();
      }
    });

    preloadFuncionarios();
    loadSetores();
    initUserLocation();

    // Navegação dinâmica
    (async () => {
      const { Auth } = await import('../js/auth.js');
      const { UI } = await import('../js/ui-utils.js');
      const currentUser = Auth.getUser();
      if (currentUser) UI.updateFooterNavigation(currentUser.role);
    })();
  </script>
  <script type="module" src="../js/manager-context.js?v=2.7"></script>
</body>

</html>
