<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(13, 89, 242, 0.1);
      position: absolute;
      z-index: 10;
    }

    .glow-blue {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }

    .glow-yellow {
      box-shadow: 0 0 10px rgba(234, 179, 8, 0.2);
    }
  </style>

  <!-- Version: 1.0.1 -->
  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    Auth.checkSession();
  </script>
</head>

<body
  class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-24">
  <!-- Header / Mission Status -->
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between">
      <div id="btn-voltar"
        class="text-primary flex size-10 mt-2 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-wider uppercase flex-1 text-center">
        ANOTAÇÃO DIÁRIA</h2>
      <div class="w-10"></div>
    </div>
  </header>
  <main class="flex-1 overflow-y-auto p-4 space-y-6">
    <!-- Mission Briefing / Form Section -->
    <section class="bg-card-dark border border-primary/20 rounded-xl p-5 relative overflow-hidden">
      <div class="absolute top-0 right-0 p-2 opacity-10">
        <span class="material-symbols-outlined text-6xl">description</span>
      </div>
      <h3 class="text-accent text-sm font-bold tracking-widest uppercase mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">add_box</span> Nova ANOTAÇÃO
      </h3>
      <div class="space-y-4" id="anotacaoForm">
        <div class="hidden">
          <input id="inputData" type="date" />
        </div>
        <div class="flex flex-col gap-2">
          <label id="labelAtividade" class="text-slate-400 text-xs uppercase font-bold tracking-wider">ATIVIDADE DO
            DIA</label>
          <textarea id="inputConteudo"
            class="w-full bg-background-dark border border-slate-700 rounded-lg py-3 px-4 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
            placeholder="Descreva os detalhes das atividades desenvolvidas durante o dia." rows="3"></textarea>
        </div>
        <button id="btnSalvar"
          class="w-full bg-primary hover:bg-primary/80 text-white font-bold py-4 rounded-lg uppercase tracking-[0.2em] shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">send</span> Enviar</button>
      </div>
    </section>
    <section class="space-y-4 pb-20">
      <div class="flex justify-between items-center">
        <h3 class="text-slate-100 text-sm font-bold tracking-widest uppercase flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">history</span> Histórico
        </h3>
        <span id="labelTotal" class="text-[10px] text-slate-500 uppercase tracking-tighter">Total: 0 registros</span>
      </div>

      <div id="historicoContainer" class="space-y-4">
        <!-- Logs dynamically injected here -->
        <div class="text-center py-10 opacity-30">
          <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
          <p class="text-xs uppercase tracking-widest">Nenhuma anotação encontrada</p>
        </div>
      </div>
    </section>
    <!-- Log Card 2: Approved -->
    <!-- Log Card 3: Rejected -->
    </section>
  </main>
  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="dashboard.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
      </a>
      <a href="diario_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">edit_note</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Diário</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
      </a>
    </div>
  </nav>

  <script type="module" src="../js/manager-context.js?v=2.7"></script>
  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';

    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('id') || localStorage.getItem('userId');

    // Navegação dinâmica
    const userData = Auth.getUser();
    UI.updateFooterNavigation(userData.role);
    const btnVoltar = document.getElementById('btn-voltar');
    if (btnVoltar) btnVoltar.onclick = () => UI.voltarInicio();

    const inputData = document.getElementById('inputData');
    const inputConteudo = document.getElementById('inputConteudo');
    const btnSalvar = document.getElementById('btnSalvar');
    const historicoContainer = document.getElementById('historicoContainer');
    const labelTotal = document.getElementById('labelTotal');
    const labelAtividade = document.getElementById('labelAtividade');

    let editingId = null;

    // Set default date to today and update label
    const now = new Date();
    const todayISO = now.toISOString().split('T')[0];
    const todayBR = now.toLocaleDateString('pt-BR');
    inputData.value = todayISO;
    labelAtividade.innerText = `ATIVIDADE DO DIA (${todayBR})`;

    async function loadAnotacoes() {
      if (!targetUserId) return;

      try {
        const { data, error } = await supabase
          .from('anotacoes')
          .select('*')
          .eq('funcionario_id', targetUserId)
          .order('data', { ascending: false });

        if (error) throw error;

        labelTotal.innerText = `Total: ${data.length} registros`;

        if (data.length === 0) {
          historicoContainer.innerHTML = `
  <div class="text-center py-10 opacity-30">
    <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
    <p class="text-xs uppercase tracking-widest">Nenhuma anotação encontrada</p>
  </div>
  `;
          return;
        }

        // Agrupar por data
        const grouped = data.reduce((acc, item) => {
          const date = item.data;
          if (!acc[date]) acc[date] = [];
          acc[date].push(item);
          return acc;
        }, {});

        historicoContainer.innerHTML = Object.keys(grouped).map(date => {
          const items = grouped[date];
          const dateFormatted = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

          return `
  <div class="bg-card-dark border border-white/5 rounded-xl overflow-hidden shadow-lg mb-4">
    <div class="bg-primary/10 px-4 py-2 border-b border-white/5 flex justify-between items-center">
      <span class="text-primary text-[10px] font-black uppercase tracking-[0.2em]">${dateFormatted}</span>
      <span class="text-[8px] text-slate-500 font-bold uppercase">${items.length} ${items.length > 1 ? 'REGISTROS' :
              'REGISTRO'}</span>
    </div>
    <div class="p-4 space-y-4">
      ${items.map(item => `
      <div class="space-y-2 border-b border-white/5 pb-3 last:border-0 last:pb-0 group">
        <div class="flex justify-between items-start">
          <p class="text-slate-300 text-xs italic leading-relaxed flex-1">"${item.conteudo}"</p>
                          <div class="flex gap-1 ml-2 transition-opacity">
                            <button onclick="window.editarAnotacao('${item.id}', \`${item.conteudo.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="p-1.5 text-slate-400 hover:text-primary transition-colors">
                              <span class="material-symbols-outlined text-sm">edit</span>
                            </button>
                            <button onclick="window.excluirAnotacao('${item.id}')" class="p-1.5 text-slate-400 hover:text-rose-500 transition-colors">
                              <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                          </div>
        </div>
      </div>
      `).join('')}
    </div>
  </div>
  `;
        }).join('');

      } catch (err) {
        console.error(err);
        UI.toast('Erro ao carregar histórico.', 'error');
      }
    }

    async function salvarAnotacao() {
      if (!targetUserId) return;

      const dataVal = inputData.value;
      const conteudoVal = inputConteudo.value.trim();

      if (!conteudoVal) {
        UI.toast('Descreva a atividade realizada.', 'warning');
        return;
      }

      UI.showLoader();

      try {
        if (editingId) {
          // UPDATE
          const { error } = await supabase
            .from('anotacoes')
            .update({ conteudo: conteudoVal })
            .eq('id', editingId);

          if (error) throw error;
          UI.toast('Anotação atualizada!', 'success');
        } else {
          // INSERT
          const { error } = await supabase
            .from('anotacoes')
            .insert([{
              funcionario_id: targetUserId,
              company_id: Auth.getUser()?.companyId,
              data: dataVal,
              conteudo: conteudoVal
            }]);

          if (error) throw error;
          UI.toast('Anotação salva com sucesso!', 'success');
        }

        inputConteudo.value = '';
        editingId = null;
        btnSalvar.innerHTML = '<span class="material-symbols-outlined">send</span> Enviar';
        loadAnotacoes();

      } catch (err) {
        console.error(err);
        UI.toast('Erro ao salvar anotação.', 'error');
      } finally {
        UI.hideLoader();
      }
    }

    window.editarAnotacao = (id, conteudo) => {
      editingId = id;
      inputConteudo.value = conteudo;
      btnSalvar.innerHTML = '<span class="material-symbols-outlined">save</span> Atualizar Anotação';
      inputConteudo.focus();
      // Scroll to top to see progress
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.excluirAnotacao = async (id) => {
      if (!confirm('Deseja excluir esta anotação?')) return;

      UI.showLoader();
      try {
        const { error } = await supabase
          .from('anotacoes')
          .delete()
          .eq('id', id);

        if (error) throw error;

        UI.toast('Anotação excluída!', 'success');
        loadAnotacoes();
      } catch (err) {
        console.error(err);
        UI.toast('Erro ao excluir.', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    btnSalvar.addEventListener('click', salvarAnotacao);
    loadAnotacoes();
  </script>
</body>

</html>
