<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0d59f2",
            "accent": "#eab308", // Neon Yellow accent
            "background-light": "#f5f6f8",
            "background-dark": "#0a0e17",
            "card-dark": "#161c2a",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(13, 89, 242, 0.1);
      position: absolute;
      z-index: 10;
    }

    .glow-blue {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }

    .glow-yellow {
      box-shadow: 0 0 10px rgba(234, 179, 8, 0.2);
    }
  </style>

  <!-- Version: 1.0.1 -->
  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    Auth.checkSession();
  </script>
</head>

<body
  class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-24">
  <!-- Header / Mission Status -->
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between">
      <div onclick="history.back()"
        class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-wider uppercase flex-1 text-center">
        ANOTAÇÃO DIÁRIA</h2>
      <div class="flex w-10 items-center justify-end">
        <button class="relative text-accent">
          <span class="material-symbols-outlined">notifications</span>
          <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-accent animate-pulse"></span>
        </button>
      </div>
    </div>
  </header>
  <main class="flex-1 overflow-y-auto p-4 space-y-6">
    <!-- Mission Briefing / Form Section -->
    <section class="bg-card-dark border border-primary/20 rounded-xl p-5 relative overflow-hidden">
      <div class="absolute top-0 right-0 p-2 opacity-10">
        <span class="material-symbols-outlined text-6xl">description</span>
      </div>
      <h3 class="text-accent text-sm font-bold tracking-widest uppercase mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">add_box</span> Nova ANOTAÇÃO
      </h3>
      <div class="space-y-4" id="anotacaoForm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-slate-400 text-xs uppercase font-bold tracking-wider">Data</label>
            <div class="relative">
              <input id="inputData"
                class="w-full bg-background-dark border border-slate-700 rounded-lg py-3 px-4 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                type="date" />
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-slate-400 text-xs uppercase font-bold tracking-wider">ATIVIDADE DO DIA</label>
          <textarea id="inputConteudo"
            class="w-full bg-background-dark border border-slate-700 rounded-lg py-3 px-4 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
            placeholder="Descreva os detalhes das atividades desenvolvidas durante o dia." rows="3"></textarea>
        </div>
        <button id="btnSalvar"
          class="w-full bg-primary hover:bg-primary/80 text-white font-bold py-4 rounded-lg uppercase tracking-[0.2em] shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">send</span> Enviar</button>
      </div>
    </section>
    <section class="space-y-4 pb-20">
      <div class="flex justify-between items-center">
        <h3 class="text-slate-100 text-sm font-bold tracking-widest uppercase flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">history</span> Histórico
        </h3>
        <span id="labelTotal" class="text-[10px] text-slate-500 uppercase tracking-tighter">Total: 0 registros</span>
      </div>

      <div id="historicoContainer" class="space-y-4">
        <!-- Logs dynamically injected here -->
        <div class="text-center py-10 opacity-30">
          <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
          <p class="text-xs uppercase tracking-widest">Nenhuma anotação encontrada</p>
        </div>
      </div>
    </section>
    <!-- Log Card 2: Approved -->
    <!-- Log Card 3: Rejected -->
    </section>
  </main>
  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 w-full bg-white dark:bg-background-dark border-t border-slate-200 dark:border-primary/10 px-6 py-4 z-50">
    <div class="flex justify-between items-center max-w-md mx-auto">
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="painel_funcionario.html">
        <span class="material-symbols-outlined ">home</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">INÍCIO</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="estatistica_funcionario.html">
        <span class="material-symbols-outlined ">bar_chart</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">ESTATÍSTICA</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="historico_anual.html">
        <span class="material-symbols-outlined ">history</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">HISTÓRICO</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="perfil_funcionario.html">
        <span class="material-symbols-outlined ">person</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">PERFIL</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';

    const inputData = document.getElementById('inputData');
    const inputConteudo = document.getElementById('inputConteudo');
    const btnSalvar = document.getElementById('btnSalvar');
    const historicoContainer = document.getElementById('historicoContainer');
    const labelTotal = document.getElementById('labelTotal');

    // Set default date to today
    inputData.value = new Date().toISOString().split('T')[0];

    async function loadAnotacoes() {
      const user = Auth.getUser();
      if (!user.id) return;

      try {
        const { data, error } = await supabase
          .from('anotacoes')
          .select('*')
          .eq('funcionario_id', user.id)
          .order('data', { ascending: false });

        if (error) throw error;

        labelTotal.innerText = `Total: ${data.length} registros`;

        if (data.length === 0) {
          historicoContainer.innerHTML = `
                    <div class="text-center py-10 opacity-30">
                        <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
                        <p class="text-xs uppercase tracking-widest">Nenhuma anotação encontrada</p>
                    </div>
                `;
          return;
        }

        historicoContainer.innerHTML = data.map(item => `
                <div class="bg-card-dark border-l-4 border-primary border-r border-t border-b border-white/5 rounded-lg p-4 space-y-3 transition-all hover:border-l-accent">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-primary text-[10px] font-bold uppercase tracking-widest">ANOTAÇÃO DIÁRIA</span>
                                <span class="text-slate-500 text-[10px]">• ${new Date(item.data).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.excluirAnotacao('${item.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                <span class="material-symbols-outlined text-lg">delete</span>
                            </button>
                        </div>
                    </div>
                    <p class="text-slate-300 text-xs leading-relaxed italic">"${item.conteudo}"</p>
                </div>
            `).join('');

      } catch (err) {
        console.error(err);
        UI.toast('Erro ao carregar histórico.', 'error');
      }
    }

    async function salvarAnotacao() {
      const user = Auth.getUser();
      if (!user.id) return;

      const dataVal = inputData.value;
      const conteudoVal = inputConteudo.value.trim();

      if (!conteudoVal) {
        UI.toast('Descreva a atividade realizada.', 'warning');
        return;
      }

      UI.showLoader();

      try {
        const { error } = await supabase
          .from('anotacoes')
          .insert([{
            funcionario_id: user.id,
            data: dataVal,
            conteudo: conteudoVal
          }]);

        if (error) throw error;

        UI.toast('Anotação salva com sucesso!', 'success');
        inputConteudo.value = '';
        loadAnotacoes();

      } catch (err) {
        console.error(err);
        UI.toast('Erro ao salvar anotação.', 'error');
      } finally {
        UI.hideLoader();
      }
    }

    window.excluirAnotacao = async (id) => {
      if (!confirm('Deseja excluir esta anotação?')) return;

      UI.showLoader();
      try {
        const { error } = await supabase
          .from('anotacoes')
          .delete()
          .eq('id', id);

        if (error) throw error;

        UI.toast('Anotação excluída!', 'success');
        loadAnotacoes();
      } catch (err) {
        console.error(err);
        UI.toast('Erro ao excluir.', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    btnSalvar.addEventListener('click', salvarAnotacao);
    loadAnotacoes();
  </script>
</body>

</html>
