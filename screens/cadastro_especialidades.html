<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    .sci-fi-gradient {
      background: linear-gradient(135deg, rgba(13, 89, 242, 0.15) 0%, rgba(10, 14, 23, 0) 100%);
    }

    .glow-border:focus-within {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div
        class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-white/5 backdrop-blur-xl sticky top-0 z-50">
        <div onclick="window.location.href='painel_admin.html'"
            class="text-primary flex size-12 shrink-0 items-center justify-start cursor-pointer hover:opacity-70 transition-opacity">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </div>
      <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">CATÁLOGO DE ESPECIALIDADES</h2>
      <div
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
        <span class="material-symbols-outlined">psychology</span>
      </div>
    </div>
  </header>
  <main class="flex-1 max-w-2xl mx-auto w-full p-4 space-y-8 pb-24">
    <section class="space-y-4">
      <div class="flex items-center gap-2 px-1">
        <span class="material-symbols-outlined text-primary text-sm">add_circle</span>
        <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Nova Especialidade</h2>
      </div>
      <div class="bg-slate-900/50 border border-primary/20 rounded-xl p-6 sci-fi-gradient glow-border neon-border">
        <form id="form-especialidade" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Código / ID</label>
                <div class="relative">
                  <input id="codigo-especialidade"
                    class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100"
                    placeholder="Ex: SOFT-01" type="text" required />
                  <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">tag</span>
                </div>
              </div>
              <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Nome da Especialidade</label>
                <div class="relative">
                  <input id="nome-especialidade"
                    class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100"
                    placeholder="Ex: Desenvolvimento Web" type="text" required />
                  <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">workspace_premium</span>
                </div>
              </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Graduação Principal</label>
                <div class="relative">
                  <input id="graduacao-especialidade"
                    class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100"
                    placeholder="Ex: Sistemas de Informação" type="text" list="lista-graduacoes-existentes" required />
                  <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">school</span>
                  <datalist id="lista-graduacoes-existentes">
                    <!-- Preenchido via JS -->
                  </datalist>
                </div>
              </div>
              <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Nível Mínimo Exigido</label>
                <select id="nivel-escolaridade-especialidade"
                  class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-slate-100">
                  <option value="Médio">Nível Médio</option>
                  <option value="Técnico">Nível Técnico</option>
                  <option value="Superior">Nível Superior</option>
                  <option value="Pós-Graduação">Pós-Graduação / Especialização</option>
                </select>
              </div>
          </div>

          <div class="flex gap-2">
            <button id="btn-submit-especialidade"
              class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
              type="submit">
              <span class="material-symbols-outlined">save</span>
              <span id="label-submit">Salvar no Catálogo</span>
            </button>
            <button id="btn-cancelar-edicao"
              class="hidden px-6 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-4 rounded-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
              type="button">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </form>
      </div>
    </section>
    <section class="space-y-4">
      <div class="flex items-center justify-between px-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">database</span>
          <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Especialidades Ativas</h2>
        </div>
        <span id="total-especialidades" class="text-[10px] bg-primary/20 text-primary px-2 py-1 rounded-full font-bold">0
          REGISTROS</span>
      </div>
      <div id="lista-especialidades" class="space-y-3">
        <!-- Lista Dinâmica -->
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { UI } from '../js/ui-utils.js';

    let editingId = null;

    async function loadEspecialidades() {
      const container = document.getElementById('lista-especialidades');
      const countSpan = document.getElementById('total-especialidades');
      const datalist = document.getElementById('lista-graduacoes-existentes');

      try {
        const { data, error } = await supabase.from('especialidades').select('*').order('nome');
        if (error) throw error;

        countSpan.innerText = `${data.length} REGISTROS`;
        
        // Atualizar datalist de graduações
        const graduacoes = [...new Set(data.map(e => e.nome_graduacao_principal).filter(Boolean))];
        datalist.innerHTML = graduacoes.map(g => `<option value="${g}">`).join('');

        container.innerHTML = data.map(e => `
            <div class="group bg-slate-900/50 border border-primary/10 rounded-xl p-4 flex flex-col gap-3 hover:border-primary/50 transition-all neon-border">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="min-w-[44px] h-10 px-2 rounded-lg bg-primary/10 flex items-center justify-center text-primary border border-primary/20 shrink-0 font-bold text-[10px] uppercase whitespace-nowrap">
                            ${e.codigo}
                        </div>
                        <div>
                            <h3 class="font-bold text-sm uppercase tracking-tight">${e.nome}</h3>
                            <p class="text-[10px] text-primary font-black uppercase tracking-widest flex items-center gap-2">
                                ${e.nivel_graduacao || 'Nível'} • <span class="text-slate-400">${e.nome_graduacao_principal}</span>
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                        <button onclick='prepararEdicao(${JSON.stringify(e)})' class="p-2 hover:bg-primary/10 hover:text-primary rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-xl">edit</span>
                        </button>
                        <button onclick="deletarEspecialidade('${e.id}')" class="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-xl">delete</span>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');

        if (data.length === 0) {
          container.innerHTML = '<p class="text-center py-8 opacity-40 text-xs uppercase font-bold tracking-widest">Catálogo vazio</p>';
        }
      } catch (err) {
        console.error('Erro ao carregar especialidades:', err);
      }
    }

    window.prepararEdicao = (e) => {
      editingId = e.id;
      document.getElementById('codigo-especialidade').value = e.codigo;
      document.getElementById('nome-especialidade').value = e.nome;
      document.getElementById('graduacao-especialidade').value = e.nome_graduacao_principal;
      document.getElementById('nivel-escolaridade-especialidade').value = e.nivel_graduacao || 'Superior';
      
      document.getElementById('label-submit').innerText = 'Atualizar Especialidade';
      document.getElementById('btn-cancelar-edicao').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('btn-cancelar-edicao').onclick = () => {
      editingId = null;
      document.getElementById('form-especialidade').reset();
      document.getElementById('label-submit').innerText = 'Salvar no Catálogo';
      document.getElementById('btn-cancelar-edicao').classList.add('hidden');
    };

    window.deletarEspecialidade = async (id) => {
      if (!confirm('Deseja excluir esta especialidade do catálogo?')) return;
      UI.showLoader();
      try {
        const { error } = await supabase.from('especialidades').delete().eq('id', id);
        if (error) throw error;
        UI.showToast('Removido com sucesso', 'success');
        loadEspecialidades();
      } catch (err) {
        UI.showToast('Erro ao remover (pode estar em uso)', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    document.getElementById('form-especialidade').addEventListener('submit', async (e) => {
      e.preventDefault();
      UI.showLoader();

      const dados = {
        codigo: document.getElementById('codigo-especialidade').value.toUpperCase(),
        nome: document.getElementById('nome-especialidade').value,
        nome_graduacao_principal: document.getElementById('graduacao-especialidade').value,
        nivel_graduacao: document.getElementById('nivel-escolaridade-especialidade').value
      };

      try {
        if (editingId) {
          const { error } = await supabase.from('especialidades').update(dados).eq('id', editingId);
          if (error) throw error;
        } else {
          const { error } = await supabase.from('especialidades').insert([dados]);
          if (error) throw error;
        }

        UI.showToast('Catálogo atualizado!', 'success');
        document.getElementById('btn-cancelar-edicao').click();
        loadEspecialidades();
      } catch (err) {
        console.error(err);
        UI.showToast('Erro ao salvar especialidade', 'error');
      } finally {
        UI.hideLoader();
      }
    });

    document.getElementById('btn-voltar').onclick = () => {
       const urlParams = new URLSearchParams(window.location.search);
       const de = urlParams.get('from');
       if (de) window.location.href = `${de}.html`;
       else history.back();
    };

    loadEspecialidades();
  </script>
</body>

</html>
