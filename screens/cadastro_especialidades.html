<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/ui-utils.js"></script>
  <script type="module" src="../js/manager-context.js?v=2.7"></script>
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    .sci-fi-gradient {
      background: linear-gradient(135deg, rgba(13, 89, 242, 0.15) 0%, rgba(10, 14, 23, 0) 100%);
    }

    .glow-border:focus-within {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div
        class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-white/5 backdrop-blur-xl sticky top-0 z-50">
        <div id="btn-voltar" onclick="history.back()"
            class="text-primary flex size-12 shrink-0 items-center justify-start cursor-pointer hover:opacity-70 transition-opacity">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </div>
      <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">CADASTRO DE GRADUAÇÃO</h2>
      <div
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
        <span class="material-symbols-outlined">school</span>
      </div>
    </div>
  </header>
  <main class="flex-1 max-w-2xl mx-auto w-full p-4 space-y-8 pb-24">
    <section class="space-y-4">
      <div class="flex items-center justify-between px-1">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-sm">school</span>
            <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Gerenciamento</h2>
        </div>
        <button id="btn-toggle-form" class="bg-primary/20 hover:bg-primary/30 text-primary text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg border border-primary/30 transition-all flex items-center gap-2">
            <span id="icon-toggle" class="material-symbols-outlined text-sm">add_circle</span>
            <span id="txt-toggle">Criar Novo Cadastro</span>
        </button>
      </div>

      <div id="container-form" class="hidden bg-slate-900/50 border border-primary/20 rounded-xl p-6 sci-fi-gradient glow-border neon-border scroll-mt-24">
        <form id="form-especialidade" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Código da Graduação</label>
                <div class="relative">
                  <input id="codigo-especialidade"
                    class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100"
                    placeholder="Ex: ENG-CIV" type="text" required />
                  <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">tag</span>
                </div>
              </div>
            <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Nível Mínimo Exigido</label>
                <select id="nivel-escolaridade-especialidade"
                    class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-slate-100">
                    <option value="Médio">Nível Médio</option>
                    <option value="Técnico">Nível Técnico</option>
                    <option value="Superior">Nível Superior</option>
                    <option value="Pós-Graduação">Pós-Graduação / Especialização</option>
                </select>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Graduação Principal</label>
            <div class="relative">
              <input id="graduacao-especialidade"
                class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100 uppercase"
                placeholder="Ex: ENGENHARIA CIVIL" type="text" required />
              <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">school</span>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Especialidades Relacionadas</label>
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input id="input-multi-especialidade"
                      class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30 text-slate-100"
                      placeholder="Digite e pressione Enter ou clique em +" type="text" />
                    <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">workspace_premium</span>
                </div>
                <button type="button" id="btn-add-especialidade" class="bg-primary/20 text-primary border border-primary/30 p-3 rounded-lg hover:bg-primary/30 transition-all">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
            <div id="lista-tags-especialidades" class="flex flex-wrap gap-2 mt-2">
                <!-- Chips aparecerão aqui -->
            </div>
          </div>

          <div class="flex gap-2">
            <button id="btn-submit-especialidade"
              class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
              type="submit">
              <span class="material-symbols-outlined">save</span>
              <span id="label-submit">Salvar no Catálogo</span>
            </button>
            <button id="btn-cancelar-edicao"
              class="hidden px-6 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-4 rounded-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
              type="button">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </form>
      </div>
    </section>
    <section class="space-y-4">
      <div class="flex flex-col gap-4 px-1">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">database</span>
                <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Especialidades Ativas</h2>
            </div>
            <span id="total-especialidades" class="text-[10px] bg-primary/20 text-primary px-2 py-1 rounded-full font-bold">0 REGISTROS</span>
        </div>
        
        <div class="relative">
            <input id="filtro-especialidades" type="text" placeholder="Filtrar por graduação ou especialidade..." 
                class="w-full bg-white/5 border border-white/10 rounded-xl px-10 py-3 text-xs focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            <span class="material-symbols-outlined absolute left-3 top-3 text-slate-500 text-sm">search</span>
        </div>
      </div>

      <div id="lista-especialidades" class="space-y-3">
        <!-- Lista Dinâmica -->
      </div>
    </section>
  </main>
  
  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 no-print bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
      <div class="flex items-center justify-around w-full max-w-md px-6">
          <a id="nav-inicio" href="dashboard.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-2xl">home</span>
              <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
          </a>
          <a href="estatistica_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-2xl">bar_chart</span>
              <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
          </a>
          <a href="diario_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors relative">
              <span class="material-symbols-outlined text-2xl">edit_note</span>
              <span class="text-[9px] font-black uppercase tracking-widest text-center">Diário</span>
              <span id="notif-badge-footer" class="absolute top-0 right-0 size-3.5 bg-amber-500 text-white text-[7px] font-black rounded-full flex items-center justify-center border border-background-dark hidden">0</span>
          </a>
          <a id="nav-perfil-link" href="perfil_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-2xl">person</span>
              <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
          </a>
      </div>
  </nav>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { UI } from '../js/ui-utils.js';
    import { Auth } from '../js/auth.js';
    import { Notifications } from '../js/notifications.js';

    Auth.checkSession(['Gestor', 'Admin']);
    let editingId = null;
    let currentTags = [];
    let allData = [];

    // Toggle Form
    document.getElementById('btn-toggle-form').onclick = () => {
        const container = document.getElementById('container-form');
        const isHidden = container.classList.contains('hidden');
        const txt = document.getElementById('txt-toggle');
        const icon = document.getElementById('icon-toggle');

        if (isHidden) {
            container.classList.remove('hidden');
            txt.innerText = 'Sair do Cadastro';
            icon.innerText = 'cancel';
            document.getElementById('codigo-especialidade').focus();
            window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        } else {
            fecharForm();
        }
    };

    function fecharForm() {
        editingId = null;
        currentTags = [];
        renderTags();
        document.getElementById('form-especialidade').reset();
        document.getElementById('container-form').classList.add('hidden');
        document.getElementById('label-submit').innerText = 'Salvar no Catálogo';
        document.getElementById('btn-cancelar-edicao').classList.add('hidden');
        
        document.getElementById('txt-toggle').innerText = 'Criar Novo Cadastro';
        document.getElementById('icon-toggle').innerText = 'add_circle';
    }

    document.getElementById('btn-cancelar-edicao').onclick = fecharForm;

    // Multi-Tags logic
    const inputTag = document.getElementById('input-multi-especialidade');
    const btnAddTag = document.getElementById('btn-add-especialidade');

    function addTag() {
        const val = inputTag.value.trim();
        if (val && !currentTags.includes(val)) {
            currentTags.push(val);
            renderTags();
            inputTag.value = '';
            inputTag.focus();
        }
    }

    inputTag.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addTag(); } };
    btnAddTag.onclick = addTag;

    function renderTags() {
        const container = document.getElementById('lista-tags-especialidades');
        container.innerHTML = currentTags.map((tag, idx) => `
            <div class="flex items-center gap-2 bg-primary/10 border border-primary/30 text-primary px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider animate-in fade-in zoom-in slide-in-from-left-2 duration-300">
                ${tag}
                <button type="button" onclick="removeTag(${idx})" class="hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
            </div>
        `).join('');
    }

    window.removeTag = (idx) => {
        currentTags.splice(idx, 1);
        renderTags();
    };

    async function loadEspecialidades() {
      const container = document.getElementById('lista-especialidades');
      const countSpan = document.getElementById('total-especialidades');

      try {
        const { data, error } = await supabase.from('especialidades').select('*').order('nome_graduacao_principal');
        if (error) throw error;

        allData = data;
        renderList(allData);

      } catch (err) {
        console.error('Erro ao carregar especialidades:', err);
      }
    }

    function renderList(items) {
        const container = document.getElementById('lista-especialidades');
        const countSpan = document.getElementById('total-especialidades');
        countSpan.innerText = `${items.length} REGISTROS`;

        if (items.length === 0) {
            container.innerHTML = '<p class="text-center py-8 opacity-40 text-xs uppercase font-bold tracking-widest">Nenhum registro encontrado</p>';
            return;
        }

        // Agrupar por graduação para exibição mais limpa
        const grouped = items.reduce((acc, curr) => {
            const gName = curr.nome_graduacao_principal || 'SEM GRADUAÇÃO';
            if (!acc[gName]) acc[gName] = [];
            acc[gName].push(curr);
            return acc;
        }, {});

        // Helper para gerar ID único baseado no nome
        const slugify = (text) => text.toString().toLowerCase().trim()
            .replace(/\s+/g, '-')     // Substitui espaços por hífens
            .replace(/[^\w-]+/g, '')   // Remove caracteres não alfanuméricos
            .replace(/--+/g, '-');    // Remove hífens múltiplos

        container.innerHTML = Object.entries(grouped).map(([grad, list]) => {
            const gradId = slugify(grad);
            const baseCode = list[0].codigo.split('-')[0];
            const nivel = list[0].nivel_graduacao;

            return `
            <div class="bg-slate-900/40 border border-white/5 rounded-2xl overflow-hidden shadow-xl mb-4">
                <div class="bg-primary/5 px-4 py-3 border-b border-white/5 flex justify-between items-center">
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-widest text-primary">${grad}</h3>
                        <p class="text-[9px] text-slate-500 uppercase font-bold">${nivel} • ${baseCode}</p>
                    </div>
                    <span class="text-[9px] bg-white/5 px-2 py-1 rounded text-slate-500 font-bold">${list.length} ESPEC.</span>
                </div>
                <div class="p-3 grid grid-cols-1 gap-2">
                    ${list.map(e => `
                        <div id="card-esp-${e.id}" class="group bg-white/5 rounded-xl border border-transparent hover:border-primary/20 transition-all overflow-hidden">
                            <!-- Modo Visualização -->
                            <div id="view-esp-${e.id}" class="flex items-center justify-between p-3">
                                <div class="flex items-center gap-3">
                                    <div class="text-[10px] font-mono text-slate-500 bg-white/5 px-2 py-1 rounded border border-white/5">
                                        ${e.codigo}
                                    </div>
                                    <span class="text-xs font-bold text-slate-200 uppercase">${e.nome}</span>
                                </div>
                                <div class="flex gap-2 opacity-40 group-hover:opacity-100 transition-opacity">
                                    <button onclick='prepararEdicaoInline("${e.id}", "${e.codigo}", "${e.nome}", "${e.nome_graduacao_principal}", "${e.nivel_graduacao}")' 
                                            class="p-2.5 bg-primary/10 border border-primary/20 rounded-xl text-primary hover:bg-primary/20 hover:scale-110 shadow-lg shadow-primary/5 transition-all group/btn"
                                            title="Editar Especialidade">
                                        <span class="material-symbols-outlined text-lg">edit_note</span>
                                    </button>
                                    <button onclick="deletarEspecialidade('${e.id}')" 
                                            class="p-2.5 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-500 hover:bg-rose-500/20 hover:scale-110 shadow-lg shadow-rose-500/5 transition-all group/btn"
                                            title="Excluir Especialidade">
                                        <span class="material-symbols-outlined text-lg">delete_forever</span>
                                    </button>
                                </div>

                            </div>

                            <!-- Modo Edição Inline -->
                            <div id="edit-esp-${e.id}" class="hidden p-4 bg-primary/5 border-t border-primary/20 space-y-4 animate-in slide-in-from-top-2">
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="space-y-1">
                                        <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Código</label>
                                        <input id="inline-cod-${e.id}" class="w-full bg-slate-900 border-white/10 rounded-lg px-3 py-2 text-xs text-slate-100 uppercase" value="${e.codigo}">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Nível</label>
                                        <select id="inline-nivel-${e.id}" class="w-full bg-slate-900 border-white/10 rounded-lg px-3 py-2 text-xs text-slate-100">
                                            <option value="Médio" ${e.nivel_graduacao === 'Médio' ? 'selected' : ''}>Médio</option>
                                            <option value="Técnico" ${e.nivel_graduacao === 'Técnico' ? 'selected' : ''}>Técnico</option>
                                            <option value="Superior" ${e.nivel_graduacao === 'Superior' ? 'selected' : ''}>Superior</option>
                                            <option value="Pós-Graduação" ${e.nivel_graduacao === 'Pós-Graduação' ? 'selected' : ''}>Pós-Graduação</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Graduação Principal</label>
                                    <input id="inline-grad-${e.id}" class="w-full bg-slate-900 border-white/10 rounded-lg px-3 py-2 text-xs text-slate-100 uppercase" value="${e.nome_graduacao_principal}">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Especialidade (Nome)</label>
                                    <input id="inline-nome-${e.id}" class="w-full bg-slate-900 border-white/10 rounded-lg px-3 py-2 text-xs text-slate-100 uppercase" value="${e.nome}">
                                </div>
                                <div class="flex gap-2 pt-2">
                                    <button onclick="salvarEdicaoInline('${e.id}')" class="flex-1 bg-primary text-white text-[10px] font-black uppercase py-2 rounded-lg hover:bg-primary/80 transition-all">Salvar</button>
                                    <button onclick="cancelarEdicaoInline('${e.id}')" class="px-4 bg-slate-800 text-slate-300 text-[10px] font-black uppercase py-2 rounded-lg hover:bg-slate-700 transition-all">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}

                    <!-- Adicionar Especialidade -->
                    <div id="btn-add-container-${gradId}" class="mt-2">
                        <button onclick="mostrarFormAddInline('${gradId}', '${grad}', '${baseCode}', '${nivel}', ${list.length})" class="w-full py-2.5 border border-dashed border-white/10 hover:border-primary/40 hover:bg-primary/5 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-all flex items-center justify-center gap-2 group/btn">
                            <span class="material-symbols-outlined text-sm group-hover/btn:scale-125 transition-transform">add_circle</span>
                            Adicionar Especialidade
                        </button>
                    </div>

                    <div id="form-add-esp-${gradId}" class="hidden p-4 bg-primary/5 border border-primary/20 rounded-xl space-y-4 animate-in zoom-in-95 duration-200">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="material-symbols-outlined text-primary text-sm">workspace_premium</span>
                            <span class="text-[10px] font-black uppercase tracking-widest text-primary">Nova Especialidade</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Código Sugerido</label>
                                <input id="new-inline-cod-${gradId}" class="w-full bg-slate-900 border-white/10 rounded-lg px-3 py-2 text-xs text-slate-100 uppercase" value="">
                            </div>
                            <div class="space-y-1 px-3 py-2">
                                <label class="text-[9px] font-bold uppercase opacity-50 block">Nível</label>
                                <span class="text-[11px] font-bold text-slate-300 uppercase">${nivel}</span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold uppercase opacity-50 ml-1 text-primary">Especialidade (Nome)</label>
                            <input id="new-inline-nome-${gradId}" placeholder="Ex: GESTÃO AMBIENTAL" class="w-full bg-slate-900 border-primary/30 rounded-lg px-3 py-2 text-xs text-slate-100 uppercase focus:ring-1 focus:ring-primary outline-none">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="salvarNovoInline('${gradId}', '${grad}', '${nivel}')" class="flex-1 bg-primary text-white text-[10px] font-black uppercase py-2.5 rounded-lg hover:bg-primary/80 transition-all shadow-lg shadow-primary/20">Salvar Nova</button>
                            <button onclick="cancelarAddInline('${gradId}')" class="px-4 bg-slate-800 text-slate-300 text-[10px] font-black uppercase py-2.5 rounded-lg hover:bg-slate-700 transition-all">Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    // Filtro em tempo real
    document.getElementById('filtro-especialidades').oninput = (e) => {
        const termo = e.target.value.toLowerCase().trim();
        const filtered = allData.filter(e => 
            e.nome.toLowerCase().includes(termo) || 
            e.nome_graduacao_principal.toLowerCase().includes(termo) ||
            e.codigo.toLowerCase().includes(termo)
        );
        renderList(filtered);
    };

    window.prepararEdicaoInline = (id, codigo, nome, grad, nivel) => {
        // Fechar outras edições abertas
        document.querySelectorAll('[id^="edit-esp-"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('[id^="view-esp-"]').forEach(el => el.classList.remove('hidden'));

        document.getElementById(`view-esp-${id}`).classList.add('hidden');
        document.getElementById(`edit-esp-${id}`).classList.remove('hidden');
        document.getElementById(`inline-nome-${id}`).focus();
    };

    window.cancelarEdicaoInline = (id) => {
        document.getElementById(`view-esp-${id}`).classList.remove('hidden');
        document.getElementById(`edit-esp-${id}`).classList.add('hidden');
    };

    window.mostrarFormAddInline = (gradId, gradName, codeBase, nivel, count) => {
        // Fechar outras adições abertas
        document.querySelectorAll('[id^="form-add-esp-"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('[id^="btn-add-container-"]').forEach(el => el.classList.remove('hidden'));

        const form = document.getElementById(`form-add-esp-${gradId}`);
        const btn = document.getElementById(`btn-add-container-${gradId}`);
        const inputCod = document.getElementById(`new-inline-cod-${gradId}`);
        
        form.classList.remove('hidden');
        btn.classList.add('hidden');
        
        // Sugerir código
        inputCod.value = `${codeBase}-${count + 1}`;
        document.getElementById(`new-inline-nome-${gradId}`).focus();
    };

    window.cancelarAddInline = (gradId) => {
        document.getElementById(`form-add-esp-${gradId}`).classList.add('hidden');
        document.getElementById(`btn-add-container-${gradId}`).classList.remove('hidden');
    };

    window.salvarNovoInline = async (gradId, gradName, nivel) => {
        const nome = document.getElementById(`new-inline-nome-${gradId}`).value.trim().toUpperCase();
        const codigo = document.getElementById(`new-inline-cod-${gradId}`).value.trim().toUpperCase();

        if (!nome || !codigo) {
            UI.showToast('Preencha o nome e o código!', 'warning');
            return;
        }

        UI.showLoader();
        try {
            const { error } = await supabase.from('especialidades').insert([{
                nome,
                codigo,
                nome_graduacao_principal: gradName,
                nivel_graduacao: nivel
            }]);

            if (error) throw error;

            UI.showToast('Especialidade adicionada!', 'success');
            loadEspecialidades();
        } catch (err) {
            console.error(err);
            if (err.code === '23505') {
                UI.showToast('Erro: Código duplicado!', 'error');
            } else {
                UI.showToast('Erro ao adicionar especialidade', 'error');
            }
        } finally {
            UI.hideLoader();
        }
    };

    window.salvarEdicaoInline = async (id) => {
        const dados = {
            codigo: document.getElementById(`inline-cod-${id}`).value.trim().toUpperCase(),
            nome: document.getElementById(`inline-nome-${id}`).value.trim().toUpperCase(),
            nome_graduacao_principal: document.getElementById(`inline-grad-${id}`).value.trim().toUpperCase(),
            nivel_graduacao: document.getElementById(`inline-nivel-${id}`).value
        };

        if (!dados.codigo || !dados.nome || !dados.nome_graduacao_principal) {
            UI.showToast('Preencha todos os campos!', 'warning');
            return;
        }

        UI.showLoader();
        try {
            const { error } = await supabase.from('especialidades').update(dados).eq('id', id);
            if (error) throw error;
            UI.showToast('Atualizado com sucesso', 'success');
            loadEspecialidades();
        } catch (err) {
            console.error(err);
            UI.showToast('Erro ao atualizar registro', 'error');
        } finally {
            UI.hideLoader();
        }
    };

    window.prepararEdicao = (e) => {
        // Redireciona para o modo inline para consistência
        prepararEdicaoInline(e.id, e.codigo, e.nome, e.nome_graduacao_principal, e.nivel_graduacao);
    };

    window.deletarEspecialidade = async (id) => {
      if (!confirm('Deseja excluir este registro?')) return;
      UI.showLoader();
      try {
        const { error } = await supabase.from('especialidades').delete().eq('id', id);
        if (error) throw error;
        UI.showToast('Removido com sucesso', 'success');
        loadEspecialidades();
      } catch (err) {
        console.error(err);
        UI.showToast('Erro ao remover (pode estar em uso)', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    document.getElementById('form-especialidade').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const gradName = document.getElementById('graduacao-especialidade').value.trim().toUpperCase();
      const codeBase = document.getElementById('codigo-especialidade').value.trim().toUpperCase();
      const level = document.getElementById('nivel-escolaridade-especialidade').value;

      if (!gradName || !codeBase) return;
      if (currentTags.length === 0 && !editingId) {
          UI.showToast('Adicione pelo menos uma especialidade!', 'warning');
          return;
      }

      UI.showLoader();

      try {
        if (editingId) {
          const dados = {
            codigo: codeBase,
            nome: currentTags[0],
            nome_graduacao_principal: gradName,
            nivel_graduacao: level
          };
          const { error } = await supabase.from('especialidades').update(dados).eq('id', editingId);
          if (error) throw error;
        } else {
          // Salvar múltiplas especialidades
          const registros = currentTags.map((tag, idx) => ({
            codigo: currentTags.length > 1 ? `${codeBase}-${idx + 1}` : codeBase,
            nome: tag.toUpperCase(),
            nome_graduacao_principal: gradName,
            nivel_graduacao: level
          }));

          const { error } = await supabase.from('especialidades').insert(registros);
          if (error) throw error;
        }

        UI.showToast('Dados salvos com sucesso!', 'success');
        fecharForm();
        loadEspecialidades();
      } catch (err) {
        console.error(err);
        if (err.code === '23505') {
            UI.showToast('Erro: Código duplicado detectado!', 'error');
        } else {
            UI.showToast('Erro ao salvar. Verifique permissões.', 'error');
        }
      } finally {
        UI.hideLoader();
      }
    });

    // Inicialização
    const currentUser = Auth.getUser();
    if (currentUser) {
        UI.updateFooterNavigation(currentUser.role);
        UI.initSidebar(currentUser.role);
        Notifications.updateBadges();
    }

    loadEspecialidades();
  </script>
  <!-- Sidebar Menu Overlay -->
  <aside id="sidebarMenu" class="fixed top-0 left-0 h-full w-80 bg-background-dark border-r border-primary/20 z-[160] -translate-x-full transition-all duration-500 ease-out shadow-[20px_0_50px_rgba(0,0,0,0.5)]">
      <div class="flex flex-col h-full">
          <div class="p-8 border-b border-primary/10">
              <h3 class="text-primary font-black italic text-2xl tracking-tighter">CHRONOSYNC</h3>
              <p class="text-[10px] text-slate-500 uppercase font-bold tracking-[0.3em]">Console de Navegação</p>
          </div>
          <nav id="sidebarNav" class="flex-1 overflow-y-auto p-4 space-y-2">
              <!-- Injetado via UI.initSidebar() -->
          </nav>
          <div class="p-4 border-t border-primary/10 bg-black/20">
              <button onclick="window.Auth.logout()" class="w-full flex items-center gap-3 px-4 py-3 text-rose-500 hover:bg-rose-500/10 rounded-xl transition-all font-bold text-xs uppercase">
                  <span class="material-symbols-outlined">logout</span> Sair do Sistema
              </button>
          </div>
      </div>
  </aside>
  <div id="sidebarOverlay" onclick="UI.toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden opacity-0 transition-all duration-300"></div>
</body>

</html>
