<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(13, 89, 242, 0.1);
      position: absolute;
      z-index: 10;
    }

    .glow-blue {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }

    .glow-yellow {
      box-shadow: 0 0 10px rgba(234, 179, 8, 0.2);
    }
  </style>

  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    Auth.checkSession();
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-24 items-center">
    <!-- Header / Navigation -->
    <div class="flex items-center w-full max-w-md bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-primary/20 sticky top-0 z-40">
        <div id="btn-voltar"
            class="text-primary flex size-10 mt-2 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
            <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 uppercase tracking-widest">
            JUSTIFICATIVA</h2>
    </div>

  <main class="flex-1 w-full max-w-md p-6 space-y-6">
    <!-- Mission Briefing / Form Section -->
    <section class="bg-white/5 border border-primary/20 rounded-2xl p-6 relative overflow-hidden mt-6 shadow-inner">
      <div class="absolute top-0 right-0 p-2 opacity-10">
        <span class="material-symbols-outlined text-6xl">description</span>
      </div>
      <h3 class="text-primary text-sm font-bold tracking-widest uppercase mb-4 flex items-center gap-2 relative z-10">
        <span class="material-symbols-outlined text-sm">add_box</span> NOVA JUSTIFICATIVA
      </h3>
      <div class="space-y-4 relative z-10">
        <div class="flex flex-col gap-4">
          <div class="hidden">
            <input id="incidente_data" type="date" />
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-slate-400 text-xs uppercase font-bold tracking-wider">Tipo de Divergência</label>
            <select id="incidente_tipo"
              class="w-full bg-background-dark border border-slate-700 rounded-lg py-3 px-4 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-all">
              <option>Esquecimento de Registro</option>
              <option>Viagem a Trabalho</option>
              <option>Atividade Externa</option>
              <option>Visita Técnica</option>
              <option>Motivo de Saúde</option>
              <option>Problemas Técnicos</option>
              <option>Outros</option>
            </select>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label id="labelJustificativa"
            class="text-slate-400 text-xs uppercase font-bold tracking-wider">JUSTIFICATIVA</label>
          <textarea id="incidente_descricao"
            class="w-full bg-background-dark border border-slate-700 rounded-lg py-3 px-4 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
            placeholder='"O sistema de autenticação biométrica falhou ao reconhecer o ID do agente.'
            rows="3"></textarea>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-slate-400 text-xs uppercase font-bold tracking-wider">ANEXAR EVIDÊNCIA (FOTO/PDF)</label>
          <button id="btnAnexar" type="button"
            class="w-full flex items-center justify-center gap-3 bg-background-dark border border-dashed border-primary/40 hover:border-primary text-slate-400 hover:text-primary py-4 rounded-xl transition-all transform active:scale-[0.98] group overflow-hidden relative">
            <span class="material-symbols-outlined">add_a_photo</span>
            <span id="txtAnexar" class="uppercase tracking-widest text-[10px] font-bold">Anexar Documento</span>
          </button>
          <p class="text-[8px] text-slate-500 uppercase tracking-widest text-center mt-1">PDF, JPG, PNG • MÁX 10MB</p>
        </div>
        <button
          class="w-full bg-primary hover:bg-primary/80 text-white text-[10px] font-black py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all uppercase tracking-widest mt-4">
          <span class="material-symbols-outlined text-sm">send</span> Enviar Justificativa</button>
      </div>
    </section>

    <!-- Previous Logs Section -->
    <section class="space-y-4 mt-8 pb-10">
      <div class="flex justify-between items-center px-1">
        <h3 class="text-slate-100 text-[10px] font-black tracking-widest uppercase flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">history</span> Histórico
        </h3>
        <span id="labelTotalJustificativas" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Total: 0
          registros</span>
      </div>

      <div id="historicoJustificativas"
        class="space-y-4 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide hover:scrollbar-default transition-all">
        <!-- Logs dynamically injected here -->
      </div>
    </section>
    <!-- Log Card 2: Approved -->
    <!-- Log Card 3: Rejected -->
    </section>
  </main>
  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-slate-800 py-2 pb-6 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="dashboard.html"
        class="flex flex-col items-center justify-center w-16 h-14 group transition-all duration-300">
        <div class="p-1.5 rounded-xl group-hover:bg-primary/10 transition-colors duration-300 mb-1">
          <span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors text-2xl">home</span>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 group-hover:text-primary transition-colors">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center justify-center w-16 h-14 group transition-all duration-300">
        <div class="p-1.5 rounded-xl group-hover:bg-primary/10 transition-colors duration-300 mb-1">
          <span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors text-2xl">bar_chart</span>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 group-hover:text-primary transition-colors">Estatística</span>
      </a>
      <a href="diario_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">edit_note</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Diário</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center justify-center w-16 h-14 group transition-all duration-300">
        <div class="p-1.5 rounded-xl bg-primary/10 mb-1">
            <span class="material-symbols-outlined text-primary font-variation-settings-fill text-2xl">person</span>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest text-primary">Perfil</span>
      </a>
    </div>
  </nav>
  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';

    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('id') || localStorage.getItem('userId');

    const user = Auth.checkSession();
    if (user) {
      UI.updateFooterNavigation(user.userRole);
      const btnVoltar = document.getElementById('btn-voltar');
      if (btnVoltar) btnVoltar.onclick = () => UI.voltarInicio();
    }

    const inputData = document.getElementById('incidente_data');
    const selectTipo = document.getElementById('incidente_tipo');
    const inputDescricao = document.getElementById('incidente_descricao');
    const inputFile = document.getElementById('incidente_evidencia');
    const btnAnexar = document.getElementById('btnAnexar');
    const txtAnexar = document.getElementById('txtAnexar');
    const btnEnviar = document.querySelector('button.bg-primary');
    const historicoCont = document.getElementById('historicoJustificativas');
    const totalLabel = document.getElementById('labelTotalJustificativas');

    let editingId = null;
    let currentFile = null;

    btnAnexar.addEventListener('click', () => inputFile.click());

    inputFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 10 * 1024 * 1024) {
          UI.toast('Arquivo muito grande (Máx 10MB)', 'error');
          inputFile.value = '';
          return;
        }
        currentFile = file;
        txtAnexar.innerText = `Arquivo: ${file.name}`;
        btnAnexar.classList.remove('border-primary/40');
        btnAnexar.classList.add('border-emerald-500', 'text-emerald-500');
      }
    });

    // 1. Process URL Parameters
    window.addEventListener('load', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const tipo = urlParams.get('tipo');
      const motivo = urlParams.get('motivo');
      const data = urlParams.get('data');
      const now = new Date();
      const todayISO = now.toISOString().split('T')[0];
      const todayBR = now.toLocaleDateString('pt-BR');

      if (data) inputData.value = data;
      else inputData.value = todayISO;

      document.getElementById('labelJustificativa').innerText = `JUSTIFICATIVA (${todayBR})`;

      if (tipo) {
        // Check if option exists, otherwise add it
        let found = false;
        for (let i = 0; i < selectTipo.options.length; i++) {
          if (selectTipo.options[i].text.toLowerCase().includes(tipo.toLowerCase())) {
            selectTipo.selectedIndex = i;
            found = true;
            break;
          }
        }
        if (!found) {
          const opt = document.createElement('option');
          opt.value = opt.text = tipo;
          selectTipo.add(opt);
          selectTipo.value = tipo;
        }
      }

      if (motivo) inputDescricao.value = motivo;
    });

    async function loadHistory() {
      if (!targetUserId) return;

      try {
        // 1. Buscar Justificativas
        const { data: dataJust, error: errJust } = await supabase
          .from('justificativas')
          .select('*')
          .eq('funcionario_id', targetUserId)
          .order('data_incidente', { ascending: false });

        // 2. Buscar Pontos com GPS Pendente (para exibir como alerta no histórico)
        const { data: dataGps, error: errGps } = await supabase
          .from('pontos')
          .select('*')
          .eq('funcionario_id', targetUserId)
          .eq('status_validacao', 'pendente')
          .order('data_hora', { ascending: false });

        if (errJust) throw errJust;
        if (errGps) throw errGps;

        const combinedData = [
          ...(dataJust || []).map(j => ({ ...j, itemType: 'ABONO' })),
          ...(dataGps || []).map(g => ({
            id: g.id,
            data_incidente: g.data_hora.split('T')[0],
            tipo_divergencia: 'Divergência de GPS',
            descricao: g.justificativa_usuario || 'Batida fora do raio permitido.',
            status: 'pendente',
            itemType: 'GPS',
            hora: new Date(g.data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
          }))
        ].sort((a, b) => new Date(b.data_incidente) - new Date(a.data_incidente));

        totalLabel.innerText = `Total: ${combinedData.length} registros`;

        if (combinedData.length === 0) {
          historicoCont.innerHTML = `
                   <div class="text-center py-10 opacity-30">
                       <p class="text-xs uppercase tracking-widest">Nenhuma justificativa encontrada</p>
                   </div>
                `;
          return;
        }

        // Agrupar por data
        const grouped = combinedData.reduce((acc, item) => {
          const date = item.data_incidente;
          if (!acc[date]) acc[date] = [];
          acc[date].push(item);
          return acc;
        }, {});

        historicoCont.innerHTML = Object.keys(grouped).map(date => {
          const items = grouped[date];
          const dateFormatted = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

          return `
            <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden shadow-lg mb-4">
                <div class="bg-primary/10 px-4 py-3 border-b border-primary/10 flex justify-between items-center">
                    <span class="text-primary text-[10px] font-black uppercase tracking-widest">${dateFormatted}</span>
                    <span class="text-[9px] text-primary/80 font-black uppercase">${items.length} ${items.length > 1 ? 'REGISTROS' : 'REGISTRO'}</span>
                </div>
                <div class="p-4 space-y-4">
                    ${items.map(item => {
            const statusMap = {
              'pendente': 'bg-amber-500/10 text-amber-500 border-amber-500/20',
              'aprovada': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
              'rejeitada': 'bg-rose-500/10 text-rose-500 border-rose-500/20',
              'aprovado': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20', // Suporte a ambas as variações
              'rejeitado': 'bg-rose-500/10 text-rose-500 border-rose-500/20'
            };
            const statusClasses = statusMap[item.status.toLowerCase()] || 'bg-slate-500/10 text-slate-500 border-slate-500/20';
            return `
                            <div class="space-y-2 border-b border-white/5 pb-3 last:border-0 last:pb-0">
                                <div class="flex justify-between items-center text-[9px] font-bold uppercase tracking-widest">
                                    <span class="${item.itemType === 'GPS' ? 'text-orange-500' : 'text-accent'} flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[12px]">${item.itemType === 'GPS' ? 'location_on' : 'description'}</span>
                                        ${item.tipo_divergencia} ${item.hora ? '(' + item.hora + ')' : ''}
                                    </span>
                                    <span class="${statusClasses} px-2 py-0.5 rounded-full border border-current font-bold">${item.status}</span>
                                </div>
                                <div class="flex justify-between items-start group">
                                    <p class="text-slate-400 text-xs italic leading-relaxed flex-1">"${item.descricao}"</p>
                                    <div class="flex gap-1 ml-2 transition-opacity">
                                        ${item.itemType === 'ABONO' ? `
                                        <button onclick="window.editarJustificativa('${item.id}', '${item.data_incidente}', '${item.tipo_divergencia}', \`${item.descricao.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="p-1.5 text-slate-400 hover:text-primary transition-colors">
                                            <span class="material-symbols-outlined text-sm">edit</span>
                                        </button>
                                        <button onclick="window.excluirJustificativa('${item.id}')" class="p-1.5 text-slate-400 hover:text-rose-500 transition-colors">
                                            <span class="material-symbols-outlined text-sm">delete</span>
                                        </button>
                                        ` : `
                                        <span class="p-1.5 text-slate-600 cursor-help" title="Pendência de GPS gerada pelo sistema">
                                            <span class="material-symbols-outlined text-sm">info</span>
                                        </span>
                                        `}
                                    </div>
                                </div>
                            </div>
                        `;
          }).join('')}
                    
                    <!-- Anexos do Dia (Integrado) -->
                    <div class="pt-2 flex flex-wrap gap-2">
                         ${items.some(it => it.evidencia_url) ?
              items.filter(it => it.evidencia_url).map(it => `
                                <a href="${it.evidencia_url}" target="_blank" class="flex items-center gap-1.5 px-2 py-1 bg-primary/10 rounded-md border border-primary/20 hover:bg-primary/20 transition-all">
                                    <span class="material-symbols-outlined text-[10px]">attach_file</span>
                                    <span class="text-[8px] font-bold uppercase">Ver Evidência</span>
                                </a>
                            `).join('') : `
                             <div class="flex items-center gap-1.5 px-2 py-1 bg-white/5 rounded-md border border-white/5 opacity-50">
                                <span class="material-symbols-outlined text-[10px]">attach_file</span>
                                <span class="text-[8px] font-bold uppercase">Sem anexos vinculados</span>
                             </div>
                         `}
                    </div>
                </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error(err);
      }
    }

    // 3. Save
    async function saveJustificativa() {
      const dataVal = inputData.value;
      const tipoVal = selectTipo.value;
      const descVal = inputDescricao.value.trim();

      if (!dataVal || !descVal) {
        UI.toast('Preencha a data e a descrição.', 'warning');
        return;
      }

      UI.showLoader();
      try {
        let evidenciaUrl = null;
        if (currentFile) {
          const fileExt = currentFile.name.split('.').pop();
          const fileName = `${targetUserId}/${Date.now()}.${fileExt}`;
          const { data: uploadData, error: uploadError } = await supabase.storage
            .from('evidencias')
            .upload(fileName, currentFile);

          if (uploadError) {
            console.error('Erro detalhado no upload:', uploadError);
            throw new Error(`Erro no upload: ${uploadError.message || 'Verifique as políticas de Storage (RLS)'}`);
          }

          // Obter URL pública
          const { data: { publicUrl } } = supabase.storage
            .from('evidencias')
            .getPublicUrl(fileName);

          evidenciaUrl = publicUrl;
        }

        if (editingId) {
          // UPDATE
          const updateData = {
            data_incidente: dataVal,
            tipo_divergencia: tipoVal,
            descricao: descVal
          };
          if (evidenciaUrl) updateData.evidencia_url = evidenciaUrl;

          const { error } = await supabase
            .from('justificativas')
            .update(updateData)
            .eq('id', editingId);

          if (error) throw error;
          UI.toast('Justificativa atualizada!', 'success');
        } else {
          // INSERT
          const { error } = await supabase
            .from('justificativas')
            .insert([{
              funcionario_id: targetUserId,
              company_id: Auth.getUser()?.companyId,
              data_incidente: dataVal,
              tipo_divergencia: tipoVal,
              descricao: descVal,
              evidencia_url: evidenciaUrl,
              status: 'pendente'
            }]);

          if (error) throw error;
          UI.toast('Justificativa enviada com sucesso!', 'success');
        }

        inputDescricao.value = '';
        inputFile.value = '';
        currentFile = null;
        txtAnexar.innerText = 'Anexar Documento';
        btnAnexar.classList.remove('border-emerald-500', 'text-emerald-500');
        btnAnexar.classList.add('border-primary/40', 'text-slate-400');
        editingId = null;
        btnEnviar.innerHTML = '<span class="material-symbols-outlined">send</span> Enviar Justificativa';
        loadHistory();
      } catch (err) {
        console.error(err);
        UI.toast('Erro ao enviar justificativa.', 'error');
      } finally {
        UI.hideLoader();
      }
    }

    window.editarJustificativa = (id, data, tipo, descricao) => {
      editingId = id;
      inputData.value = data;
      selectTipo.value = tipo;
      inputDescricao.value = descricao;
      btnEnviar.innerHTML = '<span class="material-symbols-outlined">save</span> Atualizar Justificativa';
      inputDescricao.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.excluirJustificativa = async (id) => {
      if (!confirm('Deseja excluir esta justificativa?')) return;

      UI.showLoader();
      try {
        // 1. Buscar se existe anexo para deletar do storage
        const { data: item, error: fetchError } = await supabase
          .from('justificativas')
          .select('evidencia_url')
          .eq('id', id)
          .single();

        if (fetchError) throw fetchError;

        if (item && item.evidencia_url) {
          // Extrair o path relativo (tudo após o nome do bucket)
          // Ex: https://.../storage/v1/object/public/evidencias/userID/file.png -> userID/file.png
          const match = item.evidencia_url.match(/\/evidencias\/(.+)$/);
          const path = match ? match[1] : null;

          if (path) {
            const { error: storageError } = await supabase.storage.from('evidencias').remove([path]);
            if (storageError) console.error('Erro ao deletar arquivo do storage:', storageError);
          }
        }

        // 2. Deletar registro do banco
        const { error } = await supabase
          .from('justificativas')
          .delete()
          .eq('id', id);

        if (error) throw error;

        UI.toast('Justificativa excluída!', 'success');
        loadHistory();
      } catch (err) {
        console.error(err);
        UI.toast('Erro ao excluir.', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    btnEnviar.addEventListener('click', saveJustificativa);
    loadHistory();
  </script>
  <script type="module" src="../js/manager-context.js?v=2.7"></script>
</body>

</html>
