<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    .neon-border-blue {
      border: 1px solid rgba(0, 243, 255, 0.3);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
    }

    .neon-border-red {
      border: 1px solid rgba(255, 49, 49, 0.3);
      box-shadow: 0 0 15px rgba(255, 49, 49, 0.1);
    }

    .scanline {
      background: linear-gradient(to bottom, transparent 50%, rgba(13, 89, 242, 0.05) 51%);
      background-size: 100% 4px;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen scanline">
  <div
    class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-slate-800 shadow-2xl bg-background-dark overflow-hidden">
    <!-- Header -->
    <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
      <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
        <div onclick="history.back()"
          class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
          <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">PENDÊNCIAS DE ANÁLISE
        </h2>
        <div
          class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
          <span class="material-symbols-outlined">settings_input_component</span>
        </div>
      </div>
    </header>
    <!-- Stats Grid -->
    <!-- Section Title -->
    <div class="px-6 py-2 flex items-center justify-between">
      <h3 class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">Solicitações Pendentes</h3>
      <span class="flex h-2 w-2 rounded-full bg-neon-blue animate-pulse"></span>
    </div>
    <!-- Pending Requests List -->
    <div id="lista-justificativas" class="flex flex-col gap-4 p-4 pb-32">
      <!-- Container Dinâmico -->
    </div>

    <script type="module">
      import { supabase } from '../js/supabase-config.js';
      import { Auth } from '../js/auth.js';
      import { UI } from '../js/ui-utils.js';

      const user = Auth.getUser();

      async function loadJustificativas() {
        const container = document.getElementById('lista-justificativas');
        container.innerHTML = `<div class="text-center py-20 opacity-50"><span class="material-symbols-outlined animate-spin text-4xl text-primary">sync</span></div>`;

        try {
          // 1. Buscar Justificativas Pendentes
          let queryJust = supabase
            .from('justificativas')
            .select('*, funcionarios!inner(nome_completo, matricula, setor_id, funcao)')
            .eq('status', 'pendente');

          // 2. Buscar Pontos com GPS Pendente
          let queryGps = supabase
            .from('pontos')
            .select('*, funcionarios!inner(nome_completo, matricula, setor_id, funcao)')
            .eq('status_validacao', 'pendente');

          if (user.role === 'gestor' || user.role === 'manager') {
            if (user.setorId) {
              queryJust = queryJust.eq('funcionarios.setor_id', user.setorId);
              queryGps = queryGps.eq('funcionarios.setor_id', user.setorId);
            }
          }

          const [{ data: dataJust, error: errJust }, { data: dataGps, error: errGps }] = await Promise.all([
            queryJust,
            queryGps
          ]);

          if (errJust) throw errJust;
          if (errGps) throw errGps;

          // Normalizar e Unificar
          const allPendencies = [
            ...(dataJust || []).map(j => ({ ...j, itemType: 'ABONO' })),
            ...(dataGps || []).map(g => ({ ...g, itemType: 'GPS', data_incidente: g.data_hora, tipo_divergencia: 'Divergência de GPS', descricao: g.justificativa_usuario }))
          ].sort((a, b) => new Date(b.data_incidente || b.created_at) - new Date(a.data_incidente || a.created_at));

          if (allPendencies.length === 0) {
            container.innerHTML = `
                <div class="text-center py-20 opacity-30 border-2 border-dashed border-white/5 rounded-2xl">
                    <span class="material-symbols-outlined text-6xl mb-4">check_circle</span>
                    <p class="uppercase tracking-widest font-bold">Nenhuma pendência encontrada</p>
                </div>
            `;
            return;
          }

          container.innerHTML = allPendencies.map(item => {
            const isGps = item.itemType === 'GPS';
            const badgeClass = isGps ? 'bg-orange-500/10 text-orange-500 border-orange-500/20' : 'bg-amber-500/10 text-amber-500 border-amber-500/20';
            const icon = isGps ? 'location_on' : 'description';
            
            return `
                    <div class="flex flex-col rounded-xl bg-[#0f172a] border border-slate-800/60 p-5 shadow-xl relative w-full animate-in fade-in slide-in-from-bottom-4">
                        <div class="flex justify-between items-start mb-5">
                            <div class="flex gap-4">
                                <div class="relative flex-shrink-0">
                                    <div class="h-14 w-14 rounded-full border-2 border-primary/40 p-0.5">
                                        <div class="h-full w-full rounded-full bg-slate-800 flex items-center justify-center">
                                            <span class="material-symbols-outlined text-primary text-2xl">person</span>
                                        </div>
                                    </div>
                                    <div class="absolute -bottom-1 -right-1 bg-background-dark rounded-full p-0.5">
                                        <span class="material-symbols-outlined text-[12px] ${isGps ? 'text-orange-500' : 'text-amber-500'}">${icon}</span>
                                    </div>
                                </div>
                                <div class="flex flex-col">
                                    <h2 class="text-slate-100 font-bold text-base">${item.funcionarios.nome_completo}</h2>
                                    <p class="text-primary text-[11px] font-bold uppercase tracking-wider mb-0.5">${item.funcionarios.funcao || 'N/A'}</p>
                                    <div class="mt-1">
                                        <span class="text-[10px] px-2 py-0.5 rounded ${badgeClass} border font-bold uppercase inline-block">${isGps ? 'GPS PENDENTE' : 'ABONO PENDENTE'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-[16px] text-slate-400">calendar_month</span>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                ${new Date(item.data_incidente).toLocaleDateString('pt-BR')} 
                                ${isGps ? ' - ' + new Date(item.data_incidente).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : ''}
                            </p>
                        </div>

                        <div class="bg-black/30 rounded-lg p-3.5 mb-5 border-l-4 ${isGps ? 'border-orange-500' : 'border-amber-500'} font-medium">
                            <p class="text-slate-200 text-xs leading-relaxed">MOTIVO: ${item.tipo_divergencia.toUpperCase()}</p>
                            <p class="text-slate-400 text-[10px] mt-2 italic leading-relaxed">${item.descricao || (isGps ? 'Batida realizada fora do raio permitido.' : 'Sem descrição detalhada.')}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-2.5">
                            <button onclick="processarPendencia('${item.id}', 'rejeitado', '${item.itemType}')"
                                class="flex items-center justify-center gap-1.5 h-11 rounded-lg bg-neon-red/10 hover:bg-neon-red/20 text-neon-red text-[10px] font-bold transition-all border border-neon-red/20">
                                <span class="material-symbols-outlined text-sm">block</span> REJEITAR
                            </button>
                            <button onclick="processarPendencia('${item.id}', 'aprovado', '${item.itemType}')"
                                class="flex items-center justify-center gap-1.5 h-11 rounded-lg bg-primary hover:bg-primary/90 text-white text-[10px] font-bold transition-all shadow-[0_4px_12px_rgba(13,89,242,0.3)]">
                                <span class="material-symbols-outlined text-sm">verified</span> ${isGps ? 'VALIDAR GPS' : 'ABONAR'}
                            </button>
                        </div>
                    </div>
                `;
          }).join('');

        } catch (err) {
          console.error('Erro ao carregar pendências:', err);
          container.innerHTML = `<p class="text-red-500 text-center py-10 text-xs uppercase font-bold">Erro ao acessar base de dados</p>`;
        }
      }

      window.processarPendencia = async (id, status, type) => {
        UI.showLoader();
        try {
          let error;
          if (type === 'ABONO') {
            const result = await supabase.from('justificativas').update({ status: status }).eq('id', id);
            error = result.error;
          } else {
            const result = await supabase.from('pontos').update({ status_validacao: status }).eq('id', id);
            error = result.error;
          }

          if (error) throw error;

          UI.showToast(status === 'aprovado' ? 'Operação concluída!' : 'Solicitação rejeitada!', 'success');
          loadJustificativas();
        } catch (err) {
          console.error('Erro ao processar:', err);
          UI.showToast('Erro ao processar ação', 'error');
        } finally {
          UI.hideLoader();
        }
      };

      loadJustificativas();
    </script>
    <!-- Bottom Navigation -->
    <!-- Bottom Navigation -->
    <nav
      class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
      <div class="flex items-center justify-around w-full max-w-md px-6">
        <a id="nav-inicio" href="painel_admin.html"
          class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">home</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
        </a>
        <a href="estatistica_funcionario.html"
          class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">bar_chart</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
        </a>
        <a href="historico_anual.html"
          class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">history</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Histórico</span>
        </a>
        <a id="nav-perfil-link" href="perfil_funcionario.html"
          class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl font-variation-settings-fill">person</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
        </a>
      </div>
    </nav>
    <script type="module">
      import { Auth } from '../js/auth.js';
      import { UI } from '../js/ui-utils.js';
      window.addEventListener('load', () => {
        const user = Auth.getUser();
        if (user) UI.updateFooterNavigation(user.role);
      });
    </script>
    <script type="module" src="../js/manager-context.js?v=2.7"></script>
</body>

</html>
