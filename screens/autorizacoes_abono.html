<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    .neon-border-blue {
      border: 1px solid rgba(0, 243, 255, 0.3);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
    }

    .neon-border-red {
      border: 1px solid rgba(255, 49, 49, 0.3);
      box-shadow: 0 0 15px rgba(255, 49, 49, 0.1);
    }

    .scanline {
      background: linear-gradient(to bottom, transparent 50%, rgba(13, 89, 242, 0.05) 51%);
      background-size: 100% 4px;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }

</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen scanline">
  <div
    class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-slate-800 shadow-2xl bg-background-dark overflow-hidden">
    <!-- Header -->
    <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
      <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
        <div onclick="window.location.href='dashboard.html'"
          class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
          <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">PENDÊNCIAS DE ANÁLISE
        </h2>
        <div
          class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
          <span class="material-symbols-outlined">settings_input_component</span>
        </div>
      </div>
    </header>
    <!-- Stats Grid -->
    <!-- Section Title -->
    <div class="px-6 py-2 flex items-center justify-between">
      <h3 class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">Solicitações Pendentes</h3>
      <span class="flex h-2 w-2 rounded-full bg-neon-blue animate-pulse"></span>
    </div>
    <!-- Pending Requests List -->
    <div id="lista-justificativas" class="flex flex-col gap-4 p-4 pb-32">
      <!-- Container Dinâmico -->
    </div>

    <script type="module">
      import { supabase } from '../js/supabase-config.js';
      import { Auth } from '../js/auth.js';
      import { UI } from '../js/ui-utils.js';
      import { BusinessRulesManager } from '../js/business-rules-manager.js';

      const user = Auth.getUser();

      async function loadJustificativas() {
        const container = document.getElementById('lista-justificativas');
        container.innerHTML = `<div class="text-center py-20 opacity-50"><span class="material-symbols-outlined animate-spin text-4xl text-primary">sync</span></div>`;

        try {
          // 1. Buscar Justificativas Pendentes
          let queryJust = supabase
            .from('justificativas')
            .select('*, funcionarios!inner(nome_completo, matricula, setor_id, funcao)')
            .eq('status', 'pendente');

          // 2. Buscar Pontos com GPS Pendente
          let queryGps = supabase
            .from('pontos')
            .select('*, funcionarios!inner(nome_completo, matricula, setor_id, funcao)')
            .eq('status_validacao', 'pendente');

          // 3. Buscar Logs de Sistema (Divergências GPS no Diário)
          let queryLogs = supabase
            .from('diario_logs')
            .select('*, funcionarios!inner(nome_completo, matricula, setor_id, funcao)')
            .eq('status_pendencia', 'pendente')
            .not('tipo', 'in', '("comunicado","justificativa_resultado","gps_pulse")')
            .neq('tipo', 'aviso_ferias');

          const role = (user.role || '').toLowerCase();
          const isGestorOnly = ['manager', 'gestor', 'comandante'].includes(role);

          if (isGestorOnly && user.setorId) {
              const { data: setorialEmployees } = await supabase.from('funcionarios').select('id').eq('setor_id', user.setorId);
              const ids = (setorialEmployees || []).map(f => f.id);
              if (ids.length > 0) {
                  queryJust = queryJust.in('funcionario_id', ids);
                  queryGps = queryGps.in('funcionario_id', ids);
                  queryLogs = queryLogs.in('funcionario_id', ids);
              } else {
                  const z = '00000000-0000-0000-0000-000000000000';
                  queryJust = queryJust.eq('funcionario_id', z);
                  queryGps = queryGps.eq('funcionario_id', z);
                  queryLogs = queryLogs.eq('funcionario_id', z);
              }
          }

          const [{ data: dataJust, error: errJust }, { data: dataGps, error: errGps }, { data: dataLogs, error: errLogs }] = await Promise.all([
            queryJust,
            queryGps,
            queryLogs
          ]);

          if (errJust || errGps || errLogs) throw (errJust || errGps || errLogs);

          // Normalizar e Unificar
          const allPendencies = [
            ...(dataJust || []).map(j => ({ ...j, itemType: 'ABONO', file_url: j.evidencia_url })),
            ...((dataGps || []).map(g => {
                // 1. Obter mensagem técnica do sistema e justificativa do usuário
                const associatedLog = (dataLogs || []).find(l => 
                    l.tipo === 'pendencia_geofence' && 
                    l.funcionario_id === g.funcionario_id &&
                    Math.abs(new Date(l.data_hora || l.created_at) - new Date(g.data_hora)) < 60000
                );

                let sysMsg = associatedLog ? (associatedLog.mensagem_padrao || associatedLog.conteudo || '') : '';
                let userMsg = g.justificativa_usuario || '';
                
                // 2. Limpeza: Remover avisos irrelevantes de ambos
                const clean = (txt) => txt.replace(/\[EXPEDIENTE PRORROGADO:.*?\]/g, '').replace(/\[FOTO:.*?\]/g, '').trim();
                sysMsg = clean(sysMsg);
                userMsg = clean(userMsg);

                // 3. Combinar as mensagens de forma elegante
                let finalDesc = sysMsg;
                if (userMsg && userMsg !== sysMsg) {
                    finalDesc += (finalDesc ? '<br><span class="text-primary/70 font-bold uppercase text-[9px]">Justificativa:</span> ' : '') + userMsg;
                }

                const cleanDesc = finalDesc || 'Divergência de localização registrada pelo sistema.';

                return {
                    ...g, 
                    id: g.id, 
                    itemType: 'GPS', 
                    data_incidente: g.data_hora, 
                    tipo_divergencia: `SOLICITAÇÃO DE ${g.tipo.toUpperCase()} FORA DO RAIO`, 
                    descricao: cleanDesc, 
                    file_url: null 
                };
            })),
            ...(dataLogs || []).map(l => {
                let tipoLabel = 'OCORRÊNCIA DE SISTEMA';
                if (l.tipo === 'esquecimento_ponto') tipoLabel = 'ALERTA DE ESQUECIMENTO';
                else if (l.tipo === 'saida_intermediaria') tipoLabel = 'SOLICITAÇÃO DE ABONO (SAÍDA ANTECIPADA)';
                else if (l.tipo === 'gps_oculto') tipoLabel = 'DIVERGÊNCIA DE GPS (OCULTO)';
                else if (l.tipo === 'geofence_in') tipoLabel = 'RETORNO AO PERÍMETRO';
                else if (l.tipo === 'alerta_feriados_folgas') tipoLabel = 'ALERTA DE GESTÃO';
                else if (l.tipo === 'pendencia_geofence') tipoLabel = 'REGISTRO FORA DO PERÍMETRO';

                return { 
                  ...l, 
                  itemType: l.tipo === 'alerta_feriados_folgas' ? 'ALERTA_MENSAL' : 'SISTEMA', 
                  data_incidente: l.data_hora || l.created_at, 
                  tipo_divergencia: tipoLabel, 
                  descricao: l.mensagem_padrao || l.conteudo || l.justificativa_colaborador,
                  file_url: l.evidencia_url || l.arquivo_url || l.foto_url
                };
            })
          ].reduce((acc, current) => {
              // Priorizar o card de GPS (mais detalhado) e descartar o de SISTEMA (genérico) se forem do mesmo evento
              if (current.itemType === 'SISTEMA' && current.tipo === 'pendencia_geofence') {
                  const hasAssociatedPoint = acc.find(item => 
                      item.itemType === 'GPS' && 
                      item.funcionario_id === current.funcionario_id &&
                      Math.abs(new Date(item.data_incidente || item.data_hora) - new Date(current.data_incidente)) < 60000
                  );
                  if (hasAssociatedPoint) return acc;
              }
              
              // Caso o GPS venha DEPOIS do Log no array (raro devido ao sort, mas por segurança):
              if (current.itemType === 'GPS') {
                  const existingLogIdx = acc.findIndex(item => 
                      item.itemType === 'SISTEMA' && 
                      item.tipo === 'pendencia_geofence' &&
                      item.funcionario_id === current.funcionario_id &&
                      Math.abs(new Date(item.data_incidente) - new Date(current.data_hora)) < 60000
                  );
                  if (existingLogIdx > -1) acc.splice(existingLogIdx, 1);
              }

              acc.push(current);
              return acc;
          }, []).filter(item => {
              // Filtrar logs de pulso/hora ou resultados de análise que não requerem abono visual aqui
              if (item.itemType === 'SISTEMA' && (item.tipo === 'gps_pulse' || item.tipo === 'gps_hora' || item.tipo === 'justificativa_resultado')) return false;
              return true;
          }).sort((a, b) => new Date(b.data_incidente || b.created_at) - new Date(a.data_incidente || a.created_at));

          if (allPendencies.length === 0) {
            container.innerHTML = `
                <div class="text-center py-20 opacity-30 border-2 border-dashed border-white/5 rounded-2xl">
                    <span class="material-symbols-outlined text-6xl mb-4">check_circle</span>
                    <p class="uppercase tracking-widest font-bold">Nenhuma pendência encontrada</p>
                </div>
            `;
            return;
          }

          container.innerHTML = allPendencies.map(item => {
            // Renderização Modular para Alertas de Gestão
            if (item.itemType === 'ALERTA_MENSAL') {
                return AlertarFeriadosCard.render(item);
            }

            const isGps = item.itemType === 'GPS';
            const badgeClass = isGps ? 'bg-orange-500/10 text-orange-500 border-orange-500/20' : 'bg-amber-500/10 text-amber-500 border-amber-500/20';
            const icon = isGps ? 'location_on' : 'description';
            
            return `
                    <div class="flex flex-col rounded-xl bg-[#0f172a] border border-slate-800/60 p-5 shadow-xl relative w-full animate-in fade-in slide-in-from-bottom-4">
                        <div class="flex justify-between items-start mb-5">
                            <div class="flex gap-4">
                                <div class="relative flex-shrink-0">
                                    <div class="h-14 w-14 rounded-full border-2 border-primary/40 p-0.5">
                                        <div class="h-full w-full rounded-full bg-slate-800 flex items-center justify-center">
                                            <span class="material-symbols-outlined text-primary text-2xl">person</span>
                                        </div>
                                    </div>
                                    ${item.file_url ? `
                                    <a href="${item.file_url}" target="_blank" class="absolute -bottom-1 -right-1 bg-amber-500 rounded-full p-1 shadow-lg hover:scale-110 transition-transform flex items-center justify-center border-2 border-[#0f172a]">
                                        <span class="material-symbols-outlined text-[14px] text-white">attach_file</span>
                                    </a>
                                    ` : `
                                    <div class="absolute -bottom-1 -right-1 bg-background-dark rounded-full p-0.5">
                                        <span class="material-symbols-outlined text-[12px] ${isGps ? 'text-orange-500' : 'text-amber-500'}">${icon}</span>
                                    </div>
                                    `}
                                </div>
                                <div class="flex flex-col">
                                    <h2 class="text-slate-100 font-bold text-base">${item.funcionarios.nome_completo}</h2>
                                    <p class="text-primary text-[11px] font-bold uppercase tracking-wider mb-0.5">${item.funcionarios.funcao || 'N/A'}</p>
                                    <div class="mt-1">
                                        <span class="text-[10px] px-2 py-0.5 rounded ${badgeClass} border font-bold uppercase inline-block">PENDENTE</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-black/30 rounded-lg p-3.5 mb-5 border-l-4 ${isGps || item.itemType === 'SISTEMA' ? 'border-rose-500' : 'border-amber-500'} font-medium">
                            <div class="flex items-center gap-2 mb-2">
                                <p class="text-slate-200 text-xs leading-relaxed font-bold">${item.tipo_divergencia.toUpperCase()}</p>
                                <span class="text-[9px] text-slate-500 font-bold">
                                    ${item.itemType === 'ABONO' 
                                        ? `Ref: ${new Date(item.data_incidente + 'T12:00:00').toLocaleDateString('pt-BR')} | Enviado em: ${new Date(item.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`
                                        : `${new Date(item.data_incidente).toLocaleDateString('pt-BR')} | ${new Date(item.data_incidente).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`
                                    }
                                </span>
                            </div>
                            <p class="text-slate-400 text-[10px] mt-2 italic leading-relaxed">${item.descricao || (isGps || item.itemType === 'SISTEMA' ? 'Localização registrada automaticamente pelo sistema para validar sua presença em serviço durante a jornada.' : 'Sem descrição detalhada.')}</p>
                            
                            <div class="flex flex-wrap gap-3 mt-4">
                                ${item.file_url ? `
                                <a href="${item.file_url}" target="_blank" class="inline-flex items-center gap-2 px-4 py-2 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-500 hover:bg-amber-500/20 transition-all font-black min-h-[44px]">
                                    <span class="material-symbols-outlined text-lg">attach_file</span>
                                    <span class="text-[10px] uppercase tracking-widest">Ver Anexo</span>
                                </a>
                                ` : ''}

                                ${item.coordenadas || (item.latitude && item.longitude) ? `
                                <button onclick="toggleMap('${item.id}', '${item.coordenadas || (item.latitude + ',' + item.longitude)}', this)" class="inline-flex items-center gap-2 px-4 py-2 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-500 hover:bg-rose-500/20 transition-all font-black min-h-[44px]">
                                    <span class="material-symbols-outlined text-lg">map</span>
                                    <span class="text-[10px] uppercase tracking-widest label-map">Ver Mapa</span>
                                </button>
                                ` : ''}
                            </div>
                            
                            ${item.coordenadas || (item.latitude && item.longitude) ? `
                            <div id="map-container-${item.id}" class="hidden mt-4 w-full h-64 rounded-xl overflow-hidden border border-white/10 shadow-2xl animate-in zoom-in-95 duration-500">
                                <iframe id="iframe-map-${item.id}" width="100%" height="100%" frameborder="0" style="border:0; filter: invert(90%) hue-rotate(180deg) brightness(0.9) contrast(1.2);" allowfullscreen></iframe>
                            </div>
                            ` : ''}
                        </div>

                        <div class="grid grid-cols-2 gap-3 mt-2">
                            <button onclick="processarPendencia('${item.id}', 'rejeitado', '${item.itemType}')" class="flex items-center justify-center gap-2 h-[44px] rounded-xl bg-neon-red/10 hover:bg-neon-red/20 text-neon-red text-[11px] font-black tracking-widest transition-all border border-neon-red/20 uppercase"><span class="material-symbols-outlined text-lg">block</span> REJEITAR</button>
                            <button onclick="processarPendencia('${item.id}', 'aprovado', '${item.itemType}')" class="flex items-center justify-center gap-2 h-[44px] rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] font-black tracking-widest transition-all shadow-lg uppercase"><span class="material-symbols-outlined text-lg">verified</span> ABONAR</button>
                        </div>
                    </div>
                `;
          }).join('');

          if (typeof carregarResumoAlertas === 'function') await carregarResumoAlertas();

        } catch (err) {
          console.error('Erro ao carregar pendências:', err);
          container.innerHTML = `<p class="text-red-500 text-center py-10 text-xs uppercase font-bold">Erro ao acessar base de dados</p>`;
        }
      }

      function showAnalysisModal(config) {
          return new Promise((resolve) => {
              const modal = document.getElementById('modal-analise');
              const textarea = document.getElementById('obs-analise');
              const btnConfirm = document.getElementById('btn-confirmar-analise');
              const btnCancel = document.getElementById('btn-cancelar-analise');
              const title = document.getElementById('modal-title');
              
              title.innerText = config.title.toUpperCase();
              textarea.value = config.defaultValue || '';
              
              modal.classList.remove('hidden');
              modal.classList.add('flex');
              
              const finish = (result) => {
                  modal.classList.add('hidden');
                  modal.classList.remove('flex');
                  resolve(result);
              };
              
              btnConfirm.onclick = () => {
                  const val = textarea.value.trim();
                  if (!val) {
                      UI.showToast('Por favor, insira uma justificativa.', 'error');
                      return;
                  }
                  finish(val);
              };
              btnCancel.onclick = () => finish(null);
          });
      }

      window.processarPendencia = async (id, action, type) => {
        const status = action === 'aprovado' ? 'abonado' : 'rejeitado';
        const modalLabel = action === 'aprovado' ? 'Confirmar Abono' : 'MOTIVO DA RECUSA';
        
        UI.showLoader();
        try {
          // Buscar dados do incidente para a mensagem padrão (Query Flexível e Segura)
          const table = type === 'ABONO' ? 'justificativas' : (type === 'GPS' ? 'pontos' : 'diario_logs');
          // Selecionamos '*' para evitar erros de coluna inexistente dependendo da tabela (como data_hora)
          const { data: item } = await supabase.from(table).select('*').eq('id', id).single();
          UI.hideLoader();
          
          const rawDate = item?.data_incidente || item?.data_hora || item?.created_at;
          const dataRef = rawDate ? new Date(rawDate).toLocaleDateString('pt-BR') : '---';
          const msgPadrao = `Sua justificativa de ${dataRef} foi ${action === 'aprovado' ? 'ABONADA' : 'REJEITADA'}.`;
          
          const obs = await showAnalysisModal({ title: modalLabel, defaultValue: msgPadrao });
          if (!obs) return;

          if (action !== 'aprovado' && !confirm('Deseja realmente rejeitar esta solicitação?')) return;

          UI.showLoader();
          let error;
          if (type === 'ABONO') {
            // 1. Atualizar a Justificativa Original com a análise do gestor (Persistência Nativa)
            const { error: errJ } = await supabase.from('justificativas').update({ 
                status: status,
                observacao_admin: obs // Agora o campo existe no Supabase!
            }).eq('id', id);
            
            if (item?.funcionario_id) {
               // 2. Criar Log de Alerta para o Diário (Gatilho de Badge)
               await supabase.from('diario_logs').insert([{
                   funcionario_id: item.funcionario_id,
                   data_hora: new Date().toISOString(),
                   tipo: 'justificativa_resultado',
                   status_pendencia: 'pendente',
                   mensagem_padrao: `[ANÁLISE] ${obs}`
               }]);
               
               // 3. Limpar notificações antigas de solicitação
               await supabase.from('diario_logs').update({ status_pendencia: 'visto' }).eq('funcionario_id', item.funcionario_id).eq('tipo', 'justificativa').eq('status_pendencia', 'pendente');
            }
            error = errJ;
          } else if (type === 'SISTEMA' || type === 'ALERTA_MENSAL') {
            console.log('[Autorizacoes] Atualizando diario_logs:', { id, status });
            const result = await supabase.from('diario_logs').update({ status_pendencia: status }).eq('id', id);
            console.log('[Autorizacoes] Resultado:', result);
            error = result.error;
          } else {
            // Para a tabela 'pontos', o enum esperado é 'aprovado' em vez de 'abonado'
            const pointStatus = status === 'abonado' ? 'aprovado' : 'rejeitado';
            console.log(`[Autorizacoes] Analisando GPS/Ponto: ID ${id} -> ${pointStatus}`);
            const result = await supabase.from('pontos').update({ status_validacao: pointStatus }).eq('id', id);
            
            if (result.error) {
                console.error('[Autorizacoes] Erro crítico no Update do Ponto:', result.error);
                throw result.error;
            }
            console.log('[Autorizacoes] Ponto atualizado com sucesso.');

            // Tentativa de sincronização: buscar e baixar log de sistema pendente para este ponto
            if (item) {
                const { error: syncErr } = await supabase.from('diario_logs')
                    .update({ status_pendencia: status })
                    .eq('funcionario_id', item.funcionario_id)
                    .eq('tipo', 'pendencia_geofence')
                    .eq('status_pendencia', 'pendente')
                    .filter('data_hora', 'gte', new Date(new Date(item.data_hora).getTime() - 60000).toISOString())
                    .filter('data_hora', 'lte', new Date(new Date(item.data_hora).getTime() + 60000).toISOString());
                
                if (syncErr) console.warn('[Autorizacoes] Falha na sincronização do log (não fatal):', syncErr);
            }
          }

          // 4. Se for rejeição, acionar penalidades do BusinessRulesManager
          if (status === 'rejeitado') {
              console.log('[Autorizacoes] Acionando BusinessRulesManager para penalidades...');
              try {
                  await BusinessRulesManager.processRejection(item, type, obs);
                  console.log('[Autorizacoes] Penalidades aplicadas com sucesso.');
              } catch (penErr) {
                  console.error('[Autorizacoes] Falha ao aplicar penalidade:', penErr);
                  // Não interrompe o fluxo principal de sumir o card, pois o status já foi alterado
              }
          }

          UI.showToast(status === 'abonado' ? 'Solicitação Abonada!' : 'Solicitação Rejeitada!', 'success');
          
          // Recarregar com delay sincronizado
          setTimeout(() => loadJustificativas(), 1200);
        } catch (err) {
          console.error('[Autorizacoes] Erro fatal no processamento:', err);
          UI.showToast(`Erro: ${err.message || 'Verifique o console'}`, 'error');
        } finally {
          UI.hideLoader();
        }
      };

      window.toggleMap = (id, coords, btn) => {
          const container = document.getElementById(`map-container-${id}`);
          const iframe = document.getElementById(`iframe-map-${id}`);
          const label = btn.querySelector('.label-map');
          const isHidden = container.classList.contains('hidden');
          if (isHidden) {
              container.classList.remove('hidden');
              container.classList.add('block');
              label.innerText = 'Recolher Mapa';
              btn.classList.add('bg-rose-500', 'text-white', 'border-rose-500');
              const mapUrl = `https://maps.google.com/maps?q=${coords}&z=16&output=embed`;
              if (iframe.src !== mapUrl) iframe.src = mapUrl;
          } else {
              container.classList.add('hidden');
              container.classList.remove('block');
              label.innerText = 'Ver Localização';
              btn.classList.remove('bg-rose-500', 'text-white', 'border-rose-500');
          }
      };

      loadJustificativas();
    </script>
    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
      <div class="flex items-center justify-around w-full max-w-md px-6">
