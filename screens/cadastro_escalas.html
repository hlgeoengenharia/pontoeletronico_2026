<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Gestão de Escalas - Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .sci-fi-border {
      border: 1px solid rgba(13, 89, 242, 0.3);
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.1);
    }

    .sci-fi-gradient {
      background: linear-gradient(135deg, rgba(13, 89, 242, 0.1) 0%, rgba(16, 22, 34, 1) 100%);
    }

    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-24">
  <!-- Header -->
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
      <div onclick="history.back()"
        class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">GESTÃO DE ESCALAS</h2>
      <div
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
        <span class="material-symbols-outlined">admin_panel_settings</span>
      </div>
    </div>
  </header>
  <main class="p-4 max-w-2xl mx-auto space-y-6">
    <!-- Create Section -->
    <section class="sci-fi-gradient sci-fi-border rounded-xl p-6">
      <div class="flex items-center gap-2 mb-6">
        <span class="material-symbols-outlined text-primary">add_circle</span>
        <h2 class="text-lg font-bold uppercase tracking-wider">Criar Nova Escala</h2>
      </div>
      <form id="form-escala" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1 text-slate-400">Nome da Escala</label>
          <input id="nome_escala"
            class="w-full bg-background-dark/50 border-primary/30 rounded-lg focus:ring-primary focus:border-primary text-slate-100 p-3"
            placeholder="Ex: Plantão Alfa" type="text" required />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1 text-slate-400">Tipo de Escala</label>
            <select id="tipo_escala"
              class="w-full bg-background-dark/50 border-primary/30 rounded-lg focus:ring-primary focus:border-primary text-slate-100 p-3 outline-none">
              <option value="semanal">Semanal (Dias Fixos)</option>
              <option value="ciclo">Ciclo (Trabalho x Folga)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1 text-slate-400">Carga Semanal (h)</label>
            <input id="carga_horaria"
              class="w-full bg-background-dark/50 border-primary/30 rounded-lg focus:ring-primary focus:border-primary text-slate-100 p-3"
              placeholder="44" type="number" required />
          </div>
        </div>

        <!-- Campos para Ciclo (Ocultos por padrão) -->
        <div id="ciclo_inputs"
          class="hidden grid grid-cols-2 gap-4 p-4 border border-primary/20 bg-primary/5 rounded-lg border-dashed">
          <div>
            <label class="block text-xs font-bold text-primary uppercase mb-1">Horas de Trabalho</label>
            <input id="trab_total" class="w-full bg-background-dark/30 border-primary/20 rounded p-2 text-sm"
              type="number" value="12">
          </div>
          <div>
            <label class="block text-xs font-bold text-primary uppercase mb-1">Horas de Folga</label>
            <input id="folga_total" class="w-full bg-background-dark/30 border-primary/20 rounded p-2 text-sm"
              type="number" value="36">
          </div>
        </div>

        <!-- Campos para Semanal (Dias da Semana) -->
        <div id="semanal_inputs" class="pt-4">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-3">Dias de
            Trabalho na Semana</label>
          <div id="dias_semana_grid" class="flex justify-between gap-1">
            <button type="button" data-day="0"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">DOM</button>
            <button type="button" data-day="1"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">SEG</button>
            <button type="button" data-day="2"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">TER</button>
            <button type="button" data-day="3"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">QUA</button>
            <button type="button" data-day="4"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">QUI</button>
            <button type="button" data-day="5"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">SEX</button>
            <button type="button" data-day="6"
              class="day-toggle size-10 rounded border border-white/10 flex items-center justify-center text-[10px] font-bold">SAB</button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1 text-slate-400">Entrada</label>
            <input id="horario_entrada"
              class="w-full bg-background-dark/50 border-primary/30 rounded-lg focus:ring-primary focus:border-primary text-slate-100 p-3"
              type="time" required />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1 text-slate-400">Saída</label>
            <input id="horario_saida"
              class="w-full bg-background-dark/50 border-primary/30 rounded-lg focus:ring-primary focus:border-primary text-slate-100 p-3"
              type="time" required />
          </div>
        </div>
        <!-- Cálculo Resultado -->
        <div id="resultado_container"
          class="hidden bg-primary/10 border border-primary/30 rounded-lg p-3 text-center transition-all">
          <p id="dias_sugeridos" class="text-primary font-bold text-xs uppercase tracking-tight">--</p>
        </div>
        <div id="grid_placeholder" class="hidden">
        </div>
        <div class="flex gap-2">
          <button id="btn-submit-escala"
            class="flex-1 bg-primary hover:bg-primary/80 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(13,89,242,0.3)] transition-all transform active:scale-95 uppercase tracking-widest mt-4"
            type="submit">
            <span id="label-submit-escala">Confirmar Nova Escala</span>
          </button>
          <button id="btn-cancelar-escala"
            class="hidden px-6 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm mt-4"
            type="button">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </form>
    </section>
    <!-- Manage List Section -->
    <section class="space-y-4">
      <div class="flex items-center justify-between px-2">
        <h2 class="text-sm font-bold uppercase tracking-wider text-primary flex items-center gap-2">
          <span class="material-symbols-outlined">dataset</span>
          Escalas Ativas
        </h2>
        <span id="total-escalas" class="text-[10px] text-slate-500 font-mono bg-slate-800 px-2 py-1 rounded">03</span>
      </div>
      <div id="lista-escalas" class="space-y-3">
        <!-- Lista Dinâmica -->
      </div>
    </section>
  </main>
  </main>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { UI } from '../js/ui-utils.js';

    let diasSemanaSelecionados = [];

    // Toggle Visibilidade
    const tipoEscalaSel = document.getElementById('tipo_escala');
    const cicloInputs = document.getElementById('ciclo_inputs');
    const semanalInputs = document.getElementById('semanal_inputs');

    tipoEscalaSel.onchange = () => {
      if (tipoEscalaSel.value === 'ciclo') {
        cicloInputs.classList.remove('hidden');
        semanalInputs.classList.add('hidden');
      } else {
        cicloInputs.classList.add('hidden');
        semanalInputs.classList.remove('hidden');
      }
    };

    // Handler Dias da Semana
    document.querySelectorAll('.day-toggle').forEach(btn => {
      btn.onclick = () => {
        const day = parseInt(btn.dataset.day);
        if (diasSemanaSelecionados.includes(day)) {
          diasSemanaSelecionados = diasSemanaSelecionados.filter(d => d !== day);
          btn.classList.remove('bg-primary', 'text-white', 'border-primary');
        } else {
          diasSemanaSelecionados.push(day);
          btn.classList.add('bg-primary', 'text-white', 'border-primary');
        }
      };
    });

    async function loadEscalas() {
      const container = document.getElementById('lista-escalas');
      const countSpan = document.getElementById('total-escalas');

      try {
        const { data, error } = await supabase.from('escalas').select('*').order('nome');
        if (error) throw error;

        countSpan.innerText = String(data.length).padStart(2, '0');
        container.innerHTML = data.map(e => `
                <div class="bg-background-dark/40 border border-slate-800 p-4 rounded-xl flex items-center justify-between group hover:border-primary/50 transition-colors">
                  <div class="flex items-center gap-4">
                    <div class="size-12 rounded-lg bg-primary/10 border border-primary/30 flex items-center justify-center">
                      <span class="material-symbols-outlined text-primary">${e.tipo_escala === 'ciclo' ? 'sync' : 'calendar_month'}</span>
                    </div>
                    <div>
                      <h3 class="font-bold uppercase text-sm tracking-tight">${e.nome}</h3>
                      <p class="text-xs text-slate-500">
                        ${e.tipo_escala === 'ciclo'
            ? `Ciclo ${e.ciclo_config?.trab_total}h x ${e.ciclo_config?.folga_total}h`
            : `Semanal • ${e.dias_padrao?.length || 0} dias`
          } • ${e.horario_entrada} - ${e.horario_saida}
                      </p>
                    </div>
                  </div>
                  <div class="flex gap-2 opacity-40 group-hover:opacity-100 transition-opacity">
                    <button onclick="prepararEdicaoEscala('${e.id}', '${e.nome}', '${e.tipo_escala}', ${e.carga_horaria_semanal}, '${e.horario_entrada}', '${e.horario_saida}', ${JSON.stringify(e.dias_padrao)}, ${JSON.stringify(e.ciclo_config)})" class="p-2 hover:bg-primary/10 rounded-lg text-slate-400 hover:text-primary transition-colors">
                      <span class="material-symbols-outlined text-[20px]">edit</span>
                    </button>
                    <button onclick="deletarEscala('${e.id}')" class="p-2 hover:bg-red-500/20 rounded-lg text-slate-400 hover:text-red-500 transition-colors">
                      <span class="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                  </div>
                </div>
            `).join('');
      } catch (err) {
        console.error('Erro ao carregar escalas:', err);
        container.innerHTML = '<p class="text-red-500 text-center py-4">Erro ao carregar escalas</p>';
      }
    }

    let editingEscalaId = null;

    window.prepararEdicaoEscala = (id, nome, tipo, carga, entrada, saida, diasPadrao, cicloConfig) => {
      editingEscalaId = id;
      document.getElementById('nome_escala').value = nome;
      document.getElementById('tipo_escala').value = tipo;
      document.getElementById('carga_horaria').value = carga;
      document.getElementById('horario_entrada').value = entrada;
      document.getElementById('horario_saida').value = saida;

      // Reset e Aplica Visibilidade
      tipoEscalaSel.onchange();

      if (tipo === 'semanal') {
        diasSemanaSelecionados = diasPadrao || [];
        document.querySelectorAll('.day-toggle').forEach(btn => {
          const day = parseInt(btn.dataset.day);
          if (diasSemanaSelecionados.includes(day)) {
            btn.classList.add('bg-primary', 'text-white', 'border-primary');
          } else {
            btn.classList.remove('bg-primary', 'text-white', 'border-primary');
          }
        });
      } else if (tipo === 'ciclo' && cicloConfig) {
        document.getElementById('trab_total').value = cicloConfig.trab_total;
        document.getElementById('folga_total').value = cicloConfig.folga_total;
      }

      document.getElementById('label-submit-escala').innerText = 'Atualizar Escala';
      document.getElementById('btn-cancelar-escala').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('btn-cancelar-escala').onclick = () => {
      editingEscalaId = null;
      document.getElementById('form-escala').reset();
      diasSemanaSelecionados = [];
      document.querySelectorAll('.day-toggle').forEach(btn => btn.classList.remove('bg-primary', 'text-white', 'border-primary'));
      document.getElementById('label-submit-escala').innerText = 'Confirmar Nova Escala';
      document.getElementById('btn-cancelar-escala').classList.add('hidden');
      tipoEscalaSel.onchange();
    };

    window.deletarEscala = async (id) => {
      if (!confirm('Deseja excluir esta escala?')) return;
      UI.showLoader();
      try {
        const { error } = await supabase.from('escalas').delete().eq('id', id);
        if (error) {
          // Erro 23503: foreign_key_violation
          if (error.code === '23503') {
            UI.showToast('Não é possível excluir: Escala atribuída a funcionários', 'warning');
            return;
          }
          throw error;
        }
        UI.showToast('Escala removida', 'success');
        loadEscalas();
      } catch (err) {
        console.error('Erro ao deletar:', err);
        UI.showToast('Erro ao remover escala', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    document.getElementById('form-escala').addEventListener('submit', async (e) => {
      e.preventDefault();

      const tipo = tipoEscalaSel.value;
      if (tipo === 'semanal' && diasSemanaSelecionados.length === 0) {
        UI.showToast('Selecione ao menos um dia da semana', 'warning');
        return;
      }

      UI.showLoader();

      const dados = {
        nome: document.getElementById('nome_escala').value,
        tipo_escala: tipo,
        carga_horaria_semanal: parseInt(document.getElementById('carga_horaria').value) || 0,
        horario_entrada: document.getElementById('horario_entrada').value,
        horario_saida: document.getElementById('horario_saida').value,
        dias_trabalho_semana: tipo === 'semanal' ? diasSemanaSelecionados.length : 0,
        dias_padrao: tipo === 'semanal' ? diasSemanaSelecionados : null,
        ciclo_config: tipo === 'ciclo' ? {
          trab_total: parseInt(document.getElementById('trab_total').value),
          folga_total: parseInt(document.getElementById('folga_total').value)
        } : null
      };

      try {
        if (editingEscalaId) {
          const { error } = await supabase.from('escalas').update(dados).eq('id', editingEscalaId);
          if (error) throw error;
          UI.showToast('Escala atualizada!', 'success');
        } else {
          const { error } = await supabase.from('escalas').insert([dados]);
          if (error) throw error;
          UI.showToast('Escala configurada!', 'success');
        }

        document.getElementById('btn-cancelar-escala').click();
        loadEscalas();
      } catch (err) {
        console.error(err);
        UI.showToast('Erro ao processar escala', 'error');
      } finally {
        UI.hideLoader();
      }
    });

    loadEscalas();
  </script>

  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="painel_admin.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
      </a>
      <a href="historico_anual.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">history</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Histórico</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    window.addEventListener('load', () => {
      const user = Auth.getUser();
      if (user) UI.updateFooterNavigation(user.role);
    });
  </script>
  <script type="module" src="../js/manager-context.js?v=2.7"></script>
</body>

</html>
