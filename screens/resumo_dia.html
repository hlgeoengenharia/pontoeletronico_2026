<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/theme.js?v=1.0"></script>
    <script src="../js/manager-context.js?v=2.7"></script>
    <title>ChronoSync - Resumo do Dia</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; font-size: 10pt !important; }
            main { max-width: 100% !important; padding: 0 !important; }
            .bg-white\/5, .bg-emerald-500\/5, .bg-rose-500\/5, .bg-blue-500\/10 { background: white !important; border: 1px solid #e2e8f0 !important; }
            .text-slate-100, .text-slate-200, .text-slate-300 { color: black !important; }
            .text-slate-500, .text-slate-600 { color: #475569 !important; }
            .card-history { border: 1px solid #e2e8f0 !important; color: black !important; background: white !important; border-left-width: 3px !important; }
            .card-history p { color: black !important; }
            .stats-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 0.5rem !important; }
        }
        /* Audit Slim Card Styles */
        .audit-card { transition: all 0.3s ease; }
        @media print {
            .no-print { display: none !important; }
            .audit-card {
                background: white !important;
                border: 2px solid #334155 !important;
                border-radius: 12px !important;
                padding: 1.5rem !important;
                margin-bottom: 2rem !important;
                box-shadow: none !important;
                width: 100% !important;
                color: black !important;
            }
            .audit-card img { filter: grayscale(1) contrast(1.2); border-color: #334155 !important; }
            .audit-card h3 { color: black !important; border-bottom: 2px solid #334155 !important; }
            .audit-card .text-primary { color: black !important; font-weight: 800 !important; }
            .audit-card .text-slate-500 { color: #64748b !important; }
        }
        /* Estilos do Novo Card de Histórico */
        .card-history {
            position: relative;
            padding-left: 16px !important;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }
        .card-history.slim-mode {
            padding: 8px 12px !important;
            margin-bottom: 4px !important;
            border-radius: 8px !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }
        .card-history.slim-mode p { font-size: 10px !important; line-height: 1.4 !important; }
        .card-history.slim-mode .material-symbols-outlined { font-size: 10px !important; }
        .card-history::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 10px;
            background: currentColor;
            opacity: 0.8;
        }
        .premium-border-blue { color: #3b82f6; }
        .premium-border-amber { color: #f59e0b; }
        .premium-border-green { color: #10b981; }
        .premium-border-rose { color: #f43f5e; }
        .premium-border-purple { color: #a855f7; }

        .map-container-card {
            height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            margin-top: 0;
            opacity: 0;
        }
        .map-container-card.active {
            height: 250px;
            margin-top: 12px;
            opacity: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .edit-container-card {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .edit-container-card.active {
            max-height: 500px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 1;
        }
        /* Animações de Transição de Página (Slide) */
        @keyframes slide-out-to-left { 
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-30px); opacity: 0; }
        }
        @keyframes slide-out-to-right { 
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(30px); opacity: 0; }
        }
        @keyframes slide-in-from-right { 
            0% { transform: translateX(30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slide-in-from-left { 
            0% { transform: translateX(-30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .anim-slide-out-left { animation: slide-out-to-left 0.3s forwards ease-in; }
        .anim-slide-out-right { animation: slide-out-to-right 0.3s forwards ease-in; }
        .anim-slide-in-right { animation: slide-in-from-right 0.4s forwards ease-out; }
        .anim-slide-in-left { animation: slide-in-from-left 0.4s forwards ease-out; }

        .transition-container { transition: opacity 0.5s ease; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-24 font-['Space_Grotesk']">
    <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50 px-4">
        <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
            <div id="btn-voltar"
                class="no-print text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
                <span class="material-symbols-outlined">arrow_back</span>
            </div>
            <div class="text-center flex flex-col items-center">
                <h2 class="text-slate-100 text-lg font-black tracking-widest uppercase italic">Resumo do Dia</h2>
                <div class="flex items-center justify-center gap-4 mt-1">
                    <button onclick="navigateDay(-1)" class="no-print text-slate-500 hover:text-primary transition-all flex items-center justify-center bg-white/5 hover:bg-white/10 active:scale-95 rounded-xl w-12 h-12">
                        <span class="material-symbols-outlined text-2xl">chevron_left</span>
                    </button>
                    <p id="dataHeader" class="text-[10px] text-primary font-bold uppercase tracking-[0.2em] m-0">CARREGANDO...</p>
                    <button onclick="navigateDay(1)" class="no-print text-slate-500 hover:text-primary transition-all flex items-center justify-center bg-white/5 hover:bg-white/10 active:scale-95 rounded-xl w-12 h-12">
                        <span class="material-symbols-outlined text-2xl">chevron_right</span>
                    </button>
                </div>
            </div>
            <button onclick="window.print()" class="no-print text-slate-400 hover:text-white transition-all">
                <span class="material-symbols-outlined">picture_as_pdf</span>
            </button>
        </div>
    </header>

    <main id="main-content" class="max-w-2xl mx-auto p-4 md:p-8 space-y-8 transition-container">
        <div class="audit-card bg-slate-900 border border-white/5 rounded-3xl p-5 flex items-center gap-6 shadow-2xl relative group">
            <div class="relative w-24 h-24 rounded-2xl border-4 border-amber-500/30 overflow-hidden shrink-0 shadow-2xl transition-all group-hover:border-amber-500/50">
                <img id="user-photo-audit" src="https://ui-avatars.com/api/?name=User&background=020617&color=fff" 
                     class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent pointer-events-none"></div>
            </div>
            <div class="flex-1 min-w-0">
                <h3 id="user-nome-audit" class="text-xl font-black text-slate-100 uppercase italic truncate leading-tight border-b border-amber-500/20 pb-2 mb-2">
                    CARREGANDO...
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-1 gap-x-4">
                    <div class="flex items-center gap-2">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest leading-none">Cargo:</span>
                        <span id="user-cargo-audit" class="text-[9px] font-bold text-amber-500 uppercase truncate leading-none">---</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest leading-none">Setor:</span>
                        <span id="user-setor-audit" class="text-[9px] font-bold text-amber-500 uppercase truncate leading-none">---</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest leading-none">Matrícula:</span>
                        <span id="user-matricula-audit" class="text-[9px] font-bold text-amber-500 uppercase truncate leading-none">#---</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Estatísticas do Dia -->
        <div class="stats-grid grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white/5 border border-white/10 p-5 rounded-3xl border-l-4 border-l-slate-400 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Horário</p>
                <p id="horarioPrevisto" class="text-lg font-black text-slate-300 italic leading-none mt-1">--:-- / --:--</p>
            </div>
            <div class="bg-primary/5 border border-primary/10 p-5 rounded-3xl border-l-4 border-l-primary flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Trabalhado</p>
                <p id="totalTrabalhado" class="text-2xl font-black text-slate-100 italic leading-none mt-1">00:00</p>
            </div>
            <div class="bg-white/5 border border-white/10 p-5 rounded-3xl border-l-4 border-l-slate-400 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Previsto</p>
                <p id="totalEsperado" class="text-2xl font-black text-slate-300 italic leading-none mt-1">00:00</p>
            </div>
            <div id="saldoCard" class="bg-emerald-500/5 border border-emerald-500/10 p-5 rounded-3xl border-l-4 border-l-emerald-500 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Saldo</p>
                <p id="totalSaldo" class="text-2xl font-black text-emerald-400 italic leading-none mt-1">00:00</p>
            </div>
        </div>

        <!-- Detalhamento de Batidas -->
        <div class="bg-[#0f172a] border border-white/5 rounded-3xl overflow-hidden shadow-xl">
            <div class="bg-white/5 px-6 py-4 border-b border-white/5">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registros de Ponto</h4>
            </div>
            <div id="batidasContainer" class="p-6 space-y-4">
                <!-- Batidas serão injetadas aqui -->
            </div>
        </div>

        <!-- Observações e Justificativas -->
        <div id="containerObservacoes" class="space-y-4">
            <!-- Cards de Anotações e Justificativas -->
        </div>
    </main>

    <script type="module">
        import { supabase } from '../js/supabase-config.js';
        import { Auth } from '../js/auth.js';
        import { UI } from '../js/ui-utils.js';
        import { ScalesEngine } from '../js/scales-engine.js';
        import { Notifications } from '../js/notifications.js';

        async function init() {
            const btnVoltar = document.getElementById('btn-voltar');
            if (btnVoltar) btnVoltar.onclick = () => UI.voltarInicio();

            // Verificar se houve navegação por swipe para aplicar animação de entrada
            const lastNav = sessionStorage.getItem('last_nav_direction');
            if (lastNav) {
                const content = document.getElementById('main-content');
                const inClass = lastNav === 'next' ? 'anim-slide-in-right' : 'anim-slide-in-left';
                content.classList.add(inClass);
                sessionStorage.removeItem('last_nav_direction');
            }

            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id') || localStorage.getItem('userId');
            const dataRef = urlParams.get('date') || new Date().toISOString().split('T')[0];

            document.getElementById('dataHeader').innerText = new Date(dataRef + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();
            
            UI.showLoader();

            try {
                const { data: perfil, error: errPerfil } = await supabase
                    .from('perfis_tripulantes')
                    .select('*, funcionarios!inner(*, escalas(*), setores!funcionarios_setor_id_fkey(nome))')
                    .eq('funcionario_id', targetId)
                    .single();
                
                if (errPerfil) throw errPerfil;
                const func = { ...perfil.funcionarios, foto_url: perfil.foto_url };

                document.getElementById('user-nome-audit').innerText = func.nome_completo.toUpperCase();
                document.getElementById('user-cargo-audit').innerText = (func.cargos?.nome || func.funcao || 'N/A').toUpperCase();
                document.getElementById('user-setor-audit').innerText = (func.setores?.nome || 'N/A').toUpperCase();
                document.getElementById('user-matricula-audit').innerText = `#${func.matricula || '---'}`;
                
                // Photo Sync Logic with Error Fallback
                const photoImg = document.getElementById('user-photo-audit');
                if (func.foto_url) {
                    photoImg.src = func.foto_url;
                } else {
                    photoImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(func.nome_completo || 'User')}&background=020617&color=fbbf24&bold=true`;
                }
                photoImg.onerror = () => {
                    photoImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(func.nome_completo || 'User')}&background=020617&color=fbbf24&bold=true`;
                };

                const mySectorId = func.setor_id;
                const [ptsRes, anotRes, justRes, comsRes, logsRes, ferRes, vacRes] = await Promise.all([
                    supabase.from('pontos').select('*').eq('funcionario_id', targetId).gte('data_hora', `${dataRef}T00:00:00`).lte('data_hora', `${dataRef}T23:59:59`).order('data_hora', { ascending: true }),
                    supabase.from('anotacoes').select('*').eq('funcionario_id', targetId).eq('data', dataRef),
                    supabase.from('justificativas').select('*').eq('funcionario_id', targetId).eq('data_incidente', dataRef),
                    supabase.from('comunicados').select('*').or(`destinatario_id.eq.${targetId},tipo.eq.geral,setor_id.eq.${mySectorId || '00000000-0000-0000-0000-000000000000'}`).gte('created_at', `${dataRef}T00:00:00`).lte('created_at', `${dataRef}T23:59:59`),
                    supabase.from('diario_logs').select('*').eq('funcionario_id', targetId).gte('created_at', `${dataRef}T00:00:00`).lte('created_at', `${dataRef}T23:59:59`),
                    supabase.from('feriados_folgas').select('*').or(`funcionario_id.eq.${targetId},setor_id.eq.${mySectorId},escopo.eq.geral`).eq('data', dataRef),
                    supabase.from('ferias').select('*').eq('funcionario_id', targetId).eq('status', 'aprovado').lte('data_inicio', dataRef).gte('data_fim', dataRef)
                ]);

                const { EventManager } = await import('../js/event-manager.js');
                const { HistoryRenderer } = await import('../js/core/history.renderer.js');

                // 1. Unificar Histórico via Engine do Diário
                const unifiedHistory = EventManager.unifyHistory(
                    anotRes.data || [],
                    justRes.data || [],
                    comsRes.data || [],
                    logsRes.data || [],
                    vacRes.data || [],
                    ferRes.data || [],
                    { hideActions: true, isContextDiario: false }
                );

                renderResumo(ptsRes.data, unifiedHistory, func.escalas, dataRef, HistoryRenderer);
                Notifications.updateBadges();

            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao carregar resumo.', 'error');
            } finally {
                UI.hideLoader();
            }
        }

        function renderResumo(pontos, allItems, escala, dataRef, HistoryRenderer) {
            // Usando o helper centralizado do ScalesEngine para consistência
            const dateObj = new Date(dataRef + 'T12:00:00');
            const month = dateObj.getMonth();
            const year = dateObj.getFullYear();
            
            // Re-fetch manual dos feriados/ferias para o ScalesEngine decidir os badges do header
            // (Mas vamos usar as variáveis locais se possível)
            const plannedDays = (escala) ? ScalesEngine.projectBaseDays(escala, escala.vigencia_inicio, month, year) : [];
            
            // Determinar isenção para estatísticas
            const isPlanned = plannedDays.includes(dataRef);
            const isFeriado = allItems.some(i => i.itemType === 'FERIAS_FOLGA');
            const isVacation = allItems.some(i => i.itemType === 'CRONOGRAMA_FERIAS' || i.itemType === 'FERIAS');
            const dayExemptInfo = { 
                exempt: !isPlanned || isFeriado || isVacation, 
                type: isVacation ? 'FÉRIAS' : (isFeriado ? 'FERIADO' : 'FOLGA') 
            };
            
            // 1. Cálculos de Tempo
            const possessesLunch = escala?.possui_almoco !== false;
            let workedMins = calculateWorkedMinutes(pontos, possessesLunch);
            
            // Abono se aprovado
            const isAbonado = allItems.some(i => i.itemType === 'JUSTIFICATIVA' && (i.status === 'aprovado' || i.status === 'abonado'));
            
            const isFinished = ScalesEngine.isDayFinished(dataRef, escala);
            const shouldCharge = isPlanned && !dayExemptInfo.exempt && (pontos.length > 0 || isFinished);
            const dailyPlannedMinutes = shouldCharge ? ScalesEngine.calculateDailyWorkMinutes(escala) : 0;

            if (isAbonado && isPlanned && !dayExemptInfo.exempt) {
                workedMins = dailyPlannedMinutes; // Abono
            }

            const balance = workedMins - dailyPlannedMinutes;

            document.getElementById('totalTrabalhado').innerText = formatMinutes(workedMins);
            document.getElementById('totalEsperado').innerText = dayExemptInfo.exempt ? dayExemptInfo.type : formatMinutes(dailyPlannedMinutes);
            
            if (dayExemptInfo.exempt) {
                const badgeColor = dayExemptInfo.type === 'FÉRIAS' ? 'bg-blue-500' : (dayExemptInfo.type === 'FERIADO' ? 'bg-purple-500' : 'bg-slate-600');
                const existingBadge = document.querySelector('.status-exempt-badge');
                if (!existingBadge) {
                   document.getElementById('user-nome-audit').innerHTML += ` <span class="status-exempt-badge ml-2 px-3 py-1 ${badgeColor} text-white text-[10px] font-black rounded-full italic shadow-lg">EM ${dayExemptInfo.type}</span>`;
                }
            }
            
            const horarioEl = document.getElementById('horarioPrevisto');
            if (pontos && pontos.length > 0) {
                const primeiroPonto = new Date(pontos[0].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const ultimoPonto = pontos.length > 1 ? new Date(pontos[pontos.length - 1].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                horarioEl.innerText = `${primeiroPonto} / ${ultimoPonto}`;
            } else {
                horarioEl.innerText = dayExemptInfo.exempt ? dayExemptInfo.type : '--:-- / --:--';
            }
            
            const saldoLabel = document.getElementById('totalSaldo');
            if (dayExemptInfo.exempt) {
                saldoLabel.innerText = `00:00 | ${dayExemptInfo.type}`;
                saldoLabel.className = `text-xl font-black italic text-slate-500 opacity-60`;
                document.getElementById('saldoCard').className = `bg-slate-500/5 border border-slate-500/10 p-5 rounded-3xl border-l-4 border-l-slate-500`;
            } else {
                saldoLabel.innerText = formatBalance(balance);
                const isPositive = balance >= 0;
                document.getElementById('saldoCard').className = `bg-${isPositive ? 'emerald' : 'rose'}-500/5 border border-${isPositive ? 'emerald' : 'rose'}-500/10 p-5 rounded-3xl border-l-4 border-l-${isPositive ? 'emerald' : 'rose'}-500`;
                saldoLabel.className = `text-2xl font-black italic text-${isPositive ? 'emerald' : 'rose'}-400`;
            }

            // 2. Render Batidas (Visual do Espelho de Ponto)
            const batidasCont = document.getElementById('batidasContainer');
            if (pontos.length === 0) {
                batidasCont.innerHTML = '<p class="text-sm text-slate-500 italic text-center py-4">Nenhum registro de ponto encontrado.</p>';
            } else {
                batidasCont.innerHTML = `
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-4">
                            ${pontos.filter((_, i) => i % 2 === 0).map((p, i) => `
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-1.5 bg-emerald-500/10 p-2 rounded-lg">
                                        <span class="material-symbols-outlined text-emerald-500 text-sm">login</span>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <p class="text-[8px] font-black text-slate-500 uppercase tracking-tighter">Entrada ${i + 1}</p>
                                        </div>
                                        <p class="text-sm font-black text-slate-200">${formatTime(p)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="space-y-4">
                            ${pontos.filter((_, i) => i % 2 !== 0).map((p, i) => `
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-1.5 bg-rose-500/10 p-2 rounded-lg">
                                        <span class="material-symbols-outlined text-rose-500 text-sm">logout</span>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <p class="text-[8px] font-black text-slate-500 uppercase tracking-tighter">Saída ${i + 1}</p>
                                        </div>
                                        <p class="text-sm font-black text-slate-200">${formatTime(p)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 3. Render Cards Dinâmicos (HistoryRenderer)
            const obsCont = document.getElementById('containerObservacoes');
            obsCont.innerHTML = HistoryRenderer.renderList(allItems, { 
                isAdmin: localStorage.getItem('userRole') === 'Admin',
                isContextDiario: false,
                hideActions: true 
            });
        }

        function calculateWorkedMinutes(points, possuiAlmoco = true) {
            let mins = 0;
            // Filtrar apenas batidas aprovadas ou pendentes (ignorar rejeitadas)
            const activePoints = points.filter(p => p.status_validacao !== 'rejeitado');
            
            for (let i = 0; i < activePoints.length; i += 2) {
                if (activePoints[i + 1]) mins += (new Date(activePoints[i + 1].data_hora) - new Date(activePoints[i].data_hora)) / 60000;
            }

            // Dedução automática de 1h se configurado e jornada > 6h
            if (possuiAlmoco && mins > 360) mins -= 60;
            
            return Math.max(0, mins);
        }

        function formatTime(point) {
            if (!point) return '--:--';
            return new Date(point.data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function formatBalance(mins) {
            const absMins = Math.round(Math.abs(mins));
            const h = Math.floor(absMins / 60);
            const m = absMins % 60;
            return `${mins < 0 ? '-' : '+'}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function formatMinutes(mins) {
            const absMins = Math.round(Math.abs(mins));
            const h = Math.floor(absMins / 60);
            const m = absMins % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
        
        window.navigateDay = function(offset) {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            const currentDateStr = urlParams.get('date') || new Date().toISOString().split('T')[0];
            
            const dateObj = new Date(currentDateStr + 'T12:00:00');
            dateObj.setDate(dateObj.getDate() + offset);
            
            const newDateStr = dateObj.toISOString().split('T')[0];
            
            urlParams.set('date', newDateStr);
            if (targetId) {
                urlParams.set('id', targetId);
            }
            
            // Aplicar animação de saída
            const content = document.getElementById('main-content');
            const outClass = offset > 0 ? 'anim-slide-out-left' : 'anim-slide-out-right';
            content.classList.add(outClass);
            
            // Salvar direção para a animação de entrada na nova página
            sessionStorage.setItem('last_nav_direction', offset > 0 ? 'next' : 'prev');
            
            setTimeout(() => {
                window.location.href = `resumo_dia.html?${urlParams.toString()}`;
            }, 250);
        };

        // --- LÓGICA DE NAVEGAÇÃO POR SWIPE (Gesto) ---
        let touchStartX = 0;
        let touchStartY = 0;

        const handleStart = (e) => {
            touchStartX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            touchStartY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };

        const handleEnd = (e) => {
            const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            
            const diffX = touchStartX - endX;
            const diffY = touchStartY - endY;
            
            // Threshold: 100px para evitar toques acidentais
            // E garantir que o movimento horizontal é maior que o vertical
            if (Math.abs(diffX) > 100 && Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) {
                    navigateDay(1); // Swipe Left -> Próximo Dia
                } else {
                    navigateDay(-1); // Swipe Right -> Dia Anterior
                }
            }
        };

        // Adicionar a toda a página
        document.addEventListener('touchstart', handleStart, { passive: true });
        document.addEventListener('touchend', handleEnd, { passive: true });

        // Suporte para Mouse (Drag)
        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mouseup', handleEnd);

        const mapInstances = {};
        window.toggleMapaCard = (id, coordenadas) => {
            const container = document.getElementById(`map-card-${id}`);
            const btnTxt = document.getElementById(`txt-map-${id}`);
            const btnIcon = document.getElementById(`icon-map-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            
            if (isActive) {
                if (btnTxt) btnTxt.innerText = 'Fechar Visualização';
                if (btnIcon) btnIcon.innerText = 'close';
                
                setTimeout(() => {
                    if (!mapInstances[id]) {
                        const [lat, lng] = coordenadas.split(',').map(Number);
                        const map = L.map(`map-card-${id}`, {
                            zoomControl: false,
                            attributionControl: false
                        }).setView([lat, lng], 16);

                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                        
                        const pinIcon = L.divIcon({
                            html: `<span class="material-symbols-outlined text-rose-500 font-variation-settings-fill" style="font-size: 32px; filter: drop-shadow(0 0 5px rgba(244,63,94,0.5))">location_on</span>`,
                            className: 'custom-div-icon',
                            iconSize: [32, 32],
                            iconAnchor: [16, 32]
                        });

                        L.marker([lat, lng], {icon: pinIcon}).addTo(map);
                        mapInstances[id] = map;
                    } else {
                        mapInstances[id].invalidateSize();
                    }
                }, 300);
            } else {
                if (btnTxt) btnTxt.innerText = 'Ver Localização no Mapa';
                if (btnIcon) btnIcon.innerText = 'map';
            }
        };

        window.toggleEditCard = (id, type, currentContent) => {
            const container = document.getElementById(`edit-card-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            if (isActive) {
                container.innerHTML = `
                    <div class="space-y-3">
                        <label class="text-[9px] font-black uppercase tracking-widest text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">edit_note</span>
                            ${type === 'atividade' ? 'Editar Atividade' : 'Responder Justificativa'}
                        </label>
                        <textarea id="edit-text-${id}" 
                            class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-xs text-slate-100 placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                            rows="4">${currentContent}</textarea>
                        <div class="flex gap-2">
                            <button onclick="window.salvarEdicaoCard('${id}', '${type}')" 
                                class="flex-1 bg-primary text-white text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:bg-primary/80">
                                Salvar Alterações
                            </button>
                            <button onclick="window.toggleEditCard('${id}')" 
                                class="px-4 bg-white/5 border border-white/10 text-slate-400 text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:text-white">
                                Cancelar
                            </button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        };

        window.excluirItem = async (id, type) => {
            if (!confirm('Deseja excluir permanentemente este registro?')) return;
            UI.showLoader();
            try {
                let table = type === 'ATIVIDADE' ? 'anotacoes' : (type === 'JUSTIFICATIVA' ? 'justificativas' : 'diario_logs');
                const { error } = await supabase.from(table).delete().eq('id', id);
                if (error) throw error;
                UI.showToast('Excluído com sucesso!', 'success');
                await loadDiario();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao excluir.', 'error');
            } finally { UI.hideLoader(); }
        };

        window.salvarEdicaoCard = async (id, type) => {
            const newContent = document.getElementById(`edit-text-${id}`).value;
            if (!newContent.trim()) {
                UI.showToast('O conteúdo não pode estar vazio.', 'warning');
                return;
            }

            UI.showLoader();
            try {
                let error;
                if (type === 'atividade') {
                    const res = await supabase.from('anotacoes').update({ conteudo: newContent }).eq('id', id);
                    error = res.error;
                } else {
                    const res = await supabase.from('diario_logs').update({ justificativa_colaborador: newContent, status_pendencia: 'em_analise' }).eq('id', id);
                    error = res.error;
                }

                if (error) throw error;

                UI.showToast('Registrado com sucesso!', 'success');
                window.toggleEditCard(id);
                init(); // Recarrega os dados
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao salvar alteração.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        window.marcarComunicadoLido = async (id) => {
            UI.showLoader();
            try {
                // Persistência local imediata
                localStorage.setItem(`ciente_${id}`, 'true');

                const { error } = await supabase
                    .from('comunicados')
                    .update({ lido: true })
                    .eq('id', id);

                UI.showToast('Registrado com sucesso!', 'success');
                await init(); // Recarrega os dados completos
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao atualizar comunicado no servidor.', 'warning');
                await init(); // Recarrega para mostrar estado local
            } finally {
                UI.hideLoader();
            }
        };

        init();
    </script>
