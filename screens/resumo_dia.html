<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/manager-context.js?v=2.7"></script>
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .neon-border {
      box-shadow: 0 0 10px rgba(13, 89, 242, 0.3);
    }

    .glass-card {
      background: rgba(16, 22, 34, 0.8);
      backdrop-filter: blur(10px);
    }

    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    Auth.checkSession();
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-24">
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
      <div id="btn-voltar"
        class="text-primary flex size-10 mt-2 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <div class="flex-1 text-center">
        <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase">RELATÓRIO DE MISSÃO</h2>
        <p id="dataRelatorio" class="text-[10px] text-primary font-bold uppercase tracking-[0.2em] opacity-80 mt-0.5">
          ---</p>
      </div>
      <div class="size-10"></div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-4 space-y-6">
    <!-- Hero Summary Card -->
    <div id="resumoHero"
      class="relative overflow-hidden rounded-xl bg-slate-200 dark:bg-slate-800/50 border border-primary/30 p-6 neon-border">
      <div class="absolute top-0 right-0 p-4 opacity-10">
        <span class="material-symbols-outlined text-8xl">verified_user</span>
      </div>
      <div class="relative z-10">
        <div class="flex justify-between items-start mb-6">
          <div>
            <p class="text-primary text-xs font-bold uppercase tracking-widest mb-1">Status Operacional</p>
            <h3 id="resumoStatus" class="text-2xl font-bold dark:text-white">Carregando...</h3>
          </div>
          <div id="resumoSync"
            class="hidden bg-green-500/20 text-green-500 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 border border-green-500/30">
            <span class="material-symbols-outlined text-sm">check_circle</span> SINCRONIZADO
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div
            class="bg-background-light dark:bg-background-dark/60 p-3 rounded-lg border border-primary/10 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-[10px] uppercase font-bold">Início</p>
            <p id="resumoInicio" class="text-lg font-bold dark:text-white">--:--</p>
          </div>
          <div
            class="bg-background-light dark:bg-background-dark/60 p-3 rounded-lg border border-primary/10 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-[10px] uppercase font-bold">Fim</p>
            <p id="resumoFim" class="text-lg font-bold dark:text-white">--:--</p>
          </div>
          <div class="bg-primary/20 p-3 rounded-lg border border-primary/40 text-center">
            <p class="text-primary text-[10px] uppercase font-bold">Total</p>
            <p id="resumoTotal" class="text-lg font-bold text-primary">00:00h</p>
          </div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between text-xs font-medium">
            <span id="labelMeta" class="text-slate-500 uppercase">Progresso da Meta Diária</span>
            <span id="progressoMeta" class="text-primary">0%</span>
          </div>
          <div class="w-full bg-slate-300 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
            <div id="barraProgresso"
              class="bg-primary h-full w-[0%] shadow-[0_0_8px_#0d59f2] transition-all duration-1000"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Section: Daily Notes & Justifications (Dynamic Cards) -->
    <div id="containerResumoCards" class="space-y-4">
      <!-- Cards serão injetados aqui -->
    </div>
    </div>
  </main>

  </main>
  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id') || localStorage.getItem('userId');
      const dataRef = urlParams.get('date') || new Date().toISOString().split('T')[0];

      UI.showLoader();

      try {
        // 1. Fetch Pontos
        const { data: pontos } = await supabase
          .from('pontos')
          .select('*')
          .eq('funcionario_id', targetId)
          .gte('data_hora', `${dataRef}T00:00:00`)
          .lte('data_hora', `${dataRef}T23:59:59`)
          .order('data_hora', { ascending: true });

        // 2. Fetch Anotacao
        const { data: anotacoes } = await supabase
          .from('anotacoes')
          .select('*')
          .eq('funcionario_id', targetId)
          .eq('data', dataRef)
          .limit(1);

        // 3. Fetch Justificativa
        const { data: justificativas } = await supabase
          .from('justificativas')
          .select('*')
          .eq('funcionario_id', targetId)
          .eq('data_incidente', dataRef)
          .limit(1);

        const currentUser = Auth.getUser();
        if (currentUser) {
          UI.updateFooterNavigation(currentUser.role);
          const btnVoltar = document.getElementById('btn-voltar');
          if (btnVoltar) btnVoltar.onclick = () => UI.voltarInicio();
        }

        // 4. Update Header Date
        const dateObj = new Date(dataRef + 'T12:00:00'); // Use noon to avoid TZ shift
        document.getElementById('dataRelatorio').innerText = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();

        renderResumo(pontos, anotacoes[0], justificativas[0]);

      } catch (err) {
        console.error(err);
        UI.toast('Erro ao carregar resumo.', 'error');
      } finally {
        UI.hideLoader();
        // Navegação dinâmica
        const user = Auth.getUser();
        if (user) UI.updateFooterNavigation(user.role);
      }
    }

    function renderResumo(pontos, anotacao, justificativa) {
      // 1. Render Hero Stats
      renderHeroStats(pontos);

      const container = document.getElementById('containerResumoCards');
      container.innerHTML = '';

      if (!anotacao && !justificativa) {
        container.innerHTML = `
          <div class="p-8 text-center bg-slate-800/20 rounded-xl border border-dashed border-white/5">
            <p class="text-sm text-slate-500 italic">Nenhum registro extra (anotação ou justificativa) para este dia.</p>
          </div>
        `;
        return;
      }

      // 2. Render Anotação Card
      if (anotacao) {
        container.innerHTML += `
          <div class="rounded-xl bg-background-dark/40 border border-white/5 overflow-hidden">
            <div class="bg-white/5 px-4 py-2 border-b border-white/5">
              <h5 class="text-[10px] font-bold uppercase tracking-widest text-primary">ANOTAÇÃO DIÁRIA</h5>
            </div>
            <div class="p-4">
              <p class="text-sm text-slate-300 leading-relaxed italic">"${anotacao.conteudo}"</p>
            </div>
          </div>
        `;
      }

      // 3. Render Justificativa Card
      if (justificativa) {
        const statusMap = {
          'pendente': 'bg-amber-500/10 text-amber-500 border-amber-500/20',
          'aprovada': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
          'rejeitada': 'bg-rose-500/10 text-rose-500 border-rose-500/20',
          'aprovado': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
          'rejeitado': 'bg-rose-500/10 text-rose-500 border-rose-500/20'
        };
        const statusClasses = statusMap[justificativa.status.toLowerCase()] || 'bg-slate-500/10 text-slate-500 border-slate-500/20';

        container.innerHTML += `
          <div class="rounded-xl bg-background-dark/40 border border-white/5 overflow-hidden">
            <div class="bg-white/5 px-4 py-2 border-b border-white/5 flex justify-between items-center">
              <h5 class="text-[10px] font-bold uppercase tracking-widest text-primary">JUSTIFICATIVA</h5>
              <span class="px-2 py-0.5 rounded-full border border-current font-bold text-[8px] uppercase ${statusClasses}">${justificativa.status}</span>
            </div>
            <div class="p-4 space-y-3">
              <div>
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Divergência</p>
                <p class="text-xs font-bold text-slate-200">${justificativa.tipo_divergencia}</p>
              </div>
              <div>
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Descrição</p>
                <p class="text-xs italic text-slate-400">"${justificativa.descricao}"</p>
              </div>
              ${justificativa.evidencia_url ? `
                <a href="${justificativa.evidencia_url}" target="_blank" 
                   class="inline-flex items-center gap-2 px-3 py-1.5 bg-background-dark border border-primary/20 rounded-lg text-primary hover:bg-primary/10 transition-all transform active:scale-95 group">
                  <span class="material-symbols-outlined text-sm">attach_file</span>
                  <span class="text-[10px] font-bold uppercase tracking-widest">Ver Evidência</span>
                </a>
              ` : ''}
            </div>
          </div>
        `;
      }
    }

    function renderHeroStats(pontos) {
      const statusEl = document.getElementById('resumoStatus');
      const syncEl = document.getElementById('resumoSync');

      if (pontos && pontos.length > 0) {
        statusEl.innerText = pontos.length % 2 === 0 ? 'Sessão Finalizada' : 'Sessão em Aberto';
        syncEl.classList.remove('hidden');

        const inicio = new Date(pontos[0].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('resumoInicio').innerText = inicio;

        if (pontos.length > 1) {
          const fim = new Date(pontos[pontos.length - 1].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          document.getElementById('resumoFim').innerText = fim;
        }

        let totalMs = 0;
        for (let i = 0; i < pontos.length - 1; i += 2) {
          const entrada = new Date(pontos[i].data_hora);
          const saida = pontos[i + 1] ? new Date(pontos[i + 1].data_hora) : new Date();
          totalMs += (saida - entrada);
        }

        const hours = Math.floor(totalMs / 3600000);
        const minutes = Math.floor((totalMs % 3600000) / 60000);
        document.getElementById('resumoTotal').innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}h`;

        const perc = Math.min(Math.round((totalMs / (8 * 3600000)) * 100), 100);
        document.getElementById('progressoMeta').innerText = `${perc}%`;
        document.getElementById('barraProgresso').style.width = `${perc}%`;
      } else {
        statusEl.innerText = 'Sem Atividade';
      }
    }

    init();
  </script>

      <a href="estatistica_funcionario.html"

        <span class="material-symbols-outlined text-2xl">bar_chart</span>
