<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/theme.js?v=1.0"></script>
    <script src="../js/manager-context.js?v=2.7"></script>
    <title>ChronoSync - Resumo do Dia</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding-bottom: 0 !important; }
            main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .stats-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 0.5rem !important; }
            .bg-background-dark, .bg-\[\#0f172a\] { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; }
            .text-slate-100, .text-slate-300 { color: #0f172a !important; }
        }
        /* Estilos do Novo Card de Histórico */
        .card-history {
            position: relative;
            padding-left: 16px !important;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }
        .card-history::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 10px;
            background: currentColor;
            opacity: 0.8;
        }
        .premium-border-blue { color: #3b82f6; }
        .premium-border-amber { color: #f59e0b; }
        .premium-border-green { color: #10b981; }
        .premium-border-rose { color: #f43f5e; }
        .premium-border-purple { color: #a855f7; }

        .map-container-card {
            height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            margin-top: 0;
            opacity: 0;
        }
        .map-container-card.active {
            height: 250px;
            margin-top: 12px;
            opacity: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .edit-container-card {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .edit-container-card.active {
            max-height: 500px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 1;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-24 font-['Space_Grotesk']">
    <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50 px-4">
        <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
            <div id="btn-voltar"
                class="no-print text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
                <span class="material-symbols-outlined">arrow_back</span>
            </div>
            <div class="text-center flex flex-col items-center">
                <h2 class="text-slate-100 text-lg font-black tracking-widest uppercase italic">Resumo do Dia</h2>
                <div class="flex items-center justify-center gap-4 mt-1">
                    <button onclick="navigateDay(-1)" class="no-print text-slate-500 hover:text-primary transition-all flex items-center justify-center bg-white/5 hover:bg-white/10 active:scale-95 rounded-xl w-12 h-12">
                        <span class="material-symbols-outlined text-2xl">chevron_left</span>
                    </button>
                    <p id="dataHeader" class="text-[10px] text-primary font-bold uppercase tracking-[0.2em] m-0">CARREGANDO...</p>
                    <button onclick="navigateDay(1)" class="no-print text-slate-500 hover:text-primary transition-all flex items-center justify-center bg-white/5 hover:bg-white/10 active:scale-95 rounded-xl w-12 h-12">
                        <span class="material-symbols-outlined text-2xl">chevron_right</span>
                    </button>
                </div>
            </div>
            <button onclick="window.print()" class="no-print text-slate-400 hover:text-white transition-all">
                <span class="material-symbols-outlined">picture_as_pdf</span>
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 md:p-8 space-y-8">
        <!-- Informações do Usuário -->
        <div class="bg-[#0f172a] border border-white/5 rounded-3xl p-6 flex flex-col md:flex-row justify-between gap-6 shadow-2xl">
            <div class="flex items-center gap-6">
                <div class="relative">
                    <div class="w-16 h-16 rounded-2xl border-2 border-primary/30 p-1 bg-background-dark overflow-hidden">
                        <img id="user-photo" src="https://ui-avatars.com/api/?name=User&background=0D59F2&color=fff"
                            class="w-full h-full rounded-xl object-cover">
                    </div>
                </div>
                <div>
                    <h3 id="funcNome" class="text-xl font-black text-slate-100 uppercase italic leading-tight">CARREGANDO...</h3>
                    <p id="funcSetor" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">SETOR: ---</p>
                </div>
            </div>
        </div>

        <!-- Estatísticas do Dia -->
        <div class="stats-grid grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white/5 border border-white/10 p-5 rounded-3xl border-l-4 border-l-slate-400 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Horário</p>
                <p id="horarioPrevisto" class="text-lg font-black text-slate-300 italic leading-none mt-1">--:-- / --:--</p>
            </div>
            <div class="bg-primary/5 border border-primary/10 p-5 rounded-3xl border-l-4 border-l-primary flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Trabalhado</p>
                <p id="totalTrabalhado" class="text-2xl font-black text-slate-100 italic leading-none mt-1">00:00</p>
            </div>
            <div class="bg-white/5 border border-white/10 p-5 rounded-3xl border-l-4 border-l-slate-400 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Previsto</p>
                <p id="totalEsperado" class="text-2xl font-black text-slate-300 italic leading-none mt-1">00:00</p>
            </div>
            <div id="saldoCard" class="bg-emerald-500/5 border border-emerald-500/10 p-5 rounded-3xl border-l-4 border-l-emerald-500 flex flex-col justify-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 leading-tight">Saldo</p>
                <p id="totalSaldo" class="text-2xl font-black text-emerald-400 italic leading-none mt-1">00:00</p>
            </div>
        </div>

        <!-- Detalhamento de Batidas -->
        <div class="bg-[#0f172a] border border-white/5 rounded-3xl overflow-hidden shadow-xl">
            <div class="bg-white/5 px-6 py-4 border-b border-white/5">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registros de Ponto</h4>
            </div>
            <div id="batidasContainer" class="p-6 space-y-4">
                <!-- Batidas serão injetadas aqui -->
            </div>
        </div>

        <!-- Observações e Justificativas -->
        <div id="containerObservacoes" class="space-y-4">
            <!-- Cards de Anotações e Justificativas -->
        </div>
    </main>

    <script type="module">
        import { supabase } from '../js/supabase-config.js';
        import { Auth } from '../js/auth.js';
        import { UI } from '../js/ui-utils.js';
        import { ScalesEngine } from '../js/scales-engine.js';

        async function init() {
            const btnVoltar = document.getElementById('btn-voltar');
            if (btnVoltar) btnVoltar.onclick = () => UI.voltarInicio();

            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id') || localStorage.getItem('userId');
            const dataRef = urlParams.get('date') || new Date().toISOString().split('T')[0];

            document.getElementById('dataHeader').innerText = new Date(dataRef + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();
            
            UI.showLoader();

            try {
                const { data: func, error: errFunc } = await supabase
                    .from('funcionarios')
                    .select('*, escalas(*), setores!setor_id(nome)')
                    .eq('id', targetId)
                    .single();
                
                if (errFunc) throw errFunc;

                document.getElementById('funcNome').innerText = func.nome_completo.toUpperCase();
                document.getElementById('funcSetor').innerText = `SETOR: ${func.setores?.nome || 'N/A'}`;
                if (func.foto_url) document.getElementById('user-photo').src = func.foto_url;

                const [ptsRes, anotRes, justRes, comsRes, logsRes] = await Promise.all([
                    supabase.from('pontos').select('*').eq('funcionario_id', targetId).gte('data_hora', `${dataRef}T00:00:00`).lte('data_hora', `${dataRef}T23:59:59`).order('data_hora', { ascending: true }),
                    supabase.from('anotacoes').select('*').eq('funcionario_id', targetId).eq('data', dataRef),
                    supabase.from('justificativas').select('*').eq('funcionario_id', targetId).eq('data_incidente', dataRef),
                    supabase.from('comunicados').select('*').or(`target_id.eq.${targetId},target_id.is.null`).gte('created_at', `${dataRef}T00:00:00`).lte('created_at', `${dataRef}T23:59:59`),
                    supabase.from('diario_logs').select('*').eq('funcionario_id', targetId).gte('created_at', `${dataRef}T00:00:00`).lte('created_at', `${dataRef}T23:59:59`)
                ]);

                renderResumo(ptsRes.data, anotRes.data, justRes.data, comsRes.data || [], logsRes.data || [], func.escalas, dataRef);

            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao carregar resumo.', 'error');
            } finally {
                UI.hideLoader();
            }
        }

        function renderResumo(pontos, anotacoes, justificativas, comunicados, logs, escala, dataRef) {
            // 1. Cálculos de Tempo
            const workedMins = calculateWorkedMinutes(pontos);
            const plannedMins = ScalesEngine.calculateDailyWorkMinutes(escala);
            const balance = workedMins - plannedMins;

            document.getElementById('totalTrabalhado').innerText = formatMinutes(workedMins);
            document.getElementById('totalEsperado').innerText = formatMinutes(plannedMins);
            
            const horarioEl = document.getElementById('horarioPrevisto');
            if (pontos && pontos.length > 0) {
                const primeiroPonto = new Date(pontos[0].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const ultimoPonto = pontos.length > 1 ? new Date(pontos[pontos.length - 1].data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                horarioEl.innerText = `${primeiroPonto} / ${ultimoPonto}`;
            } else {
                horarioEl.innerText = '--:-- / --:--';
            }
            
            const saldoEl = document.getElementById('totalSaldo');
            saldoEl.innerText = formatBalance(balance);
            document.getElementById('saldoCard').className = `bg-${balance >= 0 ? 'emerald' : 'rose'}-500/5 border border-${balance >= 0 ? 'emerald' : 'rose'}-500/10 p-5 rounded-3xl border-l-4 border-l-${balance >= 0 ? 'emerald' : 'rose'}-500`;
            saldoEl.className = `text-2xl font-black italic text-${balance >= 0 ? 'emerald' : 'rose'}-400`;

            // 2. Render Batidas (Visual do Espelho de Ponto)
            const batidasCont = document.getElementById('batidasContainer');
            if (pontos.length === 0) {
                batidasCont.innerHTML = '<p class="text-sm text-slate-500 italic text-center py-4">Nenhum registro de ponto encontrado.</p>';
            } else {
                batidasCont.innerHTML = `
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-4">
                            ${pontos.filter((_, i) => i % 2 === 0).map((p, i) => `
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20">
                                        <span class="material-symbols-outlined text-emerald-500 text-sm">login</span>
                                    </div>
                                    <div>
                                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-tighter">Entrada ${i + 1}</p>
                                        <p class="text-sm font-black text-slate-200">${formatTime(p)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="space-y-4">
                            ${pontos.filter((_, i) => i % 2 !== 0).map((p, i) => `
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-lg bg-rose-500/10 flex items-center justify-center border border-rose-500/20">
                                        <span class="material-symbols-outlined text-rose-500 text-sm">logout</span>
                                    </div>
                                    <div>
                                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-tighter">Saída ${i + 1}</p>
                                        <p class="text-sm font-black text-slate-200">${formatTime(p)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 3. Render Observações Premium
            const obsCont = document.getElementById('containerObservacoes');
            obsCont.innerHTML = '';

            const messageDict = {
                'Pulso de localização automática': 'Localização registrada automaticamente pelo sistema para validar sua presença em serviço durante a jornada.',
                'Log Automático de Rastreio (Regime Externo)': 'Registro automático de localização para fins de auditoria em jornada de trabalho sob regime externo.',
                'Funcionário saiu do local de trabalho': 'O sistema detectou que você se ausentou do raio de alcance permitido para o seu local de escala/setor designado.',
                'Funcionário retornou ao local de trabalho': 'O sistema detectou o seu retorno para dentro do raio de alcance permitido do seu local de escala/setor designado.',
                'Solicitação de ponto fora do raio': 'Sua tentativa de registro de ponto foi bloqueada ou sinalizada por estar fora do raio de geofence permitido para o seu setor.'
            };

            const defaultMessages = {
                'gps_pulse': 'Localização registrada automaticamente pelo sistema para validar sua presença em serviço durante a jornada.',
                'gps_hora': 'Registro automático de localização para fins de auditoria em jornada de trabalho sob regime externo.',
                'geofence_out': 'O sistema detectou que você se ausentou do raio de alcance permitido para o seu local de escala/setor designado.',
                'geofence_in': 'O sistema detectou o seu retorno para dentro do raio de alcance permitido do seu local de escala/setor designado.',
                'ponto_fora_raio': 'Sua tentativa de registro de ponto foi bloqueada ou sinalizada por estar fora do raio de geofence permitido para o seu setor.'
            };
            const titleDict = {
                'gps_pulse': 'CHECK-POINT DE LOCALIZAÇÃO (PULSO)',
                'gps_hora': 'RASTREIO DE REGIME EXTERNO',
                'geofence_out': 'QUEBRA DE PERÍMETRO (SAÍDA)',
                'geofence_in': 'QUEBRA DE PERÍMETRO (ENTRADA)',
                'ponto_fora_raio': 'SOLICITAÇÃO DE PONTO FORA DO RAIO'
            };

            const allItems = [
                ...comunicados.map(c => ({ 
                    id: c.id, 
                    type: 'COMUNICADO', 
                    content: c.mensagem, 
                    time: c.created_at, 
                    color: c.subtipo === 'hora_extra' ? 'premium-border-amber' : 'premium-border-green', 
                    label: c.subtipo === 'hora_extra' ? 'Solicitação de Hora Extra' : 'Comunicado Oficial',
                    lido: c.lido,
                    subtipo: c.subtipo
                })),
                ...anotacoes.map(a => ({ 
                    id: a.id, 
                    type: 'ATIVIDADE', 
                    content: a.content || a.conteudo, 
                    time: a.created_at, 
                    color: 'premium-border-blue', 
                    label: 'Anotação do Dia' 
                })),
                ...justificativas.map(j => ({ 
                    id: j.id, 
                    type: 'JUSTIFICATIVA', 
                    content: j.descricao, 
                    time: j.created_at, 
                    color: 'premium-border-amber', 
                    label: 'Justificativa de Ponto', 
                    status: j.status, 
                    motivo: j.tipo_divergencia, 
                    file: j.evidencia_url 
                })),
                ...logs.map(l => {
                    const title = titleDict[l.tipo] || 'OCORRÊNCIA DE SISTEMA';
                    const content = messageDict[l.conteudo] || l.conteudo || defaultMessages[l.tipo] || 'Registro automático de posição.';
                    return { 
                        id: l.id, 
                        type: 'GPS', 
                        content: content, 
                        time: l.created_at, 
                        color: 'premium-border-rose', 
                        label: title,
                        coordenadas: l.coordenadas,
                        status_pendencia: l.status_pendencia,
                        justificativa_colaborador: l.justificativa_colaborador,
                        tipo_raw: l.tipo
                    };
                })
            ].sort((a, b) => new Date(a.time) - new Date(b.time));

            if (allItems.length === 0) {
                obsCont.innerHTML = `
                    <div class="border border-dashed border-white/10 rounded-3xl p-8 text-center bg-white/[0.02]">
                        <p class="text-xs text-slate-600 font-bold uppercase tracking-widest italic">Nenhuma observação extra registrada.</p>
                    </div>
                `;
            } else {
                obsCont.innerHTML = allItems.map(item => {
                    const isJustif = item.type === 'JUSTIFICATIVA';
                    const isSystem = item.type === 'GPS';
                    const statusMap = {
                        'pendente': 'bg-amber-500/10 text-amber-500 border-amber-500/20',
                        'em_analise': 'bg-primary/10 text-primary border-primary/20',
                        'aprovado': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                        'rejeitado': 'bg-rose-500/10 text-rose-500 border-rose-500/20',
                        'aprovada': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                        'rejeitada': 'bg-rose-500/10 text-rose-500 border-rose-500/20'
                    };

                    let statusClass = '';
                    let statusLabel = '';
                    
                    if (isJustif) {
                        statusClass = statusMap[item.status?.toLowerCase()] || statusMap['pendente'];
                        statusLabel = item.status?.toUpperCase() || 'PENDENTE';
                    } else if (isSystem) {
                        statusClass = statusMap[item.status_pendencia?.toLowerCase()] || statusMap['pendente'];
                        statusLabel = item.status_pendencia?.toUpperCase() || 'PENDENTE';
                    } else if (item.type === 'COMUNICADO') {
                        statusClass = item.lido ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20' : 'bg-amber-500/10 text-amber-500 border-amber-500/20';
                        statusLabel = 'CIENTE';
                    }

                    return `
                    <div class="card-history ${item.color} animate-in fade-in slide-in-from-bottom-4 duration-500 mb-6 group">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex flex-col gap-1">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-sm" style="color: currentColor">
                                        ${item.type === 'COMUNICADO' ? 'campaign' : item.type === 'ATIVIDADE' ? 'edit_note' : item.type === 'JUSTIFICATIVA' ? 'warning' : 'location_on'}
                                    </span>
                                    <p class="text-[11px] font-black uppercase tracking-widest" style="color: currentColor">${item.label}</p>
                                    <span class="text-[9px] text-slate-500 font-bold ml-2">
                                        ${new Date(item.time).toLocaleDateString('pt-BR')} | ${new Date(item.time).toLocaleTimeString('pt-BR')}
                                    </span>
                                </div>
                                <p class="text-sm text-slate-300 leading-relaxed italic">"${item.content}"</p>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                ${(isJustif || isSystem) ? `
                                    <span class="${statusClass} text-[8px] px-2 py-0.5 rounded-full border border-current font-black uppercase tracking-widest shrink-0">${statusLabel}</span>
                                ` : ''}
                            </div>
                        </div>

                        ${item.motivo ? `<p class="text-[10px] font-black text-slate-100 uppercase mb-1">${item.motivo}</p>` : ''}
                        
                        <div class="flex flex-wrap gap-2 mt-3 overflow-hidden">
                             <!-- Ações de Edição/Justificativa -->
                             <div class="flex gap-2">
                                ${((item) => {
                                    if (item.type === 'ATIVIDADE' && (new Date() - new Date(item.time) < 24 * 60 * 60 * 1000)) {
                                        return `
                                            <button onclick="window.toggleEditCard('${item.id}', 'atividade', \`${item.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                                    class="p-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:text-primary hover:border-primary/30 transition-all shadow-sm"
                                                    title="Editar">
                                                <span class="material-symbols-outlined text-base">edit</span>
                                            </button>`;
                                    } else if (isSystem && item.status_pendencia === 'pendente' && (new Date() - new Date(item.time) < 24 * 60 * 60 * 1000)) {
                                        return `
                                            <button onclick="window.toggleEditCard('${item.id}', '${item.tipo_raw}', \`${(item.content || '').replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                                    class="px-3 py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-primary hover:bg-primary/20 transition-all flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest"
                                                    title="Justificar">
                                                <span class="material-symbols-outlined text-sm">edit_note</span>
                                                <span>Justificar</span>
                                            </button>`;
                                    } else if (item.type === 'COMUNICADO') {
                                        const btnClass = item.lido 
                                            ? "bg-emerald-500/10 border-emerald-500/20 text-emerald-500" 
                                            : "bg-amber-500/10 border-amber-500/20 text-amber-500 hover:bg-amber-500/20";
                                        const icon = item.lido ? "done_all" : "done";
                                        return `
                                            <button ${item.lido ? 'disabled' : `onclick="window.marcarComunicadoLido('${item.id}')"`} 
                                                    class="px-3 py-1.5 ${btnClass} border rounded-lg transition-all flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest ${item.lido ? 'opacity-80' : ''}">
                                                <span class="material-symbols-outlined text-sm">${icon}</span>
                                                <span>CIENTE</span>
                                            </button>`;
                                    }
                                    return '';
                                })(item)}
                             </div>

                             <!-- Ações de Localização/Evidência -->
                             <div class="flex gap-2">
                                ${item.file ? `
                                    <a href="${item.file}" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:text-white transition-all text-[9px] font-black uppercase tracking-widest">
                                        <span class="material-symbols-outlined text-sm">attach_file</span>
                                        <span>Ver Arquivo</span>
                                    </a>
                                ` : ''}
                                ${item.coordenadas ? `
                                    <button id="btn-map-${item.id}" onclick="window.toggleMapaCard('${item.id}', '${item.coordenadas}')" 
                                            class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-rose-500/10 border border-rose-500/20 rounded-lg text-rose-500 hover:bg-rose-500/20 transition-all text-[9px] font-black uppercase tracking-widest shadow-lg shadow-rose-500/5">
                                        <span id="icon-map-${item.id}" class="material-symbols-outlined text-sm">map</span>
                                        <span id="txt-map-${item.id}">Ver Localização no Mapa</span>
                                    </button>
                                ` : ''}
                             </div>
                        </div>

                        <!-- Container do Mapa -->
                        <div id="map-card-${item.id}" class="map-container-card"></div>

                        <!-- Container de Edição In-Card -->
                        <div id="edit-card-${item.id}" class="edit-container-card"></div>

                        ${item.justificativa_colaborador ? `
                        <div class="mt-3 bg-white/5 border border-white/5 p-3 rounded-lg text-[11px] text-slate-400 italic">
                            <span class="text-primary font-bold mr-1 not-italic tracking-tighter uppercase">Justificativa Enviada:</span> ${item.justificativa_colaborador}
                        </div>
                        ` : ''}
                    </div>
                `;
                }).join('');
            }
        }

        function calculateWorkedMinutes(points) {
            let mins = 0;
            for (let i = 0; i < points.length; i += 2) {
                if (points[i + 1]) mins += (new Date(points[i + 1].data_hora) - new Date(points[i].data_hora)) / 60000;
            }
            return mins;
        }

        function formatTime(point) {
            if (!point) return '--:--';
            return new Date(point.data_hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function formatBalance(mins) {
            const absMins = Math.round(Math.abs(mins));
            const h = Math.floor(absMins / 60);
            const m = absMins % 60;
            return `${mins < 0 ? '-' : '+'}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function formatMinutes(mins) {
            const absMins = Math.round(Math.abs(mins));
            const h = Math.floor(absMins / 60);
            const m = absMins % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
        
        window.navigateDay = function(offset) {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            const currentDateStr = urlParams.get('date') || new Date().toISOString().split('T')[0];
            
            const dateObj = new Date(currentDateStr + 'T12:00:00');
            dateObj.setDate(dateObj.getDate() + offset);
            
            const newDateStr = dateObj.toISOString().split('T')[0];
            
            urlParams.set('date', newDateStr);
            if (targetId) {
                urlParams.set('id', targetId);
            }
            
            window.location.href = `resumo_dia.html?${urlParams.toString()}`;
        };

        const mapInstances = {};
        window.toggleMapaCard = (id, coordenadas) => {
            const container = document.getElementById(`map-card-${id}`);
            const btnTxt = document.getElementById(`txt-map-${id}`);
            const btnIcon = document.getElementById(`icon-map-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            
            if (isActive) {
                if (btnTxt) btnTxt.innerText = 'Fechar Visualização';
                if (btnIcon) btnIcon.innerText = 'close';
                
                setTimeout(() => {
                    if (!mapInstances[id]) {
                        const [lat, lng] = coordenadas.split(',').map(Number);
                        const map = L.map(`map-card-${id}`, {
                            zoomControl: false,
                            attributionControl: false
                        }).setView([lat, lng], 16);

                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                        
                        const pinIcon = L.divIcon({
                            html: `<span class="material-symbols-outlined text-rose-500 font-variation-settings-fill" style="font-size: 32px; filter: drop-shadow(0 0 5px rgba(244,63,94,0.5))">location_on</span>`,
                            className: 'custom-div-icon',
                            iconSize: [32, 32],
                            iconAnchor: [16, 32]
                        });

                        L.marker([lat, lng], {icon: pinIcon}).addTo(map);
                        mapInstances[id] = map;
                    } else {
                        mapInstances[id].invalidateSize();
                    }
                }, 300);
            } else {
                if (btnTxt) btnTxt.innerText = 'Ver Localização no Mapa';
                if (btnIcon) btnIcon.innerText = 'map';
            }
        };

        window.toggleEditCard = (id, type, currentContent) => {
            const container = document.getElementById(`edit-card-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            if (isActive) {
                container.innerHTML = `
                    <div class="space-y-3">
                        <label class="text-[9px] font-black uppercase tracking-widest text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">edit_note</span>
                            ${type === 'atividade' ? 'Editar Atividade' : 'Responder Justificativa'}
                        </label>
                        <textarea id="edit-text-${id}" 
                            class="w-full bg-background-dark border border-white/10 rounded-xl py-3 px-4 text-xs text-slate-100 placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                            rows="4">${currentContent}</textarea>
                        <div class="flex gap-2">
                            <button onclick="window.salvarEdicaoCard('${id}', '${type}')" 
                                class="flex-1 bg-primary text-white text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:bg-primary/80">
                                Salvar Alterações
                            </button>
                            <button onclick="window.toggleEditCard('${id}')" 
                                class="px-4 bg-white/5 border border-white/10 text-slate-400 text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:text-white">
                                Cancelar
                            </button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        };

        window.salvarEdicaoCard = async (id, type) => {
            const newContent = document.getElementById(`edit-text-${id}`).value;
            if (!newContent.trim()) {
                UI.showToast('O conteúdo não pode estar vazio.', 'warning');
                return;
            }

            UI.showLoader();
            try {
                let error;
                if (type === 'atividade') {
                    const res = await supabase.from('anotacoes').update({ conteudo: newContent }).eq('id', id);
                    error = res.error;
                } else {
                    const res = await supabase.from('diario_logs').update({ justificativa_colaborador: newContent, status_pendencia: 'em_analise' }).eq('id', id);
                    error = res.error;
                }

                if (error) throw error;

                UI.showToast('Registrado com sucesso!', 'success');
                window.toggleEditCard(id);
                init(); // Recarrega os dados
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao salvar alteração.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        window.marcarComunicadoLido = async (id) => {
            UI.showLoader();
            try {
                const { error } = await supabase
                    .from('comunicados')
                    .update({ lido: true })
                    .eq('id', id);

                if (error) throw error;

                UI.showToast('Registrado com sucesso!', 'success');
                init(); // Recarrega os dados
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao atualizar comunicado.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        init();
    </script>
</body>

</html>
