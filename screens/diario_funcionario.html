<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script src="../js/theme.js?v=1.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .font-variation-settings-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Estilos do Novo Card de Histórico */
        .card-history {
            position: relative;
            padding-left: 16px !important;
            transition: all 0.3s ease;
        }
        .card-history::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 4px;
            border-radius: 10px;
            background: currentColor;
            opacity: 0.8;
        }
        .map-container-card {
            height: 0;
            overflow: hidden;
            transition: height 0.3s ease-out;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .map-container-card.active {
            height: 200px;
            margin-bottom: 8px;
        }
        .edit-container-card {
            height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            margin-top: 0;
            background: rgba(13, 89, 242, 0.05);
            border: 1px solid transparent;
        }
        .edit-container-card.active {
            height: auto;
            min-height: 160px;
            margin-top: 12px;
            margin-bottom: 8px;
            padding: 16px;
            border-color: rgba(13, 89, 242, 0.2);
            background: rgba(13, 89, 242, 0.1);
        }
    </style>
    <title>Diário de Bordo | ChronoSync</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-24 items-center">
    <!-- Header / Navigation -->
    <div class="flex items-center w-full max-w-md bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-primary/20 sticky top-0 z-40">
        <div id="btn-voltar"
            class="text-primary flex size-10 mt-2 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
            <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 uppercase tracking-widest">
            DIÁRIO DE BORDO</h2>
    </div>

    <main class="flex-1 w-full max-w-md p-6 space-y-6">

        <!-- Nova Anotação Form -->
        <section class="bg-white/5 border border-primary/20 rounded-2xl p-6 relative overflow-hidden mt-10 shadow-inner">
            <div class="absolute top-0 right-0 p-2 opacity-10">
                <span class="material-symbols-outlined text-6xl">edit_note</span>
            </div>
            <!-- Seletor de Modo e Título Centralizados -->
            <div class="flex flex-col items-center gap-4 mb-6 pt-2">
                <!-- Toggle Mode Selector -->
                <div class="flex bg-background-dark p-1 rounded-2xl border border-white/10 shadow-2xl w-full max-w-[300px]">
                    <button type="button" id="btnModeAtividade" 
                        class="flex-1 px-4 py-2.5 text-[10px] font-black uppercase tracking-wider rounded-xl bg-primary text-white transition-all shadow-lg whitespace-nowrap">
                        Atividade
                    </button>
                    <button type="button" id="btnModeJustificativa" 
                        class="flex-1 px-4 py-2.5 text-[10px] font-black uppercase tracking-wider rounded-xl text-slate-400 hover:text-white transition-all whitespace-nowrap">
                        Justificativa
                    </button>
                </div>

                <!-- Título Dinâmico -->
                <h3 class="text-primary text-[10px] font-black tracking-[0.3em] uppercase flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-base">add_box</span>
                    <span id="titleAnotacao">REGISTRAR ATIVIDADE</span>
                </h3>
            </div>
            <div class="space-y-4" id="anotacaoForm">
                <div class="hidden">
                    <input id="inputDataAnotacao" type="date" />
                    <input id="inputTipoModo" type="hidden" value="atividade" />
                    <input id="inputEvidencia" type="file" class="hidden" accept="image/*,.pdf" />
                </div>

                <!-- Campos de Justificativa (Ocultos inicialmente) -->
                <div id="camposJustificativa" class="hidden animate-in fade-in slide-in-from-top-2 duration-300 space-y-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-400 text-xs uppercase font-bold tracking-widest">TIPO DE DIVERGÊNCIA</label>
                        <select id="selectTipoJustificativa"
                            class="w-full bg-background-dark border border-white/10 rounded-xl py-3 px-4 text-sm text-slate-100 placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-all">
                            <option value="Esquecimento de Registro">Esquecimento de Registro</option>
                            <option value="Viagem a Trabalho">Viagem a Trabalho</option>
                            <option value="Atividade Externa">Atividade Externa</option>
                            <option value="Visita Técnica">Visita Técnica</option>
                            <option value="Motivo de Saúde">Motivo de Saúde</option>
                            <option value="Problemas Técnicos">Problemas Técnicos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-slate-400 text-xs uppercase font-bold tracking-widest">ANEXAR EVIDÊNCIA (FOTO/PDF)</label>
                        <button id="btnAnexarEvidencia" type="button"
                            class="w-full flex items-center justify-center gap-3 bg-background-dark border border-dashed border-primary/40 hover:border-primary text-slate-400 hover:text-primary py-3 rounded-xl transition-all group relative overflow-hidden">
                            <span class="material-symbols-outlined text-lg">add_a_photo</span>
                            <span id="txtAnexo" class="uppercase tracking-widest text-[9px] font-bold">Anexar Documento</span>
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-2 relative z-10">
                    <label id="labelAtividade" class="text-slate-400 text-[10px] uppercase font-bold tracking-wider">ATIVIDADE DO DIA</label>
                    <textarea id="inputConteudoAnotacao"
                        class="w-full bg-background-dark border border-white/10 rounded-xl py-4 px-4 text-sm text-slate-100 placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        placeholder="Descreva os detalhes das atividades desenvolvidas durante o dia..." rows="4"></textarea>
                </div>
                <button id="btnSalvarAnotacao"
                    class="w-full bg-primary hover:bg-primary/80 text-white text-[10px] font-black py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all uppercase tracking-widest relative z-10">
                    <span class="material-symbols-outlined text-sm">send</span> Enviar Anotação
                </button>
            </div>
        </section>

        <!-- Histórico de Anotações -->
        <section class="space-y-4 mt-8 pb-10">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-slate-100 text-[10px] font-black tracking-widest uppercase flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">history</span> Histórico de Atividades
                </h3>
                <span id="labelTotalAnotacoes" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Total: 0 registros</span>
            </div>

            <!-- Botão de Expansão (Melhoria de Navegação) - Movido para o Topo para Estabilidade -->
            <div id="containerBtnExpandir" class="hidden pb-2">
                <button id="btnExpandHistory" 
                    class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-slate-400 hover:text-primary hover:bg-primary/5 hover:border-primary/30 transition-all flex items-center justify-center gap-2 group">
                    <span id="iconExpandHistory" class="material-symbols-outlined text-base group-hover:animate-bounce">expand_more</span>
                    <span id="txtExpandHistory" class="text-[10px] font-black uppercase tracking-[0.2em]">Ver Histórico Completo</span>
                </button>
            </div>

            <div id="historicoAnotacoesContainer" class="space-y-4 transition-all duration-500 overflow-hidden">
                <div class="text-center py-10 opacity-30">
                    <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Nenhuma anotação encontrada</p>
                </div>
            </div>
        </section>
    </main>


    <script type="module">
        import { supabase } from '../js/supabase-config.js';
        import { UI } from '../js/ui-utils.js';

        let targetId = null;

        async function init() {
            UI.showLoader();
            const urlParams = new URLSearchParams(window.location.search);
            targetId = urlParams.get('id') || localStorage.getItem('userId');
            
            if (!targetId) {
                document.getElementById('logs-container').innerHTML = '<p class="text-red-500 text-center text-sm">Erro de identificação.</p>';
                UI.hideLoader();
                return;
            }

            await initAnotacoesLogic();
            UI.hideLoader();
        }


        // Botão de voltar unificado
        document.getElementById('btn-voltar').onclick = () => UI.voltarInicio();

        // ---- LÓGICA DE UNIFICAÇÃO (ATIVIDADES + JUSTIFICATIVAS) ----
        let editingAnotacaoId = null;
        let currentFile = null;
        let historyExpanded = false; // Controle de Expansão do Histórico
        let allHistoryData = []; // Cache dos dados para re-renderização rápida

        async function initAnotacoesLogic() {
            const inputData = document.getElementById('inputDataAnotacao');
            const labelAtividade = document.getElementById('labelAtividade');
            
            const now = new Date();
            const todayISO = now.toISOString().split('T')[0];
            const todayBR = now.toLocaleDateString('pt-BR');
            
            if (inputData && labelAtividade) {
                inputData.value = todayISO;
                labelAtividade.innerText = `DESCRIÇÃO DA ATIVIDADE (${todayBR})`;
            }

            // Seletores de Modo
            const btnAtividade = document.getElementById('btnModeAtividade');
            const btnJustificativa = document.getElementById('btnModeJustificativa');
            const camposJustif = document.getElementById('camposJustificativa');
            const inputTipoModo = document.getElementById('inputTipoModo');
            const titleAnotacao = document.getElementById('titleAnotacao');
            const btnSalvar = document.getElementById('btnSalvarAnotacao');

            btnAtividade.onclick = () => {
                inputTipoModo.value = 'atividade';
                btnAtividade.classList.add('bg-primary', 'text-white', 'shadow-lg');
                btnAtividade.classList.remove('text-slate-400');
                btnJustificativa.classList.remove('bg-primary', 'text-white', 'shadow-lg');
                btnJustificativa.classList.add('text-slate-400');
                camposJustif.classList.add('hidden');
                
                // Atualizar Título e Cores
                titleAnotacao.closest('h3').classList.remove('text-amber-500');
                titleAnotacao.closest('h3').classList.add('text-primary');
                titleAnotacao.previousElementSibling.innerText = 'add_box';
                titleAnotacao.innerText = 'REGISTRAR ATIVIDADE';
                
                labelAtividade.innerText = `DESCRIÇÃO DA ATIVIDADE (${todayBR})`;
                btnSalvar.innerHTML = '<span class="material-symbols-outlined text-sm">send</span> Enviar Anotação';
            };

            btnJustificativa.onclick = () => {
                inputTipoModo.value = 'justificativa';
                btnJustificativa.classList.add('bg-primary', 'text-white', 'shadow-lg');
                btnJustificativa.classList.remove('text-slate-400');
                btnAtividade.classList.remove('bg-primary', 'text-white', 'shadow-lg');
                btnAtividade.classList.add('text-slate-400');
                camposJustif.classList.remove('hidden');
                
                // Atualizar Título e Cores
                titleAnotacao.closest('h3').classList.remove('text-primary');
                titleAnotacao.closest('h3').classList.add('text-amber-500');
                titleAnotacao.previousElementSibling.innerText = 'history_edu';
                titleAnotacao.innerText = 'ENVIAR JUSTIFICATIVA';
                
                labelAtividade.innerText = `MOTIVO/EXPLICAÇÃO (${todayBR})`;
                btnSalvar.innerHTML = '<span class="material-symbols-outlined text-sm">send</span> Enviar Justificativa';
            };

            // Lógica de Anexo
            const btnAnexar = document.getElementById('btnAnexarEvidencia');
            const inputEvidencia = document.getElementById('inputEvidencia');
            const txtAnexo = document.getElementById('txtAnexo');

            btnAnexar.onclick = () => inputEvidencia.click();
            inputEvidencia.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 10 * 1024 * 1024) {
                        UI.showToast('Arquivo muito grande (Máx 10MB)', 'error');
                        inputEvidencia.value = '';
                        return;
                    }
                    currentFile = file;
                    txtAnexo.innerText = `Arquivo: ${file.name}`;
                    btnAnexar.classList.remove('border-primary/40');
                    btnAnexar.classList.add('border-emerald-500', 'text-emerald-400');
                }
            };

            if (btnSalvar) {
                btnSalvar.addEventListener('click', salvarRegistro);
            }

            // Click do botão expandir/recolher
            const btnExpand = document.getElementById('btnExpandHistory');
            if (btnExpand) {
                btnExpand.onclick = () => {
                    historyExpanded = !historyExpanded; // Toggle
                    renderUnifiedHistory();
                    
                    if (historyExpanded) {
                        // Scroll suave para o início do histórico expandido
                        document.getElementById('historicoAnotacoesContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        // Scroll suave para o topo do histórico colapsado
                        document.querySelector('h3.flex.items-center.gap-2').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                };
            }

            await loadUnifiedHistory();
        }

        async function loadUnifiedHistory() {
            if (!targetId) return;
            try {
                // 1. Buscar Anotações
                const { data: anotacoes, error: errAnot } = await supabase
                    .from('anotacoes')
                    .select('*')
                    .eq('funcionario_id', targetId);

                // 2. Buscar Justificativas
                const { data: justif, error: errJust } = await supabase
                    .from('justificativas')
                    .select('*')
                    .eq('funcionario_id', targetId);

                const { data: logs, error: errLogs } = await supabase
                    .from('diario_logs')
                    .select('*')
                    .eq('funcionario_id', targetId);
                
                // 3. Buscar Comunicados (Gerais, Setoriais do meu setor, ou Individuais para mim)
                const { data: user } = await supabase.from('funcionarios').select('setor_id').eq('id', targetId).single();
                const mySectorId = user?.setor_id;

                const { data: comunicados, error: errCom } = await supabase
                    .from('comunicados')
                    .select('*, remetente:funcionarios!remetente_id(nickname, nome_completo)')
                    .or(`destinatario_id.eq.${targetId},tipo.eq.geral,setor_id.eq.${mySectorId || '00000000-0000-0000-0000-000000000000'}`);

                if (errAnot || errJust || errLogs || errCom) throw (errAnot || errJust || errLogs || errCom);

                // 4. Unificar Dados
                allHistoryData = [
                    ...(anotacoes || []).map(a => ({ ...a, itemType: 'ATIVIDADE', data_item: a.data })),
                    ...(justif || []).map(j => ({ ...j, itemType: 'JUSTIFICATIVA', data_item: j.data_incidente, conteudo: j.descricao })),
                    ...(comunicados || []).map(c => ({ 
                        ...c, 
                        itemType: 'COMUNICADO', 
                        data_item: c.created_at.split('T')[0], 
                        conteudo: c.conteudo,
                        tipo_divergencia: c.subtipo === 'hora_extra' ? 'SOLICITAÇÃO DE HORA EXTRA' : 'COMUNICADO OFICIAL'
                    })),
                    ...(logs || []).map(l => ({ 
                        ...l, 
                        itemType: 'SISTEMA', 
                        data_item: l.data_hora.split('T')[0], 
                        conteudo: l.mensagem_padrao
                    }))
                ].sort((a, b) => (new Date(b.data_item) - new Date(a.data_item)) || (new Date(b.created_at) - new Date(a.created_at)));

                if (labelTotalAnotacoes) labelTotalAnotacoes.innerText = `Total: ${allHistoryData.length} registros`;
                renderUnifiedHistory();

            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao carregar histórico unificado.', 'error');
            }
        }

        function renderUnifiedHistory() {
            const historicoAnotacoesContainer = document.getElementById('historicoAnotacoesContainer');
            const labelTotalAnotacoes = document.getElementById('labelTotalAnotacoes');
            const containerBtnExpandir = document.getElementById('containerBtnExpandir');
            const iconExpand = document.getElementById('iconExpandHistory');
            const txtExpand = document.getElementById('txtExpandHistory');

            if (labelTotalAnotacoes) labelTotalAnotacoes.innerText = `Total: ${allHistoryData.length} registros`;

            // Resetar botão se necessário
            if (iconExpand && txtExpand) {
                if (historyExpanded) {
                    iconExpand.innerText = 'expand_less';
                    txtExpand.innerText = 'Recolher Histórico';
                } else {
                    iconExpand.innerText = 'expand_more';
                    txtExpand.innerText = 'Ver Histórico Completo';
                }
            }

            if (allHistoryData.length === 0) {
                historicoAnotacoesContainer.innerHTML = `
                <div class="text-center py-10 opacity-30">
                    <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Nenhuma atividade encontrada</p>
                </div>`;
                containerBtnExpandir.classList.add('hidden');
                return;
            }

            // Agrupar por data
            const grouped = allHistoryData.reduce((acc, item) => {
                const date = item.data_item;
                if (!acc[date]) acc[date] = [];
                acc[date].push(item);
                return acc;
            }, {});

            const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));
            
            // Decidir quais datas mostrar
            let datesToRender = sortedDates;
            if (sortedDates.length <= 1) {
                // Se só tem uma data ou zero, esconde o botão
                containerBtnExpandir.classList.add('hidden');
                historicoAnotacoesContainer.classList.remove('max-h-[500px]', 'overflow-y-auto', 'pr-2', 'custom-scrollbar');
            } else {
                containerBtnExpandir.classList.remove('hidden');
                if (!historyExpanded) {
                    datesToRender = [sortedDates[0]]; // Apenas o dia mais recente
                    historicoAnotacoesContainer.classList.remove('max-h-[500px]', 'overflow-y-auto', 'pr-2', 'custom-scrollbar');
                } else {
                    // Expandido: adicionar scroll
                    historicoAnotacoesContainer.classList.add('max-h-[500px]', 'overflow-y-auto', 'pr-2', 'custom-scrollbar');
                }
            }

            historicoAnotacoesContainer.innerHTML = datesToRender.map(date => {
                const items = grouped[date];
                const dateFormatted = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

                return `
                <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden shadow-lg mb-4">
                    <div class="bg-primary/5 px-4 py-3 border-b border-white/5 flex justify-between items-center">
                        <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">${dateFormatted}</span>
                        <span class="text-[9px] text-slate-500 font-black uppercase">${items.length} ${items.length > 1 ? 'ÍTENS' : 'ÍTEM'}</span>
                    </div>
                    <div class="p-4 space-y-5">
                        ${items.map(item => {
                            const isJustif = item.itemType === 'JUSTIFICATIVA';
                            const isSystem = item.itemType === 'SISTEMA';
                            const statusMap = {
                                'pendente': 'bg-amber-500/10 text-amber-500 border-amber-500/20',
                                'aprovado': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                                'rejeitado': 'bg-rose-500/10 text-rose-500 border-rose-500/20',
                                'aprovada': 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                                'rejeitada': 'bg-rose-500/10 text-rose-500 border-rose-500/20'
                            };

                            let statusClass = '';
                            let statusLabel = '';
                            
                            if (isJustif) {
                                statusClass = statusMap[item.status?.toLowerCase()] || statusMap['pendente'];
                                statusLabel = item.status?.toUpperCase() || 'PENDENTE';
                            } else if (isSystem) {
                                statusClass = statusMap[item.status_pendencia?.toLowerCase()] || statusMap['pendente'];
                                statusLabel = item.status_pendencia?.toUpperCase() || 'PENDENTE';
                            } else if (item.itemType === 'COMUNICADO') {
                                statusClass = item.lido ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20' : 'bg-amber-500/10 text-amber-500 border-amber-500/20';
                                statusLabel = 'CIENTE';
                            }
                            
                            // Mapeamento de Cores e Títulos Refinado
                            let colorClass = 'text-primary';
                            let title = 'REGISTRO DE ATIVIDADE';

                            if (isJustif) {
                                colorClass = 'text-orange-500';
                                title = item.tipo_divergencia || 'JUSTIFICATIVA DE INCIDENTE';
                            } else if (item.itemType === 'COMUNICADO') {
                                if (item.subtipo === 'hora_extra') {
                                    colorClass = 'text-amber-500';
                                    title = 'SOLICITAÇÃO DE HORA EXTRA';
                                } else {
                                    colorClass = 'text-emerald-500';
                                    title = 'COMUNICADO OFICIAL';
                                }
                            } else if (isSystem) {
                                const type = item.tipo || '';
                                if (type === 'gps_pulse') {
                                    colorClass = 'text-rose-400/90';
                                    title = 'CHECK-POINT DE LOCALIZAÇÃO (PULSO)';
                                } else if (type === 'gps_hora') {
                                    colorClass = 'text-rose-300/80';
                                    title = 'RASTREIO DE REGIME EXTERNO';
                                } else if (type === 'geofence_out') {
                                    colorClass = 'text-rose-500';
                                    title = 'QUEBRA DE PERÍMETRO (SAÍDA)';
                                } else if (type === 'geofence_in') {
                                    colorClass = 'text-rose-500';
                                    title = 'QUEBRA DE PERÍMETRO (ENTRADA)';
                                } else if (type === 'ponto_fora_raio') {
                                    colorClass = 'text-rose-600 font-bold';
                                    title = 'SOLICITAÇÃO DE PONTO FORA DO RAIO';
                                } else {
                                    colorClass = 'text-rose-500';
                                    title = item.tipo_divergencia || 'OCORRÊNCIA DE SISTEMA';
                                }
                            }

                            // Tradução de mensagens técnicas para explicações claras
                            const messageDict = {
                                'Pulso de localização automática': 'Localização registrada automaticamente pelo sistema para validar sua presença em serviço durante a jornada.',
                                'Log Automático de Rastreio (Regime Externo)': 'Registro automático de localização para fins de auditoria em jornada de trabalho sob regime externo.',
                                'Funcionário saiu do local de trabalho': 'O sistema detectou que você se ausentou do raio de alcance permitido para o seu local de escala/setor designado.',
                                'Funcionário retornou ao local de trabalho': 'O sistema detectou o seu retorno para dentro do raio de alcance permitido do seu local de escala/setor designado.',
                                'Solicitação de ponto fora do raio': 'Sua tentativa de registro de ponto foi bloqueada ou sinalizada por estar fora do raio de geofence permitido para o seu setor.'
                            };

                            // Fallback detalhado se não houver mensagem ou se a mensagem for curta/vazia
                            const defaultMessages = {
                                'gps_pulse': 'Localização registrada automaticamente pelo sistema para validar sua presença em serviço durante a jornada.',
                                'gps_hora': 'Registro automático de localização para fins de auditoria em jornada de trabalho sob regime externo.',
                                'geofence_out': 'O sistema detectou que você se ausentou do raio de alcance permitido para o seu local de escala/setor designado.',
                                'geofence_in': 'O sistema detectou o seu retorno para dentro do raio de alcance permitido do seu local de escala/setor designado.',
                                'ponto_fora_raio': 'Sua tentativa de registro de ponto foi bloqueada ou sinalizada por estar fora do raio de geofence permitido para o seu setor.'
                            };

                            const displayConteudo = messageDict[item.conteudo] || item.conteudo || defaultMessages[item.tipo] || 'Registro automático de posição.';

                            return `
                            <div class="card-history ${colorClass} py-2 mb-6 last:mb-0 group">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex flex-col gap-1">
                                        <div class="flex items-center gap-2">
                                            <h3 class="text-[11px] font-black uppercase tracking-widest ${colorClass}">${title}</h3>
                                            <span class="text-[10px] text-slate-500 font-bold tracking-tighter">
                                                ${new Date(item.created_at || item.data_hora).toLocaleDateString('pt-BR')} | ${new Date(item.created_at || item.data_hora).toLocaleTimeString('pt-BR')}
                                            </span>
                                        </div>
                                        <p class="text-slate-300 text-sm italic leading-relaxed">"${displayConteudo}"</p>
                                    </div>
                                    ${(isJustif || isSystem) ? `
                                        <span class="${statusClass} text-[8px] px-2 py-0.5 rounded-full border border-current font-black uppercase tracking-widest shrink-0 mt-1">${statusLabel}</span>
                                    ` : ''}
                                </div>
                                
                                <div class="flex flex-wrap gap-2 mt-3 overflow-hidden">
                                     <!-- Ações de Edição/Exclusão (Só se for de hoje/recente) -->
                                     <div class="flex gap-2">
                                        ${(() => {
                                            if (item.itemType === 'ATIVIDADE' && (new Date() - new Date(item.created_at) < 24 * 60 * 60 * 1000)) {
                                                return `
                                                    <button onclick="window.toggleEditCard('${item.id}', 'atividade', \`${item.conteudo.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                                            class="p-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:text-primary hover:border-primary/30 transition-all shadow-sm"
                                                            title="Editar">
                                                        <span class="material-symbols-outlined text-base">edit</span>
                                                    </button>
                                                    <button onclick="window.excluirAnotacao('${item.id}')" 
                                                            class="p-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:text-rose-500 hover:border-rose-500/30 transition-all shadow-sm"
                                                            title="Excluir">
                                                        <span class="material-symbols-outlined text-base">delete</span>
                                                    </button>`;
                                            } else if (isSystem && item.status_pendencia === 'pendente' && (new Date() - new Date(item.data_hora || item.created_at) < 24 * 60 * 60 * 1000)) {
                                                return `
                                                    <button onclick="window.toggleEditCard('${item.id}', '${item.tipo_raw}', \`${(item.justificativa_colaborador || '').replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                                            class="px-3 py-1.5 bg-primary/10 border border-primary/20 rounded-lg text-primary hover:bg-primary/20 transition-all flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest"
                                                            title="Justificar">
                                                        <span class="material-symbols-outlined text-sm">edit_note</span>
                                                        <span>Justificar</span>
                                                    </button>`;
                                            } else if (item.itemType === 'JUSTIFICATIVA' && item.status === 'pendente') {
                                                return `
                                                    <button onclick="window.excluirJustificativa('${item.id}')" 
                                                            class="p-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 hover:text-rose-500 hover:border-rose-500/30 transition-all"
                                                            title="Excluir">
                                                        <span class="material-symbols-outlined text-base">delete</span>
                                                    </button>`;
                                            } else if (item.itemType === 'COMUNICADO') {
                                                const btnClass = item.lido 
                                                    ? "bg-emerald-500/10 border-emerald-500/20 text-emerald-500" 
                                                    : "bg-amber-500/10 border-amber-500/20 text-amber-500 hover:bg-amber-500/20";
                                                const icon = item.lido ? "done_all" : "done";
                                                return `
                                                    <button ${item.lido ? 'disabled' : `onclick="window.marcarComunicadoLido('${item.id}')"`} 
                                                            class="px-3 py-1.5 ${btnClass} border rounded-lg transition-all flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest ${item.lido ? 'opacity-80' : ''}">
                                                        <span class="material-symbols-outlined text-sm">${icon}</span>
                                                        <span>CIENTE</span>
                                                    </button>`;
                                            }
                                            return '';
                                        })()}
                                     </div>

                                     <!-- Ações de Localização/Evidência -->
                                     <div class="flex gap-2">
                                        ${item.evidencia_url ? `
                                            <a href="${item.evidencia_url}" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-500/10 border border-amber-500/20 rounded-lg text-amber-500 hover:bg-amber-500/20 transition-all text-[9px] font-black uppercase tracking-widest">
                                                <span class="material-symbols-outlined text-sm">attach_file</span>
                                                <span>Ver Arquivo</span>
                                            </a>
                                        ` : ''}
                                        ${item.coordenadas ? `
                                            <button id="btn-map-${item.id}" onclick="window.toggleMapaCard('${item.id}', '${item.coordenadas}')" 
                                                    class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-rose-500/10 border border-rose-500/20 rounded-lg text-rose-500 hover:bg-rose-500/20 transition-all text-[9px] font-black uppercase tracking-widest shadow-lg shadow-rose-500/5">
                                                <span id="icon-map-${item.id}" class="material-symbols-outlined text-sm">map</span>
                                                <span id="txt-map-${item.id}">Ver Localização no Mapa</span>
                                            </button>
                                        ` : ''}
                                     </div>
                                </div>

                                <!-- Container do Mapa (Oculto por padrão) -->
                                <div id="map-card-${item.id}" class="map-container-card"></div>

                                <!-- Container de Edição In-Card -->
                                <div id="edit-card-${item.id}" class="edit-container-card"></div>

                                ${item.justificativa_colaborador ? `
                                <div class="mt-3 bg-white/5 border border-white/5 p-3 rounded-lg text-[11px] text-slate-400 italic">
                                    <span class="text-primary font-bold mr-1 not-italic tracking-tighter uppercase">Justificativa Enviada:</span> ${item.justificativa_colaborador}
                                </div>
                                ` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        async function salvarRegistro() {
            if (!targetId) return;

            const inputData = document.getElementById('inputDataAnotacao');
            const inputConteudo = document.getElementById('inputConteudoAnotacao');
            const inputModo = document.getElementById('inputTipoModo').value;
            const selectTipo = document.getElementById('selectTipoJustificativa');
            const btnSalvar = document.getElementById('btnSalvarAnotacao');

            const dataVal = inputData.value;
            const conteudoVal = inputConteudo.value.trim();

            if (!conteudoVal) {
                UI.showToast('Preencha a descrição.', 'warning');
                return;
            }

            UI.showLoader();

            try {
                if (inputModo === 'atividade') {
                    if (editingAnotacaoId) {
                        const { error } = await supabase.from('anotacoes').update({ conteudo: conteudoVal }).eq('id', editingAnotacaoId);
                        if (error) throw error;
                        UI.showToast('Atividade atualizada!', 'success');
                    } else {
                        const { error } = await supabase.from('anotacoes').insert([{ funcionario_id: targetId, data: dataVal, conteudo: conteudoVal }]);
                        if (error) throw error;
                        UI.showToast('Atividade registrada!', 'success');
                    }
                } else {
                    // JUSTIFICATIVA
                    let evidenciaUrl = null;
                    if (currentFile) {
                        const fileExt = currentFile.name.split('.').pop();
                        const fileName = `${targetId}/J_${Date.now()}.${fileExt}`;
                        const { error: upErr } = await supabase.storage.from('evidencias').upload(fileName, currentFile);
                        if (upErr) throw upErr;
                        const { data: { publicUrl } } = supabase.storage.from('evidencias').getPublicUrl(fileName);
                        evidenciaUrl = publicUrl;
                    }

                    const { error } = await supabase.from('justificativas').insert([{
                        funcionario_id: targetId,
                        data_incidente: dataVal,
                        tipo_divergencia: selectTipo.value,
                        descricao: conteudoVal,
                        evidencia_url: evidenciaUrl,
                        status: 'pendente'
                    }]);
                    if (error) throw error;
                    UI.showToast('Justificativa enviada!', 'success');
                }

                // Reset Form
                inputConteudo.value = '';
                editingAnotacaoId = null;
                currentFile = null;
                document.getElementById('txtAnexo').innerText = 'Anexar Documento';
                document.getElementById('btnAnexarEvidencia').classList.remove('border-emerald-500', 'text-emerald-400');
                document.getElementById('btnAnexarEvidencia').classList.add('border-primary/40', 'text-slate-400');
                
                await loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao realizar registro.', 'error');
            } finally {
                UI.hideLoader();
            }
        }

        window.excluirJustificativa = async (id) => {
            if (!confirm('Deseja excluir permanentemente esta justificativa?')) return;
            UI.showLoader();
            try {
                const { error } = await supabase.from('justificativas').delete().eq('id', id);
                if (error) throw error;
                UI.showToast('Justificativa excluída!', 'success');
                await loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao excluir.', 'error');
            } finally {
                UI.hideLoader();
            }
        }

        window.editarAnotacao = (id, conteudo) => {
            const inputConteudo = document.getElementById('inputConteudoAnotacao');
            const btnSalvarAnotacao = document.getElementById('btnSalvarAnotacao');
            
            editingAnotacaoId = id;
            inputConteudo.value = conteudo;
            btnSalvarAnotacao.innerHTML = '<span class="material-symbols-outlined text-sm">save</span> Atualizar Anotação';
            inputConteudo.focus();
            window.scrollTo({ top: inputConteudo.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
        };

        window.justificarLogSistema = async (id, currentJustif) => {
            const novaJustificativa = prompt("Insira sua justificativa para esta ocorrência:", currentJustif);
            
            if (novaJustificativa === null) return; // Cancelou
            if (novaJustificativa.trim() === "") {
                UI.showToast('A justificativa não pode ser vazia.', 'warning');
                return;
            }

            UI.showLoader();
            try {
                const { error } = await supabase
                    .from('diario_logs')
                    .update({ 
                        justificativa_colaborador: novaJustificativa.trim(),
                        status_pendencia: 'pendente' // Garante que continua pendente para análise
                    })
                    .eq('id', id);

                if (error) throw error;

                UI.showToast('Justificativa atualizada!', 'success');
                await loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao atualizar justificativa.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        window.excluirAnotacao = async (id) => {
            if (!confirm('Deseja excluir permanentemente esta anotação?')) return;

            UI.showLoader();
            try {
                const { error } = await supabase
                    .from('anotacoes')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                UI.showToast('Anotação excluída!', 'success');
                loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao excluir anotação.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        window.marcarComunicadoLido = async (id) => {
            UI.showLoader();
            try {
                const { error } = await supabase
                    .from('comunicados')
                    .update({ lido: true })
                    .eq('id', id);

                if (error) throw error;

                UI.showToast('Registrado com sucesso!', 'success');
                await loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao atualizar comunicado.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        const mapInstances = {};
        window.toggleMapaCard = (id, coordenadas) => {
            const container = document.getElementById(`map-card-${id}`);
            const btnTxt = document.getElementById(`txt-map-${id}`);
            const btnIcon = document.getElementById(`icon-map-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            
            if (isActive) {
                if (btnTxt) btnTxt.innerText = 'Fechar Visualização';
                if (btnIcon) btnIcon.innerText = 'close';
                
                // Pequeno delay para a animação do CSS começar
                setTimeout(() => {
                    if (!mapInstances[id]) {
                        const [lat, lng] = coordenadas.split(',').map(Number);
                        const map = L.map(`map-card-${id}`, {
                            zoomControl: false,
                            attributionControl: false
                        }).setView([lat, lng], 16);

                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                        
                        // Icone personalizado para o marcador
                        const pinIcon = L.divIcon({
                            html: `<span class="material-symbols-outlined text-rose-500 font-variation-settings-fill" style="font-size: 32px; filter: drop-shadow(0 0 5px rgba(244,63,94,0.5))">location_on</span>`,
                            className: 'custom-div-icon',
                            iconSize: [32, 32],
                            iconAnchor: [16, 32]
                        });

                        L.marker([lat, lng], {icon: pinIcon}).addTo(map);
                        mapInstances[id] = map;
                    } else {
                        mapInstances[id].invalidateSize();
                    }
                }, 300);
            } else {
                if (btnTxt) btnTxt.innerText = 'Ver Localização no Mapa';
                if (btnIcon) btnIcon.innerText = 'map';
            }
        };

        window.toggleEditCard = (id, type, currentContent) => {
            const container = document.getElementById(`edit-card-${id}`);
            if (!container) return;

            const isActive = container.classList.toggle('active');
            if (isActive) {
                container.innerHTML = `
                    <div class="space-y-3">
                        <label class="text-[9px] font-black uppercase tracking-widest text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">edit_note</span>
                            ${type === 'atividade' ? 'Editar Atividade' : 'Responder Justificativa'}
                        </label>
                        <textarea id="edit-text-${id}" 
                            class="w-full bg-background-dark border border-white/10 rounded-xl py-3 px-4 text-xs text-slate-100 placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                            rows="4">${currentContent}</textarea>
                        <div class="flex gap-2">
                            <button onclick="window.salvarEdicaoCard('${id}', '${type}')" 
                                class="flex-1 bg-primary text-white text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:bg-primary/80">
                                Salvar Alterações
                            </button>
                            <button onclick="window.toggleEditCard('${id}')" 
                                class="px-4 bg-white/5 border border-white/10 text-slate-400 text-[9px] font-black py-3 rounded-lg uppercase tracking-widest transition-all hover:text-white">
                                Cancelar
                            </button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        };

        window.salvarEdicaoCard = async (id, type) => {
            const newContent = document.getElementById(`edit-text-${id}`).value;
            if (!newContent.trim()) {
                UI.showToast('O conteúdo não pode estar vazio.', 'warning');
                return;
            }

            UI.showLoader();
            try {
                let error;
                if (type === 'atividade') {
                    const res = await supabase.from('anotacoes').update({ conteudo: newContent }).eq('id', id);
                    error = res.error;
                } else {
                    const res = await supabase.from('diario_logs').update({ justificativa_colaborador: newContent, status_pendencia: 'em_analise' }).eq('id', id);
                    error = res.error;
                }

                if (error) throw error;

                UI.showToast('Alteração salva com sucesso!', 'success');
                window.toggleEditCard(id);
                await loadUnifiedHistory();
            } catch (err) {
                console.error(err);
                UI.showToast('Erro ao salvar alteração.', 'error');
            } finally {
                UI.hideLoader();
            }
        };

        init();
    </script>
</body>
</html>
