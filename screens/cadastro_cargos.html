<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0d59f2",
            "background-light": "#f5f6f8",
            "background-dark": "#0a0e17",
            "slate-panel": "#161c2a",
            "slate-border": "#262f45"
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .sci-fi-gradient {
      background: linear-gradient(135deg, rgba(13, 89, 242, 0.15) 0%, rgba(10, 14, 23, 0) 100%);
    }

    .glow-border:focus-within {
      box-shadow: 0 0 15px rgba(13, 89, 242, 0.3);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
      <div onclick="history.back()"
        class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase flex-1 text-center">GESTÃO DE CARGOS</h2>
      <div
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary">
        <span class="material-symbols-outlined">terminal</span>
      </div>
    </div>
  </header>
  <main class="flex-1 max-w-2xl mx-auto w-full p-4 space-y-8 pb-24">
    <section class="space-y-4">
      <div class="flex items-center gap-2 px-1">
        <span class="material-symbols-outlined text-primary text-sm">add_circle</span>
        <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Novo Cargo</h2>
      </div>
      <div
        class="bg-white dark:bg-slate-panel border border-slate-200 dark:border-slate-border rounded-xl p-6 sci-fi-gradient glow-border">
        <form id="form-cargo" class="space-y-5">
          <div class="space-y-2">
            <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Identificação do
              Cargo</label>
            <div class="relative">
              <input id="nome-cargo"
                class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:opacity-30"
                placeholder="Ex: Engenheiro de Sistemas" type="text" required />
              <span class="material-symbols-outlined absolute right-3 top-3 text-primary/40">badge</span>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-semibold uppercase tracking-tighter opacity-60 ml-1">Nível de Acesso
              Recomendado</label>
            <select id="nivel-cargo"
              class="w-full bg-slate-100 dark:bg-background-dark/50 border-slate-200 dark:border-slate-border rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
              <option value="recruta">Recruta (Básico)</option>
              <option value="operador">Operador (Intermediário)</option>
              <option value="especialista">Especialista (Avançado)</option>
              <option value="gestor">Comandante (Gestão)</option>
            </select>
          </div>
          <button
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-sm"
            type="submit">
            <span class="material-symbols-outlined">shield_person</span>
            Registrar Cargo
          </button>
        </form>
      </div>
    </section>
    <section class="space-y-4">
      <div class="flex items-center justify-between px-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">database</span>
          <h2 class="text-sm font-bold tracking-widest uppercase opacity-70">Cargos Ativos</h2>
        </div>
        <span id="total-cargos" class="text-[10px] bg-primary/20 text-primary px-2 py-1 rounded-full font-bold">0
          REGISTROS</span>
      </div>
      <div id="lista-cargos" class="space-y-3">
        <!-- Lista Dinâmica -->
      </div>
    </section>
  </main>
  <nav
    class="fixed bottom-0 w-full bg-white dark:bg-background-dark border-t border-slate-200 dark:border-primary/10 px-6 py-4 z-50">
    <div class="flex justify-between items-center max-w-md mx-auto">
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="painel_admin.html">
        <span class="material-symbols-outlined ">home</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">INÍCIO</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="estatistica_funcionario.html">
        <span class="material-symbols-outlined ">bar_chart</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">ESTATÍSTICA</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="historico_anual.html">
        <span class="material-symbols-outlined ">history</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">HISTÓRICO</span>
      </a>
      <a class="flex flex-col items-center gap-1 text-slate-400 transition-all duration-300 hover:text-primary"
        href="perfil_funcionario.html">
        <span class="material-symbols-outlined ">person</span>
        <span class="text-[10px] font-bold uppercase tracking-tighter">PERFIL</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { supabase } from '../js/supabase-config.js';
    import { UI } from '../js/ui-utils.js';

    async function loadCargos() {
      const container = document.getElementById('lista-cargos');
      const countSpan = document.getElementById('total-cargos');

      try {
        const { data, error } = await supabase.from('cargos').select('*').order('nome');
        if (error) throw error;

        countSpan.innerText = `${data.length} REGISTROS`;
        container.innerHTML = data.map(c => `
                <div class="group bg-white dark:bg-slate-panel border border-slate-200 dark:border-slate-border rounded-xl p-4 flex items-center justify-between hover:border-primary/50 transition-all">
                  <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary border border-primary/20">
                      <span class="material-symbols-outlined">${getIconForNivel(c.nivel)}</span>
                    </div>
                    <div>
                      <h3 class="font-bold text-sm uppercase tracking-tight">${c.nome}</h3>
                      <p class="text-xs text-primary font-medium uppercase tracking-tighter">${c.nivel || 'Básico'}</p>
                    </div>
                  </div>
                  <div class="flex gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
                    <button onclick="deletarCargo('${c.id}')" class="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg">
                      <span class="material-symbols-outlined text-xl">delete</span>
                    </button>
                  </div>
                </div>
            `).join('');

        if (data.length === 0) {
          container.innerHTML = '<p class="text-center py-8 opacity-40 text-xs uppercase font-bold tracking-widest">Nenhum cargo registrado</p>';
        }
      } catch (err) {
        console.error('Erro ao carregar cargos:', err);
      }
    }

    function getIconForNivel(nivel) {
      const icons = {
        recruta: 'military_tech',
        operador: 'engineering',
        especialista: 'psychology',
        gestor: 'shield_person'
      };
      return icons[nivel] || 'badge';
    }

    window.deletarCargo = async (id) => {
      if (!confirm('Deseja excluir este cargo?')) return;
      UI.showLoader();
      try {
        const { error } = await supabase.from('cargos').delete().eq('id', id);
        if (error) throw error;
        UI.showToast('Cargo removido', 'success');
        loadCargos();
      } catch (err) {
        UI.showToast('Erro ao remover cargo', 'error');
      } finally {
        UI.hideLoader();
      }
    };

    document.getElementById('form-cargo').addEventListener('submit', async (e) => {
      e.preventDefault();
      UI.showLoader();

      const dados = {
        nome: document.getElementById('nome-cargo').value,
        nivel: document.getElementById('nivel-cargo').value
      };

      try {
        const { error } = await supabase.from('cargos').insert([dados]);
        if (error) throw error;

        UI.showToast('Cargo registrado!', 'success');
        document.getElementById('form-cargo').reset();
        loadCargos();
      } catch (err) {
        console.error(err);
        UI.showToast('Erro ao registrar cargo', 'error');
      } finally {
        UI.hideLoader();
      }
    });

    loadCargos();
  </script>
</body>
</body>

</html>
