<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="../js/theme.js?v=1.0"></script>
  <style>
    .neon-glow {
      box-shadow: 0 0 10px rgba(13, 89, 242, 0.3);
    }

    .neon-border {
      border: 1px solid rgba(0, 242, 255, 0.2);
    }

    .scanline {
      background: linear-gradient(to bottom, transparent 50%, rgba(13, 89, 242, 0.05) 50%);
      background-size: 100% 4px;
    }

    .font-variation-settings-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Header Section -->
  <header class="border-b border-primary/20 bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
      <div id="btn-voltar"
        class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg border border-primary/30 bg-primary/10 cursor-pointer hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">arrow_back</span>
      </div>
      <div class="flex-1 text-center">
        <h2 class="text-slate-100 text-lg font-bold tracking-wider uppercase">RELAÇÃO DE SETORES</h2>
        <span id="active-crew-count"
          class="text-[10px] text-primary font-black uppercase tracking-[0.2em] bg-primary/10 px-2 py-0.5 rounded-full inline-block mt-1 animate-pulse">---
          Tripulantes Ativos</span>
      </div>
      <button id="openSidebar" onclick="UI.toggleSidebar()"
        class="flex size-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30 text-primary hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto px-4 py-6 max-w-2xl mx-auto w-full pb-24">
    <!-- Search Bar -->
    <div class="mb-8">
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-primary">search</span>
        </div>
        <input id="search-input"
          class="block w-full pl-12 pr-4 py-4 bg-primary/5 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-slate-500 text-slate-100"
          placeholder="Localizar setor..." type="text" />
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
          <span class="text-[10px] font-bold text-primary/40 uppercase tracking-widest">Scanner Ativo</span>
        </div>
      </div>
    </div>

    <!-- Sector List Container -->
    <div id="sector-list" class="space-y-4">
      <!-- Dynamic sectors will be loaded here -->
      <div class="flex flex-col items-center justify-center py-12 text-slate-500">
        <span class="material-symbols-outlined animate-spin mb-2">refresh</span>
        <p class="text-xs uppercase font-bold tracking-widest">Sincronizando com a Central...</p>
      </div>
    </div>
  </main>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabase } from '../js/supabase-config.js';

    let allSectors = [];
    let allEmployees = [];

    // Configurar retorno explícito
    document.getElementById('btn-voltar').onclick = () => {
      UI.voltarInicio();
    };

    async function loadData() {
      try {
        const [sectorsRes, employeesRes] = await Promise.all([
          supabase.from('setores').select('*'),
          supabase.from('funcionarios').select('*')
        ]);

        if (sectorsRes.error) throw sectorsRes.error;
        if (employeesRes.error) throw employeesRes.error;

        allSectors = sectorsRes.data;
        allEmployees = employeesRes.data;

        // Atualizar contador de tripulantes
        const contador = document.getElementById('active-crew-count');
        if (contador) contador.textContent = `${allEmployees.length} Tripulantes Ativos`;

        renderSectors(allSectors);
      } catch (err) {
        console.error('Erro ao carregar dados:', err);
      }
    }

    function renderSectors(sectors) {
      const container = document.getElementById('sector-list');
      container.innerHTML = '';

      if (sectors.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-slate-500">
            <p class="text-xs uppercase font-bold tracking-widest">Nenhum setor localizado pelo scanner.</p>
          </div>
        `;
        return;
      }

      sectors.forEach(sector => {
        // Find manager for this sector
        const manager = allEmployees.find(e =>
          e.setor_id === sector.id &&
          (e.nivel_acesso === 'manager' || e.nivel_acesso === 'gestor')
        );

        // Count total members in this sector (including managers and admins)
        const totalMembers = allEmployees.filter(e => e.setor_id === sector.id).length;
        const hasManager = !!manager;
        const statusColor = hasManager ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-amber-500 shadow-[0_0_8px_#f59e0b]';

        let icon = 'domain';
        const name = sector.nome.toLowerCase();
        if (name.includes('engenharia')) icon = 'engineering';
        else if (name.includes('dados') || name.includes('comunicação')) icon = 'analytics';
        else if (name.includes('logística') || name.includes('operações')) icon = 'local_shipping';

        const card = document.createElement('div');
        card.className = 'relative overflow-hidden p-4 bg-slate-900/50 rounded-xl neon-border group hover:bg-slate-800/60 transition-colors cursor-pointer';
        card.onclick = () => window.location.href = `relacao_funcionarios.html?setor=${sector.id}`;

        card.innerHTML = `
          <div class="absolute top-0 right-0 p-2 opacity-20">
            <span class="text-[40px] font-black italic select-none">#${sector.nome.substring(0, 3).toUpperCase()}</span>
          </div>
          <div class="flex items-center gap-4 relative z-10">
            <div class="relative">
              <div class="w-16 h-16 rounded-full border-2 border-primary p-1 bg-background-dark flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-3xl">${icon}</span>
              </div>
              <div class="absolute -bottom-1 -right-1 w-4 h-4 ${statusColor} rounded-full border-2 border-background-dark"></div>
            </div>
            <div class="flex-1">
              <h3 class="text-lg font-bold text-slate-100">${sector.nome}</h3>
              <p class="text-xs text-primary font-medium tracking-wider">
                Gestor Responsável: ${manager ? manager.nome_completo : 'Não atribuído'}
              </p>
              <div class="mt-3 flex items-center gap-4">
                <div class="flex flex-col">
                  <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">
                    TOTAL DE TRIPULANTES: <span class="text-slate-300 font-mono text-sm ml-1">${totalMembers}</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
          <div class="scanline absolute inset-0 opacity-10 pointer-events-none"></div>
        `;
        container.appendChild(card);
      });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allSectors.filter(s =>
        s.nome.toLowerCase().includes(term)
      );
      renderSectors(filtered);
    });

    loadData();
  </script>

  <!-- Bottom Navigation -->
  <nav
    class="fixed bottom-0 left-0 right-0 bg-background-dark/90 border-t border-white/5 py-4 z-50 flex justify-center backdrop-blur-xl">
    <div class="flex items-center justify-around w-full max-w-md px-6">
      <a id="nav-inicio" href="dashboard.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Início</span>
      </a>
      <a href="estatistica_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Estatística</span>
      </a>
      <a href="diario_funcionario.html" class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">edit_note</span>
          <span class="text-[9px] font-black uppercase tracking-widest text-center">Diário</span>
      </a>
      <a id="nav-perfil-link" href="perfil_funcionario.html"
        class="flex flex-col items-center gap-1.5 text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[9px] font-black uppercase tracking-widest text-center">Perfil</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { Auth } from '../js/auth.js';
    import { UI } from '../js/ui-utils.js';
    window.addEventListener('load', () => {
      const user = Auth.getUser();
      if (user) {
          UI.updateFooterNavigation(user.role);
          UI.initSidebar(user.role);
      }
    });
  </script>
    <!-- Sidebar Menu Overlay -->
    <aside id="sidebarMenu" class="fixed top-0 left-0 h-full w-80 bg-background-dark border-r border-primary/20 z-[160] -translate-x-full transition-all duration-500 ease-out shadow-[20px_0_50px_rgba(0,0,0,0.5)]">
        <div class="flex flex-col h-full">
            <div class="p-8 border-b border-primary/10">
                <h3 class="text-primary font-black italic text-2xl tracking-tighter">CHRONOSYNC</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-[0.3em]">Console de Navegação</p>
            </div>
            <nav id="sidebarNav" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Injetado via UI.initSidebar() -->
            </nav>
            <div class="p-4 border-t border-primary/10 bg-black/20">
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 text-rose-500 hover:bg-rose-500/10 rounded-xl transition-all font-bold text-xs uppercase">
                    <span class="material-symbols-outlined">logout</span> Sair do Sistema
                </button>
            </div>
        </div>
    </aside>
    <div id="sidebarOverlay" onclick="UI.toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden opacity-0 transition-all duration-300"></div>

    <script type="module" src="../js/manager-context.js?v=3.0"></script>
</body>

</html>
